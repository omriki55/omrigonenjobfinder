<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#dde1ff" media="(prefers-color-scheme:light)"/>
  <meta name="theme-color" content="#1e1f25" media="(prefers-color-scheme:dark)"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Jobs"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <title>Job Tracker — Omri</title>
  <script>(function(){try{var t=localStorage.getItem('theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
  <style>
    /* ===== MATERIAL 3 EXPRESSIVE — tonal palette from seed #4F6BED ===== */
    :root{
      --primary:#4F6BED;
      --on-primary:#ffffff;
      --primary-container:#dde1ff;
      --on-primary-container:#001257;
      --secondary-container:#dfe1f9;
      --on-secondary-container:#171b2c;
      --tertiary-container:#ffd8e8;
      --on-tertiary-container:#31101d;
      --canvas:#fbf8ff;
      --surface:#fbf8ff;
      --surfaceAlt:#f0edf5;
      --surface-container:#f0edf5;
      --surface-container-high:#eae7ef;
      --surface-container-highest:#e4e1e9;
      --ink:#1b1b21;
      --inkSoft:#46464f;
      --inkFaint:#74747e;
      --line:#c7c5d0;
      --lineSoft:#e2e0ea;
      --accent:#4F6BED;
      --accentDeep:#3a52c9;
      --accentSoft:#dde1ff;
      --accentInk:#001257;
      --onAccent:#ffffff;
      --heroBg:var(--primary-container);
      --wa:#2e6b46;
      --star:#c9a227;
      --toast-bg:#2f3036;
      --success:#2e6b46;
      --success-container:#b3f1c7;
      --error:#ba1a1a;
      --error-container:#ffdad6;
      --radius:28px;
      --font-display:'Heebo','Roboto Flex',system-ui,sans-serif;
      --font-ui:'Heebo','Roboto Flex',system-ui,sans-serif;
      --font-mono:'Roboto Flex',ui-monospace,monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--canvas);color:var(--ink);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;direction:rtl}
    .material-symbols-rounded{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;font-variation-settings:'FILL' 0,'wght' 400,'opsz' 24;vertical-align:middle;-webkit-font-feature-settings:'liga'}

    /* ===== APP SHELL ===== */
    #app{max-width:560px;margin:0 auto;padding:14px 14px 100px;display:flex;flex-direction:column;gap:14px}

    /* ===== HERO (primary container) ===== */
    .hero{background:var(--primary-container);color:var(--on-primary-container);border-radius:32px;padding:22px 24px;display:flex;flex-direction:column;gap:14px}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .hero-greeting{font-size:.82rem;font-weight:600;opacity:.85}
    .hero-meta{font-size:.72rem;opacity:.6;margin-top:1px}
    .hero-coach{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;margin-top:6px;line-height:1.1}
    .hero-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .sheet-btn,.scan-btn,.settings-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,.55);border:none;color:var(--on-primary-container);border-radius:999px;padding:9px 12px;font-size:.76rem;text-decoration:none;font-weight:600;white-space:nowrap;font-family:var(--font-ui);cursor:pointer;transition:background .15s}
    .sheet-btn:hover,.scan-btn:hover,.settings-btn:hover{background:#fff}
    .scan-btn:disabled{opacity:.5;cursor:not-allowed}
    .scan-btn .material-symbols-rounded,.settings-btn .material-symbols-rounded,.sheet-btn .material-symbols-rounded{font-size:19px}

    /* funnel */
    .funnel{display:flex;justify-content:space-between;align-items:flex-end;gap:4px}
    .f-stage{flex:1;display:flex;flex-direction:column;gap:4px;padding:8px 4px;border-radius:18px;cursor:pointer;transition:background .15s;border:2px solid transparent;user-select:none;text-align:center}
    .f-stage:hover{background:rgba(255,255,255,.45)}
    .f-stage.active{background:rgba(255,255,255,.7);border-color:rgba(255,255,255,.9)}
    .f-count{font-size:1.9rem;font-weight:800;line-height:1;color:var(--on-primary-container)}
    .f-count.zero{opacity:.4}
    .f-label{font-size:.64rem;font-weight:600;opacity:.7}
    .f-track{height:5px;background:rgba(255,255,255,.45);border-radius:999px;overflow:hidden;margin-top:2px}
    .f-fill{height:100%;border-radius:999px;background:var(--primary);transition:width .7s cubic-bezier(.2,.7,.3,1)}

    /* momentum chips */
    .m-chips{display:flex;gap:7px;flex-wrap:wrap}
    .m-chip{background:rgba(255,255,255,.55);border-radius:999px;padding:6px 13px;font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;color:var(--on-primary-container)}
    .m-chip .val{font-weight:800;color:var(--primary)}

    /* ===== TOOLBAR ===== */
    .toolbar{background:var(--surface-container);border-radius:28px;padding:16px;display:flex;flex-direction:column;gap:12px}
    .search-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .search-wrap{flex:1;position:relative;min-width:160px}
    .search-ico{position:absolute;top:50%;right:14px;transform:translateY(-50%);color:var(--inkFaint);pointer-events:none}
    .search-inp{width:100%;border:none;border-radius:999px;padding:12px 42px 12px 14px;font-size:.85rem;font-family:var(--font-ui);color:var(--ink);background:var(--surface-container-highest);outline:none;direction:rtl;transition:box-shadow .15s}
    .search-inp:focus{box-shadow:0 0 0 2px var(--primary)}
    .search-clear{position:absolute;top:50%;left:12px;transform:translateY(-50%);background:none;border:none;color:var(--inkFaint);cursor:pointer;font-size:.95rem;padding:0;line-height:1;display:none}
    .search-clear.show{display:block}
    .sort-seg{display:flex;background:transparent;border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
    .sort-btn{flex:1;padding:7px 13px;border:none;background:none;border-radius:999px;font-size:.76rem;font-weight:600;font-family:var(--font-ui);color:var(--inkSoft);cursor:pointer;white-space:nowrap;transition:all .13s}
    .sort-btn.on{background:var(--secondary-container);color:var(--on-secondary-container)}
    .filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
    .filter-lbl{font-size:.64rem;font-weight:700;color:var(--inkFaint);flex-shrink:0}
    .sf-chip,.fit-chip{background:transparent;border:1px solid var(--line);color:var(--inkSoft);border-radius:999px;padding:8px 14px;font-size:.76rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:5px;outline:none}
    .sf-chip .n{font-size:.7rem;background:rgba(0,0,0,.07);border-radius:99px;padding:1px 7px}
    .sf-chip.on-all,.sf-chip.on-stage,.fit-chip.on{background:var(--secondary-container);color:var(--on-secondary-container);border-color:transparent}
    .exp-row{display:flex;align-items:center;justify-content:space-between}
    .exp-count{font-size:.78rem;font-weight:700;color:var(--inkSoft)}
    .exp-btns{display:flex;gap:6px}
    .exp-btn{background:none;border:1px solid var(--line);color:var(--inkSoft);border-radius:999px;padding:6px 12px;font-size:.72rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .13s}
    .exp-btn:hover{background:var(--surface-container-high);color:var(--ink)}

    /* ===== JOB CARD ===== */
    @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .job-card{background:var(--surface-container);border-radius:28px;flex-shrink:0;position:relative;overflow:hidden;transition:background .2s,opacity .2s,transform .12s}
    .job-card:active{transform:scale(.99)}
    .job-card.open{background:var(--surface-container-high)}
    .job-card.st-rejected{opacity:.7}
    .job-card.has-followup{box-shadow:inset 0 0 0 2px #e8a33d}
    .job-card.dismissed{opacity:.5}
    .job-card.removing{opacity:0!important;transform:translateX(-24px) scale(.97);transition:opacity .28s ease,transform .28s ease;pointer-events:none}

    .card-head{display:flex;align-items:center;gap:13px;padding:18px 20px;cursor:pointer;user-select:none}
    .star-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0;line-height:1;color:var(--inkFaint);transition:color .15s,transform .15s;flex-shrink:0}
    .star-btn.on{color:var(--star);transform:scale(1.12)}
    .card-text{flex:1;min-width:0;padding-left:6px}
    .card-company{font-weight:800;font-size:1.2rem;letter-spacing:-.3px;color:var(--ink);direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--inkSoft);font-weight:500;direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .card-posted{font-size:.7rem;color:var(--inkFaint);margin-top:3px;direction:rtl;text-align:right}
    .card-head-right{display:flex;flex-direction:column;align-items:flex-start;gap:5px;flex-shrink:0}
    .next-pill{background:var(--secondary-container);color:var(--on-secondary-container);border-radius:999px;padding:4px 10px;font-size:.65rem;font-weight:600;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
    .s-pill{border-radius:999px;padding:5px 11px;font-size:.68rem;font-weight:700;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;background:var(--s-bg);color:var(--s-fg)}
    .s-dot{width:6px;height:6px;border-radius:50%;background:var(--s-solid);flex-shrink:0}
    /* fit score — big tonal rounded square */
    .fit-mark{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:54px;border-radius:18px;background:var(--f-bg);flex-shrink:0}
    .fit-num{font-weight:800;font-size:1.45rem;line-height:1;color:var(--f-fg)}
    .fit-lbl{font-size:.46rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--f-fg);opacity:.7;margin-top:1px}
    .chevron{font-size:.8rem;color:var(--inkFaint);transition:transform .25s cubic-bezier(.2,.7,.3,1);flex-shrink:0}
    .job-card.open .chevron{transform:rotate(180deg)}
    .follow-badge{font-size:.64rem;background:#fef0d8;color:#7a5900;border-radius:999px;padding:3px 9px;font-weight:700;white-space:nowrap}
    .new-badge{background:var(--primary);color:#fff;border-radius:999px;padding:3px 9px;font-size:.64rem;font-weight:700;white-space:nowrap}

    .card-body-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.2,.7,.3,1)}
    .job-card.open .card-body-wrap{grid-template-rows:1fr}
    .card-body-inner{overflow:hidden;min-height:0}
    .card-body{padding:0 20px 18px;display:flex;flex-direction:column;gap:12px}

    .meta-chips{display:flex;gap:7px;flex-wrap:wrap}
    .meta-chip{background:var(--surface-container-highest);border-radius:999px;padding:5px 12px;font-size:.72rem;color:var(--inkSoft);font-weight:600;display:inline-flex;align-items:center;gap:4px}

    .ai-note{background:var(--secondary-container);border-radius:20px;padding:13px 15px}
    .ai-note-head{font-size:.66rem;font-weight:700;color:var(--on-secondary-container);opacity:.7;margin-bottom:5px;display:flex;align-items:center;gap:5px}
    .ai-note-text{font-size:.82rem;color:var(--on-secondary-container);line-height:1.55;direction:ltr;text-align:left}

    .contact-box{background:var(--surface-container-highest);border-radius:20px;padding:13px 15px;display:flex;flex-direction:column;gap:8px}
    .contact-head{font-size:.64rem;font-weight:700;color:var(--inkFaint)}
    .contact-main{display:flex;align-items:center;gap:10px}
    .avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0}
    .contact-name{font-weight:700;font-size:.85rem}
    .contact-title{font-size:.72rem;color:var(--inkSoft)}
    .contact-links{display:flex;gap:7px;flex-wrap:wrap}
    .clink{font-size:.72rem;font-weight:600;text-decoration:none;padding:6px 12px;border-radius:999px;background:var(--surface);color:var(--inkSoft);display:inline-flex;align-items:center;gap:4px;transition:all .13s}
    .clink:hover{background:var(--secondary-container);color:var(--on-secondary-container)}
    .clink.li{color:#0a66c2}

    .notes-wrap{display:flex;flex-direction:column;gap:6px}
    .notes-lbl{font-size:.66rem;font-weight:700;color:var(--inkFaint)}
    .notes-ta,.round-note,.round-inp,.round-sel{font-family:var(--font-ui)}
    .notes-ta{width:100%;border:none;border-radius:16px;padding:11px 13px;font-size:.82rem;color:var(--ink);resize:vertical;min-height:60px;background:var(--surface-container-highest);outline:none;transition:box-shadow .15s;direction:rtl}
    .notes-ta:focus{box-shadow:0 0 0 2px var(--primary)}
    .notes-ta.has-note{background:var(--secondary-container)}
    .save-row{display:flex;align-items:center;gap:10px;margin-top:2px}
    .save-btn{background:var(--primary);border:none;color:#fff;border-radius:999px;padding:8px 18px;font-size:.76rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;transition:all .13s;outline:none}
    .save-btn:hover{background:var(--accentDeep)}
    .save-btn:active{transform:scale(.96)}
    .saved-ack{font-size:.74rem;font-weight:600;transition:opacity .3s}

    /* interview rounds */
    .rounds-wrap{display:flex;flex-direction:column;gap:8px}
    .rounds-lbl{font-size:.66rem;font-weight:700;color:var(--inkFaint);display:flex;align-items:center;justify-content:space-between}
    .round-card{border-radius:18px;padding:11px 12px;background:var(--surface-container-highest);display:flex;flex-direction:column;gap:7px;position:relative}
    .round-card.r-passed{background:var(--success-container)}
    .round-card.r-rejected{background:var(--error-container)}
    .round-row{display:flex;gap:7px;flex-wrap:wrap}
    .round-inp,.round-sel{border:none;border-radius:11px;padding:7px 10px;font-size:.78rem;color:var(--ink);background:var(--surface);outline:none;direction:rtl}
    .round-inp:focus,.round-sel:focus{box-shadow:0 0 0 2px var(--primary)}
    .round-inp.r-date{flex:0 0 auto}
    .round-inp.r-name{flex:1 1 110px}
    .round-sel{flex:1 1 auto;cursor:pointer}
    .round-note{width:100%;border:none;border-radius:11px;padding:8px 10px;font-size:.78rem;color:var(--ink);background:var(--surface);resize:vertical;min-height:34px;outline:none;direction:rtl}
    .round-note:focus{box-shadow:0 0 0 2px var(--primary)}
    .round-del{position:absolute;top:8px;left:8px;background:none;border:none;cursor:pointer;font-size:.9rem;opacity:.45;padding:2px}
    .round-del:hover{opacity:1}
    .round-add{background:transparent;border:1px dashed var(--primary);color:var(--accentInk);border-radius:999px;padding:8px 14px;font-size:.76rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;align-self:flex-start}
    .round-add:hover{background:var(--secondary-container)}

    /* stage stepper */
    .stepper-wrap{display:flex;flex-direction:column;gap:7px}
    .stepper-lbl{font-size:.66rem;font-weight:700;color:var(--inkFaint)}
    .stepper{display:flex;gap:6px}
    .step-btn{flex:1;padding:10px 4px;border-radius:14px;font-size:.74rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;border:none;background:var(--surface-container-highest);color:var(--inkSoft);transition:all .12s;outline:none}
    .step-btn:hover{background:var(--secondary-container);color:var(--on-secondary-container)}
    .step-btn.on{background:var(--s-solid);color:#fff}

    /* channel */
    .channel-wrap{display:flex;flex-direction:column;gap:6px}
    .channel-lbl{font-size:.72rem;font-weight:600;color:var(--inkSoft)}
    .chan{display:flex;gap:6px;flex-wrap:wrap}
    .chan-btn{padding:7px 13px;border-radius:999px;font-size:.74rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;border:none;background:var(--surface-container-highest);color:var(--inkSoft);outline:none;transition:all .12s}
    .chan-btn.on{background:var(--primary);color:#fff}

    /* action buttons */
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .act-btn{flex:1;min-width:74px;padding:12px 8px;border-radius:999px;font-size:.78rem;font-weight:700;font-family:var(--font-ui);text-align:center;cursor:pointer;border:none;background:var(--secondary-container);color:var(--on-secondary-container);transition:all .14s;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;white-space:nowrap}
    .act-btn .material-symbols-rounded{font-size:18px}
    .act-btn:active{transform:scale(.96)}
    .act-wa{background:var(--success-container);color:#0c3a22}
    .act-dismiss{background:var(--error-container);color:#5c0d0d;flex:0 0 auto}
    .act-cv{background:var(--surface-container-highest);color:var(--ink)}
    .act-open{background:var(--primary);color:#fff}
    .act-copy.copied,.act-letter.copied{background:var(--success-container);color:#0c3a22}
    .act-letter{background:var(--success-container);color:#0c3a22}
    .act-prep{background:var(--tertiary-container);color:var(--on-tertiary-container)}
    .act-dossier{background:#d7e3ff;color:#0b4ba0}

    /* dismiss section */
    .dismiss-toggle{background:none;border:none;font-size:.74rem;color:var(--inkFaint);cursor:pointer;padding:4px 0;font-family:var(--font-ui);text-align:right;direction:rtl}
    .dismiss-toggle:hover{color:var(--ink)}
    .dismiss-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s cubic-bezier(.2,.7,.3,1)}
    .dismiss-panel.open{grid-template-rows:1fr}
    .dismiss-panel-inner{overflow:hidden;min-height:0}
    .dismiss-btns{display:flex;gap:7px;flex-wrap:wrap;padding-top:7px}
    .dismiss-btn{padding:8px 13px;border-radius:999px;font-size:.74rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;border:none;background:var(--error-container);color:#5c0d0d;transition:all .12s;outline:none}
    .dismiss-btn:hover{filter:brightness(.96)}
    .undismiss-link{font-size:.7rem;color:var(--inkFaint);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-ui);padding:0}
    .undismiss-link:hover{color:var(--ink)}
    .dismissed-banner{background:var(--error-container);border-radius:999px;padding:7px 14px;font-size:.72rem;color:#5c0d0d;display:flex;align-items:center;justify-content:space-between;gap:8px}

    /* ===== TOAST ===== */
    #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--toast-bg);color:#fff;border-radius:999px;padding:13px 24px;font-size:.84rem;font-weight:600;font-family:var(--font-ui);z-index:999;transition:transform .3s cubic-bezier(.2,.7,.3,1),opacity .3s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.22);opacity:0;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* ===== EXTENDED FAB ===== */
    .fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;border:none;border-radius:20px;padding:16px 26px;font-size:.9rem;font-weight:700;font-family:var(--font-ui);box-shadow:0 6px 20px rgba(79,107,237,.45);display:flex;align-items:center;gap:9px;cursor:pointer;z-index:50;transition:transform .12s}
    .fab:active{transform:translateX(-50%) scale(.96)}
    .fab .material-symbols-rounded{font-size:22px}

    /* ===== MODAL (CV + Analytics + Prep) ===== */
    #modal,#sheet{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
    #modal.show,#sheet.show{display:flex}
    .modal-card{background:var(--surface);width:100%;max-width:560px;max-height:90vh;border-radius:28px 28px 0 0;display:flex;flex-direction:column;overflow:hidden}
    @media(min-width:560px){#modal,#sheet{align-items:center}.modal-card{border-radius:28px}}
    .modal-head{padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{font-size:1.1rem;font-weight:800}
    .modal-sub{font-size:.74rem;color:var(--inkSoft);margin-top:1px}
    .modal-close{background:var(--surface-container-highest);border:none;width:38px;height:38px;border-radius:50%;font-size:1.1rem;cursor:pointer;color:var(--inkSoft)}
    .modal-body{padding:6px 20px 16px;overflow-y:auto;white-space:pre-wrap;font-size:.8rem;line-height:1.55;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .modal-foot{padding:14px 20px;display:flex;gap:9px}
    .modal-foot .act-btn{min-width:0}

    /* analytics */
    .an-body{padding:6px 20px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
    .an-funnel{display:flex;flex-direction:column;gap:9px}
    .an-stage{background:var(--surface-container);border-radius:18px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
    .an-stage .lbl{font-weight:700;font-size:.88rem}
    .an-stage .barwrap{flex:1;margin:0 14px;height:10px;background:var(--surface-container-highest);border-radius:999px;overflow:hidden}
    .an-stage .bar{height:100%;border-radius:999px;background:var(--primary)}
    .an-stage .v{font-weight:800;font-size:1.1rem;min-width:30px;text-align:left}
    .an-conv{display:flex;gap:10px}
    .an-conv .card{flex:1;background:var(--primary-container);color:var(--on-primary-container);border-radius:20px;padding:14px;text-align:center}
    .an-conv .card .pct{font-size:1.7rem;font-weight:900}
    .an-conv .card .cl{font-size:.66rem;font-weight:600;opacity:.75;margin-top:2px}
    .an-row{display:flex;gap:10px;flex-wrap:wrap}
    .an-kpi{flex:1;min-width:120px;background:var(--surface-container);border-radius:20px;padding:14px 16px}
    .an-kpi .v{font-size:1.5rem;font-weight:800}
    .an-kpi .cl{font-size:.68rem;color:var(--inkSoft);font-weight:600;margin-top:1px}

    /* ===== SETTINGS DRAWER ===== */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none;backdrop-filter:blur(2px)}
    .drawer-overlay.show{display:block}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:min(400px,95vw);background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:200;transform:translateX(-100%);transition:transform .3s cubic-bezier(.2,.7,.3,1);display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-head{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .drawer-head h3{font-size:1.1rem;font-weight:800;color:var(--ink)}
    .drawer-close{background:var(--surface-container-highest);border:none;width:38px;height:38px;border-radius:50%;font-size:1.1rem;cursor:pointer;color:var(--inkSoft);flex-shrink:0}
    .drawer-tabs{display:flex;gap:6px;padding:0 16px 10px;flex-shrink:0}
    .dtab{flex:1;padding:9px 6px;font-size:.76rem;font-weight:600;font-family:var(--font-ui);color:var(--inkSoft);border:none;background:var(--surface-container);cursor:pointer;border-radius:999px;transition:all .12s;text-align:center}
    .dtab.on{color:var(--on-secondary-container);background:var(--secondary-container)}
    .drawer-body{flex:1;overflow-y:auto;padding:8px 18px 18px;display:flex;flex-direction:column;gap:14px}
    .d-section{display:flex;flex-direction:column;gap:7px}
    .d-lbl{font-size:.66rem;font-weight:700;color:var(--inkFaint)}
    .d-inp{width:100%;border:none;border-radius:14px;padding:11px 13px;font-size:.84rem;font-family:var(--font-ui);color:var(--ink);background:var(--surface-container-highest);outline:none;direction:rtl;transition:box-shadow .15s}
    .d-inp:focus{box-shadow:0 0 0 2px var(--primary)}
    .d-ta{width:100%;border:none;border-radius:14px;padding:11px 13px;font-size:.8rem;font-family:var(--font-ui);color:var(--ink);resize:vertical;min-height:100px;background:var(--surface-container-highest);outline:none;direction:rtl;transition:box-shadow .15s}
    .d-ta:focus{box-shadow:0 0 0 2px var(--primary)}
    .d-hint{font-size:.68rem;color:var(--inkFaint);line-height:1.5}
    .d-btn{padding:11px 16px;border-radius:999px;font-size:.78rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;border:none;background:var(--secondary-container);color:var(--on-secondary-container);transition:all .13s;text-align:center}
    .d-btn:hover{filter:brightness(.97)}
    .d-btn.primary{background:var(--primary);color:#fff}
    .d-tab-panel{display:none;flex-direction:column;gap:14px}
    .d-tab-panel.on{display:flex}
    .d-status{font-size:.72rem;color:var(--inkFaint);margin-top:2px}

    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

    /* ===== MOBILE OPTIMISATIONS ===== */
    /* prevent iOS auto-zoom on focus: inputs must be ≥16px */
    .search-inp,.notes-ta,.round-inp,.round-sel,.round-note,.d-inp,.d-ta{font-size:16px}
    /* respect notch / home-indicator safe areas */
    #app{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
    .fab{bottom:max(22px,calc(env(safe-area-inset-bottom) + 14px))}
    #toast{bottom:max(90px,calc(env(safe-area-inset-bottom) + 80px))}
    /* smooth momentum scroll for chip rows */
    .filter-row{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    .filter-row::-webkit-scrollbar{display:none}
    .sf-chip,.fit-chip,.sort-btn,.exp-btn,.chan-btn{flex-shrink:0}
    /* kill tap highlight + allow active feedback */
    *{-webkit-tap-highlight-color:transparent}
    button,a,.f-stage,.card-head{touch-action:manipulation}

    @media(max-width:480px){
      #app{padding-top:10px;gap:12px}
      .hero{padding:18px 18px;border-radius:26px}
      .hero-coach{font-size:1.28rem}
      .f-count{font-size:1.55rem}
      .f-label{font-size:.6rem}
      .toolbar{padding:14px;border-radius:24px}
      .search-row{gap:8px}
      .sort-seg{width:100%}
      .job-card{border-radius:24px}
      .card-head{padding:15px 16px;gap:11px}
      .card-company{font-size:1.1rem}
      .fit-mark{width:48px;height:48px;border-radius:15px}
      .fit-num{font-size:1.25rem}
      .card-body{padding:0 16px 16px}
      /* action buttons: stable 2-per-row grid for thumb reach */
      .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      .act-btn{min-width:0;padding:13px 6px;font-size:.76rem}
      .act-open{grid-column:span 2}
      .act-dismiss{grid-column:span 2}
      .step-btn{padding:11px 3px;font-size:.72rem}
      .fab{padding:15px 22px;font-size:.88rem}
      .modal-card{max-height:92vh}
    }
    @media(max-width:340px){
      .stepper{flex-wrap:wrap}
      .step-btn{flex:1 1 28%}
    }

    /* ===== STICKY TOOLBAR ===== */
    .toolbar{position:sticky;top:8px;z-index:30;box-shadow:0 2px 14px rgba(20,20,40,.06)}

    /* ===== DESKTOP / MAC WIDE LAYOUT ===== */
    @media(hover:hover) and (pointer:fine){
      .job-card{cursor:pointer}
      /* Material elevation lift on hover */
      .job-card:hover{background:var(--surface-container-high);transform:translateY(-2px);box-shadow:0 4px 16px rgba(20,20,40,.10)}
      .job-card.open:hover{transform:none}
      .act-btn:hover,.d-btn:hover,.step-btn:hover,.chan-btn:hover,.sf-chip:hover,.fit-chip:hover,.sort-btn:hover,.exp-btn:hover,.round-add:hover,.clink:hover{filter:brightness(.97)}
      .sheet-btn:hover,.scan-btn:hover,.settings-btn:hover{background:#fff}
      .fab:hover{box-shadow:0 8px 26px rgba(79,107,237,.55);transform:translateX(-50%) translateY(-1px)}
      .modal-close:hover,.drawer-close:hover{filter:brightness(.94)}
      /* scrollbars — subtle, Apple-like */
      *::-webkit-scrollbar{width:10px;height:10px}
      *::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
      *::-webkit-scrollbar-thumb:hover{background:var(--inkFaint)}
      *::-webkit-scrollbar-track{background:transparent}
    }
    /* fluid grid: auto-fit columns, breathes with the viewport */
    @media(min-width:860px){
      #app{max-width:1180px;padding:22px 22px 80px}
      .hero{padding:28px 30px}
      .hero-coach{font-size:1.9rem}
      .f-count{font-size:2.2rem}
      #container{display:grid!important;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;align-items:start}
      .job-card{align-self:start;transition:background .2s,transform .18s cubic-bezier(.2,.7,.3,1),box-shadow .2s}
      /* desktop FAB → bottom-right corner (Material) */
      .fab{left:auto;right:32px;transform:none;border-radius:18px}
      .fab:active{transform:scale(.96)}
      .toolbar{top:14px}
      /* roomier cards */
      .card-head{padding:20px 22px}
      .card-body{padding:0 22px 20px}
      .modal-card{max-width:620px}
    }
    @media(min-width:1320px){
      #app{max-width:1500px}
    }
    /* ===== MASTER–DETAIL (desktop ≥1024px) ===== */
    #nav-rail{display:none}
    #desktop-topbar{display:none}
    #list-col{display:contents}
    #list-search-bar{display:none}
    #detail{display:none}
    @media(min-width:1024px){
      /* Full-height viewport app shell */
      html{height:100%}
      body{height:100%;overflow:hidden}

      /* Nav rail — fixed, right side (RTL) */
      #nav-rail{
        display:flex!important;
        position:fixed;right:0;top:0;bottom:0;width:80px;
        background:var(--surface-container);
        border-left:1px solid var(--lineSoft);
        flex-direction:column;align-items:center;
        padding:12px 0 16px;gap:2px;z-index:100;
      }
      .nr-item{
        width:100%;display:flex;flex-direction:column;align-items:center;
        padding:10px 8px 10px;gap:3px;cursor:pointer;
        position:relative;border:none;background:none;
        font-family:var(--font-ui);color:var(--inkSoft);
        transition:color .15s;
      }
      .nr-lbl{font-size:.58rem;font-weight:600;line-height:1}
      .nr-item .material-symbols-rounded{font-size:24px;position:relative;z-index:1}
      .nr-item .nr-lbl{position:relative;z-index:1}
      .nr-item::before{
        content:'';position:absolute;
        top:4px;right:12px;bottom:4px;left:12px;
        border-radius:16px;background:transparent;transition:background .15s;
      }
      .nr-item:hover::before{background:rgba(0,0,0,.06)}
      .nr-item.active{color:var(--on-secondary-container)}
      .nr-item.active::before{background:var(--secondary-container)}
      .nr-spacer{flex:1}
      html[data-theme=dark] .nr-item:hover::before{background:rgba(255,255,255,.08)}

      /* App shell: shift content right by nav rail width, full height */
      #app{
        margin-right:80px;
        max-width:none;padding:0;
        height:100vh;overflow:hidden;
        display:grid;
        grid-template-rows:auto 1fr;
      }

      /* Desktop top bar */
      #desktop-topbar{
        display:flex!important;
        align-items:center;gap:16px;
        padding:0 24px;height:64px;flex-shrink:0;
        background:var(--surface);
        border-bottom:1px solid var(--lineSoft);
        position:relative;z-index:31;
        box-shadow:0 1px 3px rgba(0,0,0,.06);
      }
      .dtb-title{
        font-size:1.15rem;font-weight:800;color:var(--ink);
        white-space:nowrap;
      }
      .dtb-stats{
        display:flex;gap:8px;flex:1;
        justify-content:center;
      }
      .dtb-stat{
        display:flex;flex-direction:column;align-items:center;
        padding:6px 16px;border-radius:12px;
        background:var(--surface-container);
        cursor:pointer;transition:background .15s;
        border:1.5px solid transparent;
        min-width:64px;
      }
      .dtb-stat:hover{background:var(--surface-container-high)}
      .dtb-stat.active{background:var(--secondary-container);border-color:var(--primary)}
      .dtb-stat .v{font-size:1.2rem;font-weight:800;color:var(--ink);line-height:1.1}
      .dtb-stat .l{font-size:.58rem;font-weight:600;color:var(--inkFaint);margin-top:2px}
      .dtb-stat.active .v{color:var(--on-secondary-container)}
      .dtb-stat.active .l{color:var(--on-secondary-container);opacity:.8}
      .dtb-actions{display:flex;align-items:center;gap:8px;margin-inline-start:auto}
      .dtb-scan{
        display:inline-flex;align-items:center;gap:6px;
        background:var(--primary);color:#fff;border:none;
        border-radius:20px;padding:10px 18px;font-size:.8rem;font-weight:700;
        font-family:var(--font-ui);cursor:pointer;transition:all .15s;
      }
      .dtb-scan:hover{background:var(--accentDeep);box-shadow:0 2px 8px rgba(79,107,237,.35)}
      .dtb-scan:disabled{opacity:.5;cursor:not-allowed}
      .dtb-scan .material-symbols-rounded{font-size:18px}

      /* Hide mobile hero + standalone FAB + standalone toolbar on desktop */
      .hero{display:none!important}
      .fab{display:none!important}
      .toolbar{display:none!important}

      /* Work area — fills remaining height */
      #work{
        display:grid!important;
        grid-template-columns:320px 1fr;
        gap:0!important;
        height:100%;overflow:hidden;
        align-items:stretch!important;
      }

      /* List column */
      #list-col{
        display:flex!important;flex-direction:column;
        height:100%;overflow:hidden;
        background:var(--surface-container);
        border-left:1px solid var(--lineSoft);
      }
      #list-search-bar{
        display:flex!important;
        padding:10px 10px 6px;
        background:var(--surface-container);
        border-bottom:1px solid var(--lineSoft);
        flex-shrink:0;
        gap:8px;align-items:center;
      }
      #list-search-bar .search-wrap{flex:1}
      #list-search-bar .search-inp{background:var(--surface-container-high)!important;font-size:.84rem!important}

      /* List column: surface-container bg, full height scroll */
      #container{
        display:flex!important;flex-direction:column;
        gap:2px!important;padding:8px!important;
        position:static!important;
        flex:1;overflow-y:auto;
        background:var(--surface-container);
      }

      /* Rail rows — Google-grade dense list items */
      .rail-row{
        display:flex;align-items:center;gap:10px;
        background:transparent;border-radius:12px;
        padding:10px 12px;cursor:pointer;
        transition:background .13s;border:1.5px solid transparent;
        position:relative;
      }
      .rail-row::after{
        content:'';position:absolute;inset:0;border-radius:inherit;
        background:currentColor;opacity:0;transition:opacity .1s;pointer-events:none;
      }
      .rail-row:hover{background:var(--surface-container-high)}
      .rail-row:hover::after{opacity:.04}
      .rail-row:active::after{opacity:.08}
      .rail-row.sel{
        background:var(--secondary-container);
        border-color:rgba(79,107,237,.25);
      }
      .rail-row.sel::after{display:none}
      .rr-fit{width:38px;height:38px;border-radius:11px;font-size:.98rem;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
      .rr-text{flex:1;min-width:0}
      .rr-co{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right}
      .rr-ti{font-size:.72rem;color:var(--inkSoft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right}
      .rr-date{font-size:.6rem;color:var(--inkFaint);margin-top:2px}
      .rr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
      .rr-star{color:var(--star);font-size:.85rem;flex-shrink:0}

      /* Detail pane */
      #detail{
        display:block;height:100%;overflow-y:auto;
        background:var(--surface);min-width:0;
      }
      #detail .job-card{
        box-shadow:none!important;border-radius:0!important;
        background:transparent!important;
      }
      #detail .card-head{
        padding:22px 28px 14px!important;
        border-bottom:1px solid var(--lineSoft);
        cursor:default!important;
      }
      #detail .card-body{padding:20px 28px 28px!important}
      #detail .chevron{display:none!important}
      #detail .job-card:active{transform:none!important}
      #detail .job-card:hover{transform:none!important;box-shadow:none!important;background:transparent!important}

      .detail-empty{
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100%;gap:12px;
        color:var(--inkFaint);background:var(--surface);
      }
      .detail-empty .de-icon{font-size:3.5rem;opacity:.3}
      .detail-empty .de-text{font-weight:700;font-size:.95rem}
      .detail-empty .de-sub{font-size:.78rem;font-weight:400;opacity:.7}
    }
    /* keyboard-shortcut hint chip */
    .kbd{font-family:var(--font-mono);font-size:.62rem;background:var(--surface-container-highest);border-radius:6px;padding:1px 6px;color:var(--inkFaint);margin-inline-start:6px}
    @media(max-width:859px){.kbd{display:none}}
    /* keyboard accessibility */
    :focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:8px}

    /* ===== DARK MODE (Material 3 dark palette) — toggled via [data-theme] on <html> ===== */
    html[data-theme="dark"]{
      --primary:#b9c3ff;
      --on-primary:#001257;
      --primary-container:#33479b;
      --on-primary-container:#dde1ff;
      --secondary-container:#3a3f57;
      --on-secondary-container:#dfe1f9;
      --tertiary-container:#5c3f4a;
      --on-tertiary-container:#ffd8e8;
      --canvas:#121318;
      --surface:#121318;
      --surfaceAlt:#1e1f25;
      --surface-container:#1e1f25;
      --surface-container-high:#282a30;
      --surface-container-highest:#33343b;
      --ink:#e4e1e9;
      --inkSoft:#c7c5d0;
      --inkFaint:#918f9a;
      --line:#46464f;
      --lineSoft:#33343b;
      --accent:#b9c3ff;
      --accentDeep:#dde1ff;
      --accentSoft:#33479b;
      --accentInk:#dde1ff;
      --onAccent:#001257;
      --heroBg:#33479b;
      --wa:#7ad6a0;
      --star:#e8c45a;
      --toast-bg:#e4e1e9;
      --success:#7ad6a0;
      --success-container:#1d4a30;
      --error-container:#5c1414;
    }
    html[data-theme="dark"] #toast{color:#1b1b21}
    html[data-theme="dark"] .save-btn,
    html[data-theme="dark"] .act-open,
    html[data-theme="dark"] .chan-btn.on,
    html[data-theme="dark"] .step-btn.on,
    html[data-theme="dark"] .fab,
    html[data-theme="dark"] .d-btn.primary,
    html[data-theme="dark"] .new-badge{color:#001257}
    html[data-theme="dark"] .act-wa{background:var(--success-container);color:#b3f1c7}
    html[data-theme="dark"] .act-dismiss,
    html[data-theme="dark"] .dismiss-btn{background:var(--error-container);color:#ffdad6}
    html[data-theme="dark"] .act-dossier{background:#1f3a5f;color:#cfe0ff}
    html[data-theme="dark"] .round-card.r-passed{background:#1d4a30}
    html[data-theme="dark"] .round-card.r-rejected{background:#5c1414}
  </style>
</head>
<body>
<nav id="nav-rail">
  <button class="nr-item active" id="nr-jobs" onclick="nr('jobs')" title="משרות">
    <span class="material-symbols-rounded">work</span>
    <span class="nr-lbl">משרות</span>
  </button>
  <button class="nr-item" id="nr-analytics" onclick="nr('analytics')" title="אנליטיקה">
    <span class="material-symbols-rounded">analytics</span>
    <span class="nr-lbl">סטטיסטיקה</span>
  </button>
  <div class="nr-spacer"></div>
  <button class="nr-item" id="nr-support" onclick="openSupport()" title="תמיכה רגשית">
    <span class="material-symbols-rounded">favorite</span>
    <span class="nr-lbl">תמיכה</span>
  </button>
  <button class="nr-item" id="nr-theme" onclick="toggleTheme()" title="מצב תצוגה">
    <span class="material-symbols-rounded" id="theme-ico2">dark_mode</span>
    <span class="nr-lbl">תצוגה</span>
  </button>
  <button class="nr-item" id="nr-settings" onclick="openSettings()" title="הגדרות">
    <span class="material-symbols-rounded">settings</span>
    <span class="nr-lbl">הגדרות</span>
  </button>
</nav>
<div id="app">
  <!-- DESKTOP TOP BAR -->
  <div id="desktop-topbar">
    <div class="dtb-title">Job Tracker</div>
    <div class="dtb-stats" id="dtb-stats"></div>
    <div class="dtb-actions">
      <button class="dtb-scan" id="dtb-scan-btn" onclick="triggerScan()">
        <span class="material-symbols-rounded">refresh</span>
        סרוק עכשיו
      </button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-greeting">בוקר טוב, עומרי 👋</div>
        <div class="hero-meta" id="hero-meta"></div>
      </div>
      <div class="hero-actions">
        <button class="settings-btn" onclick="toggleTheme()" id="theme-btn" title="מצב תצוגה"><span class="material-symbols-rounded" id="theme-ico">dark_mode</span></button>
        <button class="settings-btn" onclick="openAnalytics()" title="ניתוח"><span class="material-symbols-rounded">analytics</span></button>
        <button class="settings-btn" onclick="openSettings()" title="הגדרות"><span class="material-symbols-rounded">settings</span></button>
      </div>
    </div>
    <div class="hero-coach" id="hero-coach"></div>
    <div class="funnel" id="funnel"></div>
    <div class="m-chips" id="m-chips"></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ico material-symbols-rounded">search</span>
        <input class="search-inp" id="search-inp" type="text" placeholder="חיפוש חברה או תפקיד…" oninput="onSearch(this)"/>
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="sort-seg">
        <button class="sort-btn" data-val="score" onclick="setSort(this)">התאמה</button>
        <button class="sort-btn on" data-val="posted" onclick="setSort(this)">עדכני</button>
        <button class="sort-btn" data-val="az" onclick="setSort(this)">A–Z</button>
      </div>

function getCV(){
  const ov=JSON.parse(localStorage.getItem('cv_override')||'{}');
  return{...CV_BASE,...ov};
}
const CV=CV_BASE;

/* ── localStorage state ── */
function jobKey(j){return(j.company+"|"+j.title).replace(/\s+/g,"_");}
function loadState(){try{return JSON.parse(localStorage.getItem("jobState")||"{}");}catch(e){return{};}}
function saveState(s){localStorage.setItem("jobState",JSON.stringify(s));}
let STATE=loadState();
function getJobState(j){const def=j.initial_status?{status:j.initial_status,channel:null,statusDate:j.initial_status_date||null,starred:false,note:""}:{status:"saved",channel:null,statusDate:null,starred:false,note:""};return STATE[jobKey(j)]||def;}
function getStage(j){const s=getJobState(j).status||"saved";return s==="todo"?"saved":s;}

const STAGE_TOASTS={
  offer:"🎉 הצעה! עוד צעד קדימה — אתה במסלול הנכון",
  interview:"💪 ראיון! המומנטום עובד בשבילך",
  applied:"✓ הוגש. כל הגשה מקרבת אותך",
  saved:"📌 שמור להגשה",
  rejected:"— נסגר. מתקדמים לפנים"
};

function setStatus(j,status){
  const k=jobKey(j),cur=STATE[k]||{};
  cur.status=status;cur.statusDate=new Date().toISOString().slice(0,10);
  STATE[k]=cur;saveState(STATE);
  if(STAGE_TOASTS[status])showToast(STAGE_TOASTS[status]);
  render();
}
function setChannel(j,ch){
  const k=jobKey(j),cur=STATE[k]||{status:"saved"};
  cur.channel=ch;STATE[k]=cur;saveState(STATE);render();
}
function toggleStar(j){
  const k=jobKey(j),cur=STATE[k]||{status:"saved"};
  cur.starred=!cur.starred;STATE[k]=cur;saveState(STATE);render();
}
function saveNote(j,val){
  const k=jobKey(j),cur=STATE[k]||{status:"saved"};
  cur.note=val;STATE[k]=cur;saveState(STATE);
}
function saveField(type,i){
  const j=window._sorted[i];
  const ta=document.getElementById(type+"-"+i);
  const ack=document.getElementById(type+"-ack-"+i);
  if(!ta)return;
  const val=ta.value;
  if(type==="fb"){
    saveScoringFeedback(j,val);
    ta.className="notes-ta score-fb"+(val?" has-note":"");
  } else {
    saveNote(j,val);
    ta.className=val?"notes-ta has-note":"notes-ta";
  }
  if(ack){ack.textContent="✓ נשמר";ack.style.color="var(--accent)";setTimeout(()=>{ack.textContent="";},2000);}
}
/* ── interview rounds ── */
const ROUND_STAGES=["ראיון טלפוני","ראיון HR","ראיון וידאו","ראיון מקצועי","ראיון טכני","עבודת בית / מטלה","ראיון מנהל","ראיון סופי","אחר"];
const ROUND_OUTCOMES=[["pending","⏳ ממתין"],["passed","✅ עבר"],["rejected","❌ נדחה"]];
function getRounds(j){const k=jobKey(j),cur=STATE[k]||{};return cur.interviews||j.initial_rounds||[];}
function seedRounds(j,cur){if(!cur.interviews)cur.interviews=j.initial_rounds?JSON.parse(JSON.stringify(j.initial_rounds)):[];return cur;}
function addRound(i){
  const j=window._sorted[i],k=jobKey(j);let cur=STATE[k]||{status:"saved"};seedRounds(j,cur);
  cur.interviews.push({date:new Date().toISOString().slice(0,10),interviewer:"",stage:ROUND_STAGES[0],outcome:"pending",note:""});
  STATE[k]=cur;saveState(STATE);render();
}
function updateRound(i,ri,field,val){
  const j=window._sorted[i],k=jobKey(j);let cur=STATE[k]||{status:"saved"};seedRounds(j,cur);
  if(!cur.interviews[ri])return;
  cur.interviews[ri][field]=val;STATE[k]=cur;saveState(STATE);
  if(field==="outcome")render();
}
function removeRound(i,ri){
  const j=window._sorted[i],k=jobKey(j);let cur=STATE[k]||{status:"saved"};seedRounds(j,cur);
  cur.interviews.splice(ri,1);STATE[k]=cur;saveState(STATE);render();
}
function roundsHTML(j,i){
  const rounds=getRounds(j);
  const cards=rounds.map((r,ri)=>{
    const cls=r.outcome==="passed"?" r-passed":r.outcome==="rejected"?" r-rejected":"";
    const stageList=ROUND_STAGES.includes(r.stage)||!r.stage?ROUND_STAGES:[r.stage,...ROUND_STAGES];
    const stageOpts=stageList.map(s=>`<option ${s===r.stage?"selected":""}>${s}</option>`).join("");
    const outOpts=ROUND_OUTCOMES.map(([v,l])=>`<option value="${v}" ${v===r.outcome?"selected":""}>${l}</option>`).join("");
    return `<div class="round-card${cls}">
      <button class="round-del" title="מחק סבב" onclick='event.stopPropagation();removeRound(${i},${ri})'>🗑️</button>
      <div class="round-row">
        <input class="round-inp r-date" type="date" value="${r.date||""}" onclick="event.stopPropagation()" onchange='updateRound(${i},${ri},"date",this.value)'/>
        <input class="round-inp r-name" type="text" placeholder="שם המראיין" value="${(r.interviewer||"").replace(/"/g,"&quot;")}" onclick="event.stopPropagation()" onchange='updateRound(${i},${ri},"interviewer",this.value)'/>
      </div>
      <div class="round-row">
        <select class="round-sel" onclick="event.stopPropagation()" onchange='updateRound(${i},${ri},"stage",this.value)'>${stageOpts}</select>
        <select class="round-sel" onclick="event.stopPropagation()" onchange='updateRound(${i},${ri},"outcome",this.value)'>${outOpts}</select>
      </div>
      <textarea class="round-note" rows="1" placeholder="סיכום הסבב, שאלות, רושם…" onclick="event.stopPropagation()" onchange='updateRound(${i},${ri},"note",this.value)'>${(r.note||"").replace(/</g,"&lt;")}</textarea>
    </div>`;
  }).join("");
  return `<div class="rounds-wrap">
    <div class="rounds-lbl"><span>🎙️ סבבי ראיונות${rounds.length?` (${rounds.length})`:""}</span></div>
    ${cards}
    <button class="round-add" onclick='event.stopPropagation();addRound(${i})'>➕ הוסף סבב ראיון</button>
  </div>`;
}
function saveScoringFeedback(j,val){
  const k=jobKey(j),cur=STATE[k]||{status:"saved"};
  cur.score_feedback=val;STATE[k]=cur;saveState(STATE);
  clearTimeout(window._fbTimer);
  if(val&&localStorage.getItem('gh_token'))
    window._fbTimer=setTimeout(syncFeedback,4000);

/* ── dismiss ── */
function dismissJob(j,reason){
  const k=jobKey(j),cur=STATE[k]||{status:"saved"};
  cur.dismissed=true;cur.dismiss_reason=reason;cur.dismiss_date=new Date().toISOString().slice(0,10);cur.company=j.company;

  render();
}
function learnIrrelevant(btn,i){
  const j=window._sorted[i];
  const card=btn.closest(".job-card");
  if(card){card.classList.add("removing");setTimeout(()=>dismissJob(j,"irrelevant"),280);}
  else dismissJob(j,"irrelevant");
}
function undismissJob(j){
  const k=jobKey(j),cur=STATE[k]||{};
  cur.dismissed=false;cur.dismiss_reason=null;cur.dismiss_date=null;
  STATE[k]=cur;saveState(STATE);render();
}
function toggleDismissPanel(btn){btn.nextElementSibling.classList.toggle('open');}

/* ── stats ── */
function computeStats(){
  const by={saved:0,applied:0,interview:0,offer:0,rejected:0};
  let starred=0,followup=0,dismissedCount=0,newCount=0;
  JOBS.forEach(j=>{
    const st=getJobState(j);
    if(st.dismissed){dismissedCount++;return;}
    const stage=getStage(j);
    if(by[stage]!==undefined)by[stage]++;
    if(st.starred)starred++;
    if(needsFollowup(st))followup++;
    if(isNew(j))newCount++;
  });
  const inPlay=by.saved+by.applied+by.interview;
  return{by,starred,followup,inPlay,interviews:by.interview,offers:by.offer,total:JOBS.length,dismissed:dismissedCount,newCount};
}
function coachLine(stats){
  if(stats.offers>0)return`יש לך ${stats.offers} הצעות 🎉`;
  if(stats.interviews>0)return`${stats.interviews} ראיונות בתהליך 💪`;
  if(stats.inPlay>0)return`${stats.inPlay} מועמדויות בתהליך`;
  return"בוא נצבור מומנטום 🚀";
}
function needsFollowup(st){
  if(getStage({company:st.company,title:st.title}||{})==="applied"||st.status==="applied"){
    if(!st.statusDate)return false;
    return Math.round((new Date()-new Date(st.statusDate))/86400000)>=7;
  }
  return false;
}
function needsFollowupDirect(st){
  if(st.status!=="applied")return false;
  if(!st.statusDate)return false;
  return Math.round((new Date()-new Date(st.statusDate))/86400000)>=7;

function tailorData(j){
  const cvData=getCV();
  const text=((j.title||"")+" "+(j.description||"")+" "+(j.score_reason||"")+" "+(j.ai_opener||"")).toLowerCase();
  const score=arr=>arr.reduce((n,kw)=>n+(text.includes(kw)?1:0),0);
  const comps=[...cvData.competencies].map(c=>({t:c.t,s:score(c.k)})).sort((a,b)=>b.s-a.s);
  const useComps=(comps.filter(c=>c.s>0).slice(0,4).length?comps.filter(c=>c.s>0).slice(0,4):comps.slice(0,4)).map(c=>c.t);
  const exp=cvData.experience.map(e=>{
    const bl=[...e.bullets].map(b=>({t:b.t,s:score(b.k)})).sort((a,b)=>b.s-a.s);
    return{role:e.role,org:e.org,dates:e.dates,bullets:bl.slice(0,3).map(b=>b.t)};
  });
  return{useComps,exp};
}
function tailorCV(j){
  const cvData=getCV();
  const{useComps,exp}=tailorData(j);
  let L=[];
  L.push(cvData.name,cvData.tagline,cvData.contact,"","— TAILORED FOR: "+j.title+" @ "+j.company+" —","","PROFILE");
  L.push(cvData.summary+" Directly aligned with "+j.company+"'s need for "+j.title+".","","KEY STRENGTHS FOR THIS ROLE");
  useComps.forEach(c=>L.push("• "+c));
  L.push("","EXPERIENCE");
  exp.forEach(e=>{L.push(e.role+" | "+e.org+"  ("+e.dates+")");e.bullets.forEach(b=>L.push("  • "+b));L.push("");});
  L.push("EDUCATION",cvData.education);
  return L.join("\n");
}

function openAnalytics(){
  const stats=computeStats();
  const stageDefs=[["saved","שמורות","#4F6BED"],["applied","הוגשו","#0b66c2"],["interview","ראיונות","#9c4267"],["offer","הצעות","#2e6b46"],["rejected","נסגרו","#ba1a1a"]];
  const max=Math.max(1,...stageDefs.map(([k])=>stats.by[k]||0));
  const funnel=stageDefs.map(([k,he,col])=>{
    const v=stats.by[k]||0,w=Math.round(v/max*100);
    return`<div class="an-stage"><span class="lbl">${he}</span><div class="barwrap"><div class="bar" style="width:${w}%;background:${col}"></div></div><span class="v">${v}</span></div>`;
  }).join("");
  const applied=stats.by.applied+stats.by.interview+stats.by.offer+stats.by.rejected;
  const reachedInt=stats.by.interview+stats.by.offer;
  const a2i=applied?Math.round(reachedInt/applied*100):0;
  const i2o=reachedInt?Math.round(stats.by.offer/reachedInt*100):0;
  // avg days since last status change for active applied jobs
  let totDays=0,cnt=0;
  JOBS.forEach(j=>{const st=getJobState(j);if(st.dismissed)return;if(st.status==="applied"&&st.statusDate){totDays+=Math.round((NOW-new Date(st.statusDate))/86400000);cnt++;}});
  const avgWait=cnt?Math.round(totDays/cnt):0;
  // interview rounds count
  let totalRounds=0,passed=0;
  JOBS.forEach(j=>{getRounds(j).forEach(r=>{totalRounds++;if(r.outcome==="passed")passed++;});});
  document.getElementById("an-body").innerHTML=`
    <div class="an-conv">
      <div class="card"><div class="pct">${a2i}%</div><div class="cl">הגשה → ראיון</div></div>
      <div class="card"><div class="pct">${i2o}%</div><div class="cl">ראיון → הצעה</div></div>
    </div>
    <div class="an-funnel">${funnel}</div>
    <div class="an-row">
      <div class="an-kpi"><div class="v">${avgWait} ימים</div><div class="cl">המתנה ממוצעת אחרי הגשה</div></div>
      <div class="an-kpi"><div class="v">${passed}/${totalRounds}</div><div class="cl">סבבי ראיון שעברת</div></div>
      <div class="an-kpi"><div class="v">${stats.followup}</div><div class="cl">ממתינים ל-follow up</div></div>

          <div class="fit-lbl" style="color:${fc.fg}">FIT</div>
        </div>
        <div class="card-text">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
          ${j.posted?`<div class="card-posted">🕐 ${postedLabel(j.posted)}</div>`:""}
        </div>
        <div class="card-head-right">
          <div class="s-pill" style="--s-bg:${sc.bg};--s-fg:${sc.fg};--s-solid:${sc.solid}">
            <span class="s-dot"></span>${sm.he}${st.statusDate?" · "+fmtDate(st.statusDate):""}
          </div>
          ${follow?`<span class="follow-badge">💬 Follow up?</span>`:""}
          ${novel?`<span class="new-badge">חדש ✨</span>`:""}
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body-wrap">
        <div class="card-body-inner">
          <div class="card-body">
            <div class="meta-chips">
              ${j.posted?`<span class="meta-chip">🕐 ${postedLabel(j.posted)}</span>`:""}
              ${j.location?`<span class="meta-chip">📍 ${j.location}</span>`:""}
              ${j.job_type?`<span class="meta-chip">⚡ ${j.job_type}</span>`:""}
            </div>
            ${aiNote?`<div class="ai-note"><div class="ai-note-head">⚡ התאמת AI</div><div class="ai-note-text">${aiNote}</div></div>`:""}
            ${contactHTML}
            <div class="notes-wrap">
              <div class="notes-lbl">🧠 פידבק לסינון <span style="font-weight:400;opacity:.6;font-size:.6rem">(משפר את הניקוד בסריקה הבאה)</span></div>
              <textarea class="notes-ta score-fb${st.score_feedback?" has-note":""}" id="fb-${i}" rows="2"
                placeholder="למשל: החברה קטנה מדי / התפקיד מדי טכני / מיקום בעייתי / שכר לא מספיק…"
                onclick="event.stopPropagation()">${(st.score_feedback||"").replace(/"/g,"&quot;")}</textarea>
              <div class="save-row">
                <button class="save-btn" id="fb-save-${i}" onclick='event.stopPropagation();saveField("fb",${i})'>שמור פידבק 💾</button>
                <span class="saved-ack" id="fb-ack-${i}"></span>
              </div>
            </div>
            ${roundsHTML(j,i)}
            <div class="notes-wrap">
              <div class="notes-lbl">📝 הערות אישיות</div>
              <textarea class="notes-ta${st.note?" has-note":""}" id="note-${i}" rows="2"
                placeholder="מה קרה עד עכשיו? אנשי קשר, משימות, תאריכים…"
                onclick="event.stopPropagation()">${noteVal}</textarea>
              <div class="save-row">
                <button class="save-btn" id="note-save-${i}" onclick='event.stopPropagation();saveField("note",${i})'>שמור הערות 💾</button>
                <span class="saved-ack" id="note-ack-${i}"></span>
              </div>
            </div>
            <div class="stepper-wrap">
              <div class="stepper-lbl">📌 איפה זה עומד?</div>
              <div class="stepper">${stepBtns}</div>
            </div>
            ${channelHTML}
            <div class="actions">
              <button class="act-btn act-letter" onclick='event.stopPropagation();copyLetterPrompt(this,${i})'><span class="material-symbols-rounded">mail</span>מכתב</button>
              <button class="act-btn act-prep" onclick='event.stopPropagation();openPrep(${i})'><span class="material-symbols-rounded">quiz</span>הכנה לראיון</button>
              <button class="act-btn act-dossier" onclick='event.stopPropagation();openDossier(${i})'><span class="material-symbols-rounded">corporate_fare</span>דוסייר</button>
              <button class="act-btn act-cv" onclick='event.stopPropagation();openCV(${i})'><span class="material-symbols-rounded">description</span>קו״ח</button>
              <button class="act-btn act-copy" onclick='event.stopPropagation();copyOpener(this,${i})'>פנייה 📋</button>
              <button class="act-btn act-wa" onclick='event.stopPropagation();shareWA(${i})'>וואטסאפ</button>
              <a href="${j.url}" target="_blank" rel="noopener" class="act-btn act-open" onclick='event.stopPropagation()'><span class="material-symbols-rounded">open_in_new</span>פתח משרה</a>
              <button class="act-btn act-dismiss" onclick='event.stopPropagation();learnIrrelevant(this,${i})'><span class="material-symbols-rounded">thumb_down</span>לא רלוונטי — למד מזה</button>
            </div>
            ${dismissSection}
          </div>
        </div>
      </div>
    </div>`;
  };

  // ── visibility + layout: master-detail on desktop, accordion on mobile ──
  let v=0;
  const desktop=window.matchMedia('(min-width:1024px)').matches;
  const vis=[];
  list.forEach((x,i)=>{ if(jobVisible(x)){v++;vis.push({x,i});} });
  if(desktop){
    if(!vis.some(o=>o.i===window._selIndex))window._selIndex=vis.length?vis[0].i:-1;
    document.getElementById("container").innerHTML=vis.map(o=>buildRailRow(o.x,o.i,o.i===window._selIndex)).join("");
    const selO=vis.find(o=>o.i===window._selIndex);
    document.getElementById("detail").innerHTML=selO?window._buildCard(selO.x,selO.i,true,true):'<div class="detail-empty"><span class="de-icon material-symbols-rounded">work_outline</span><div class="de-text">בחר משרה מהרשימה</div><div class="de-sub">לחץ על משרה כדי לראות פרטים</div></div>';
  }else{
    document.getElementById("detail").innerHTML='';
    document.getElementById("container").innerHTML=list.map((x,i)=>window._buildCard(x,i,false,jobVisible(x))).join("");
  }

  const starredC=JOBS.filter(j=>getJobState(j).starred).length;
  let ct=`${v} משרות`;
  if(starredC)ct+=` · ⭐ ${starredC}`;
  if(stats.followup)ct+=` · 💬 ${stats.followup} follow-up`;
  if(stats.newCount)ct+=` · ✨ ${stats.newCount} חדשות`;
  document.getElementById("count-lbl").textContent=ct;
}

function selectJob(i){window._selIndex=i;render();}

/* ── Navigation rail ── */
function nr(section){
  document.querySelectorAll('.nr-item').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nr-'+section);
  if(btn)btn.classList.add('active');
  if(section==='analytics')openAnalytics();
}
function openSupport(){
  showToast('💙 אתה עושה עבודה מצוינת — כל הגשה מקרבת אותך');
}
function buildRailRow(x,i,sel){
  const j=x.j,st=x.st,stage=x.stage;
  const fc=fitColor(j.fit_score),sc=stageColor(STAGES.find(s=>s.key===stage)?.hue||235);
  const novel=isNew(j),follow=needsFollowupDirect(st);
  const sm=STAGES.find(s=>s.key===stage)||STAGES[0];
  return`<div class="rail-row${sel?" sel":""}" onclick="selectJob(${i})">
    <div class="rr-fit" style="background:${fc.bg};color:${fc.fg}">${j.fit_score}</div>
    <div class="rr-text"><div class="rr-co">${j.company}</div><div class="rr-ti">${j.title}</div></div>
    ${st.starred?'<span class="rr-star">★</span>':''}
    ${novel?'<span class="new-badge">חדש</span>':(follow?'<span class="follow-badge">💬</span>':'')}
    <span class="rr-dot" style="background:${sc.solid}" title="${sm.he}"></span>
  </div>`;
}
function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2400);
}
function copyOpener(btn,i){
  const j=window._sorted[i],text=j.ai_opener||"";
  if(!text){showToast("אין פנייה");return;}
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.innerHTML;btn.textContent="הועתק! ✓";btn.classList.add("copied");showToast("הפנייה הועתקה!");
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("ההעתקה נכשלה"));
}
function copyLetterPrompt(btn,i){
  const j=window._sorted[i];
  const cvData=getCV();
  const prompt=`אתה עוזר לכתוב מכתב מקדים בעברית לפגישת ראיון/הגשה.

## פרטי המשרה
חברה: ${j.company}
תפקיד: ${j.title}
מיקום: ${j.location||""}
${j.description?`תיאור:\n${j.description.slice(0,800)}`:""}

## הפרופיל של המועמד
שם: עומרי גונן
${cvData.tagline}
${cvData.summary}

## המשימה
כתוב מכתב מקדים קצר ועוצמתי (3-4 פסקאות, עברית):
1. פתיח אישי שמתחבר לחברה/תפקיד הספציפי
2. 2-3 הישגים כמותיים שרלוונטיים לתפקיד הזה
3. סגירה עם CTA ברור

טון: מקצועי אך אנושי. לא תבניתי. לא buzzwords ריקים.`;

  navigator.clipboard.writeText(prompt).then(()=>{
    const orig=btn.innerHTML;
    btn.textContent="הועתק! ✓";btn.classList.add("copied");
    showToast("פרומפט למכתב הועתק — הדבק ב-Claude.ai");
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove("copied");},2200);
  }).catch(()=>showToast("ההעתקה נכשלה"));
}
function shareWA(i){
  const j=window._sorted[i],c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\nFit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted)msg+=`עלתה: ${postedLabel(j.posted)}\n`;
  if(c)msg+=`איש קשר: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

/* ── GitHub feedback sync ── */
async function syncFeedback(){
  const token=localStorage.getItem('gh_token');
  if(!token){showToast('הוסף GitHub token בהגדרות');return;}
  const dismissed={};
  const job_feedback={};
  Object.entries(STATE).forEach(([k,v])=>{
    if(v.dismissed)dismissed[k]={reason:v.dismiss_reason,date:v.dismiss_date,company:v.company};
    if(v.score_feedback)job_feedback[k]=v.score_feedback;
  });
  const avoid=Object.values(dismissed)
    .filter(d=>d.reason==='irrelevant')
    .map(d=>d.company).filter(Boolean);
  const payload={dismissed,avoid_companies:[...new Set(avoid)],job_feedback};
  try{
    const r=await fetch('https://api.github.com/repos/omriki55/family-chores-admin/contents/job_search/feedback.json',{
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json'}
    });
    const cur=await r.json();
    await fetch('https://api.github.com/repos/omriki55/family-chores-admin/contents/job_search/feedback.json',{
      method:'PUT',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        message:`Update feedback — ${new Date().toISOString().slice(0,10)}`,
        content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))),
        sha:cur.sha
      })
    });
    showToast('✅ פידבק עודכן בריפו');
    document.getElementById('sync-status').textContent=`סונכרן: ${new Date().toLocaleTimeString('he-IL')}`;
  }catch(e){showToast('❌ שגיאה בסנכרון: '+e.message);}
}

/* ── Scan button ── */
async function triggerScan(){
  const token=localStorage.getItem('gh_token');
  if(!token){
    showToast('הוסף GitHub token בהגדרות כדי לסרוק');
    openSettings('connect');
    return;
  }
  const btn=document.getElementById('scan-btn');
  const orig=btn.innerHTML;btn.innerHTML='<span class="material-symbols-rounded">hourglass_top</span>סורק…';btn.disabled=true;
  try{
    const r=await fetch('https://api.github.com/repos/omriki55/family-chores-admin/actions/workflows/job-scan.yml/dispatches',{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main'})
    });
    if(r.status===204)showToast('✅ סריקה הופעלה! תוצאות יגיעו בעוד ~2 דקות');
    else showToast('❌ שגיאה בהפעלת סריקה');
  }catch(e){showToast('❌ '+e.message);}
  setTimeout(()=>{btn.innerHTML=orig;btn.disabled=false;},5000);
}

/* ── Settings drawer ── */
function openSettings(tab){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  const ov=JSON.parse(localStorage.getItem('cv_override')||'{}');
  document.getElementById('cv-name').value=ov.name||'';
  document.getElementById('cv-contact').value=ov.contact||'';
  document.getElementById('cv-tagline').value=ov.tagline||'';
  document.getElementById('cv-summary').value=ov.summary||'';
  const roles=JSON.parse(localStorage.getItem('desired_roles')||'null')||CV_BASE_ROLES;
  document.getElementById('roles-ta').value=roles.join('\n');
  const tk=localStorage.getItem('gh_token')||'';
  document.getElementById('gh-token-inp').value=tk;
  document.getElementById('gh-token-status').textContent=tk?'Token שמור ✓':'';
  if(tab)switchDrawerTabByKey(tab);
}
function closeSettings(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}
function switchDrawerTab(btn){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  switchDrawerTabByKey(btn.dataset.tab);
}
function switchDrawerTabByKey(key){
  document.querySelectorAll('.d-tab-panel').forEach(p=>p.classList.remove('on'));
  const panel=document.getElementById('dtab-'+key);
  if(panel)panel.classList.add('on');
  document.querySelectorAll('.dtab').forEach(t=>{if(t.dataset.tab===key)t.classList.add('on');else t.classList.remove('on');});
}
function saveCvOverride(){
  const ov={};
  const name=document.getElementById('cv-name').value.trim();
  const contact=document.getElementById('cv-contact').value.trim();
  const tagline=document.getElementById('cv-tagline').value.trim();
  const summary=document.getElementById('cv-summary').value.trim();
  if(name)ov.name=name;
  if(contact)ov.contact=contact;
  if(tagline)ov.tagline=tagline;
  if(summary)ov.summary=summary;
  localStorage.setItem('cv_override',JSON.stringify(ov));
}
function resetCvOverride(){
  localStorage.removeItem('cv_override');
  document.getElementById('cv-name').value='';
  document.getElementById('cv-contact').value='';
  document.getElementById('cv-tagline').value='';
  document.getElementById('cv-summary').value='';
  showToast('קורות חיים אופסו לברירת מחדל');
}
const CV_BASE_ROLES=[
  "Head of Revenue Operations","RevOps Manager","GTM Engineer",
  "Head of Growth","Marketing Operations Lead","Sales Operations Manager"
];
function saveRoles(){
  const lines=document.getElementById('roles-ta').value.split('\n').map(l=>l.trim()).filter(Boolean);
  localStorage.setItem('desired_roles',JSON.stringify(lines));
}
function downloadConfig(){
  const roles=JSON.parse(localStorage.getItem('desired_roles')||'null')||CV_BASE_ROLES;
  const cfg={roles,updated:new Date().toISOString().slice(0,10)};
  const b=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='config.json';a.click();
}
function saveGhToken(){
  const tk=document.getElementById('gh-token-inp').value.trim();
  if(tk){localStorage.setItem('gh_token',tk);document.getElementById('gh-token-status').textContent='Token שמור ✓';showToast('Token נשמר');}
  else{localStorage.removeItem('gh_token');document.getElementById('gh-token-status').textContent='';showToast('Token הוסר');}
}

/* ── theme toggle (light / dark, persisted; defaults to system) ── */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ico=document.getElementById('theme-ico');
  if(ico)ico.textContent=(t==='dark')?'light_mode':'dark_mode';
  const ico2=document.getElementById('theme-ico2');
  if(ico2)ico2.textContent=(t==='dark')?'light_mode':'dark_mode';
}
function initTheme(){
  let t=localStorage.getItem('theme');
  if(!t)t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  applyTheme(t);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem('theme',cur);applyTheme(cur);
  showToast(cur==='dark'?'🌙 מצב כהה':'☀️ מצב בהיר');
}
initTheme();

/* ── re-render when crossing the desktop/mobile breakpoint ── */
let _wasDesktop=window.matchMedia('(min-width:1024px)').matches;
window.addEventListener('resize',()=>{const d=window.matchMedia('(min-width:1024px)').matches;if(d!==_wasDesktop){_wasDesktop=d;render();}});

/* ── keyboard shortcuts (desktop) ── */
document.addEventListener('keydown',e=>{
  const typing=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement&&document.activeElement.tagName);
  if(e.key==='Escape'){
    closeModal();closeAnalytics();closeSettings();
    document.querySelectorAll('.dismiss-panel.open').forEach(p=>p.classList.remove('open'));
    if(typing)document.activeElement.blur();
    return;
  }
  if(typing)return;
  if(e.key==='/'){e.preventDefault();const s=document.getElementById('search-inp');if(s){s.focus();s.select();}}
  else if(e.key==='t'||e.key==='ת'){toggleTheme();}
});

render();

/* ── PWA: register service worker for offline + installability ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
