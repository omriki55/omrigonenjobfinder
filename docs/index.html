<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker — Omri · Momentum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ── */
    :root{
      --canvas:oklch(0.984 0.005 95);
      --surface:oklch(1 0 0);
      --surfaceAlt:oklch(0.975 0.006 95);
      --ink:oklch(0.24 0.03 270);
      --inkSoft:oklch(0.46 0.02 270);
      --inkFaint:oklch(0.62 0.015 270);
      --line:oklch(0.92 0.008 270);
      --lineSoft:oklch(0.95 0.006 270);
      --accent:oklch(0.55 0.20 270);
      --accentDeep:oklch(0.46 0.20 270);
      --accentSoft:oklch(0.96 0.04 270);
      --accentInk:oklch(0.45 0.18 270);
      --onAccent:oklch(0.99 0.01 270);
      --heroBg:linear-gradient(135deg,oklch(0.97 0.035 270),oklch(0.985 0.02 230));
      --wa:oklch(0.64 0.16 150);
      --star:oklch(0.78 0.15 80);
      --toast-bg:oklch(0.22 0.02 265);
      /* stage hues */
      --h-saved:235;--h-applied:205;--h-interview:285;--h-offer:150;--h-rejected:20;
      /* fit hues */
      --h-high:150;--h-mid:78;--h-low:28;
      --radius:18px;
      --font-display:'Rubik',system-ui,sans-serif;
      --font-ui:'Assistant',system-ui,sans-serif;
      --font-mono:'JetBrains Mono',ui-monospace,monospace;
    }
    /* stage bg/fg helpers (used inline via JS) */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--canvas);color:var(--ink);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;direction:rtl}

    /* ── APP SHELL ── */
    #app{max-width:760px;margin:0 auto;padding:14px 14px 60px;display:flex;flex-direction:column;gap:12px}

    /* ── HERO ── */
    .hero{background:var(--heroBg);border-radius:20px;padding:18px 20px;box-shadow:inset 0 0 0 1px var(--line);display:flex;flex-direction:column;gap:10px}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .hero-greeting{font-family:var(--font-display);font-size:.82rem;font-weight:800;color:var(--ink)}
    .hero-meta{font-size:.75rem;color:var(--inkFaint);margin-top:1px}
    .hero-coach{font-family:var(--font-display);font-size:.9rem;font-weight:700;color:var(--accentInk)}
    .hero-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .sheet-btn{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--line);color:var(--inkSoft);border-radius:10px;padding:6px 10px;font-size:.73rem;text-decoration:none;font-weight:600;white-space:nowrap;font-family:var(--font-ui)}
    .scan-btn,.settings-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);color:var(--inkSoft);border-radius:10px;padding:6px 9px;font-size:.85rem;cursor:pointer;font-family:var(--font-ui);transition:all .15s}
    .scan-btn:hover,.settings-btn:hover{border-color:var(--accent);color:var(--accentInk)}
    .scan-btn:disabled{opacity:.5;cursor:not-allowed}

    /* funnel bars */
    .funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
    .f-stage{display:flex;flex-direction:column;gap:5px;padding:10px 8px;border-radius:12px;cursor:pointer;transition:background .15s;position:relative;border:1.5px solid transparent;user-select:none}
    .f-stage:hover{background:rgba(255,255,255,.5)}
    .f-stage.active{border-color:var(--f-solid)}
    .f-sep{width:1px;background:var(--lineSoft);margin:10px 0;flex-shrink:0}
    .f-count{font-family:var(--font-mono);font-size:1.55rem;font-weight:700;line-height:1;color:var(--f-fg)}
    .f-count.zero{color:var(--inkFaint)}
    .f-label{font-size:.72rem;font-weight:600;color:var(--inkSoft)}
    .f-track{height:5px;background:var(--lineSoft);border-radius:999px;overflow:hidden;margin-top:2px}
    .f-fill{height:100%;border-radius:999px;background:var(--f-solid);transition:width .7s cubic-bezier(.2,.7,.3,1)}

    /* momentum chips */
    .m-chips{display:flex;gap:6px;flex-wrap:wrap}
    .m-chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:.74rem;display:inline-flex;align-items:center;gap:5px;color:var(--inkSoft)}
    .m-chip .val{font-family:var(--font-mono);font-weight:700;font-size:.78rem;color:var(--accent)}

    /* ── TOOLBAR ── */
    .toolbar{background:var(--surface);border-radius:14px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(20,20,40,.04);display:flex;flex-direction:column;gap:8px}
    .search-row{display:flex;align-items:center;gap:8px}
    .search-wrap{flex:1;position:relative}
    .search-ico{position:absolute;top:50%;right:10px;transform:translateY(-50%);color:var(--inkFaint);pointer-events:none}
    .search-inp{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:8px 34px 8px 10px;font-size:.82rem;font-family:var(--font-ui);color:var(--ink);background:var(--surfaceAlt);outline:none;direction:rtl;transition:border-color .15s}
    .search-inp:focus{border-color:var(--accent);background:var(--surface)}
    .search-clear{position:absolute;top:50%;left:10px;transform:translateY(-50%);background:none;border:none;color:var(--inkFaint);cursor:pointer;font-size:.9rem;padding:0;line-height:1;display:none}
    .search-clear.show{display:block}
    .sort-seg{display:flex;background:var(--surfaceAlt);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
    .sort-btn{flex:1;padding:5px 8px;border:none;background:none;border-radius:8px;font-size:.74rem;font-weight:600;font-family:var(--font-ui);color:var(--inkSoft);cursor:pointer;white-space:nowrap;transition:all .13s}
    .sort-btn.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .filter-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--inkFaint);flex-shrink:0}
    /* stage filter chips */
    .sf-chip{background:var(--surfaceAlt);border:1.5px solid var(--line);color:var(--inkSoft);border-radius:999px;padding:4px 11px;font-size:.75rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:4px;outline:none}
    .sf-chip .n{font-family:var(--font-mono);font-size:.7rem}
    .sf-chip.on-all{background:var(--ink);color:var(--surface);border-color:var(--ink)}
    .sf-chip.on-stage{background:var(--f-bg);color:var(--f-fg);border-color:var(--f-solid)}
    /* fit chips */
    .fit-chip{background:var(--surfaceAlt);border:1.5px solid var(--line);color:var(--inkSoft);border-radius:999px;padding:4px 12px;font-size:.75rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .12s;outline:none}
    .fit-chip.on{background:var(--accentSoft);color:var(--accentInk);border-color:var(--accent)}
    /* expand btns */
    .exp-row{display:flex;align-items:center;justify-content:space-between}
    .exp-count{font-family:var(--font-mono);font-size:.76rem;font-weight:700;color:var(--inkSoft)}
    .exp-btns{display:flex;gap:5px}
    .exp-btn{background:none;border:1px solid var(--line);color:var(--inkSoft);border-radius:8px;padding:4px 9px;font-size:.72rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;transition:all .13s}
    .exp-btn:hover{background:var(--surfaceAlt);color:var(--ink)}

    /* ── CARD ── */
    @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .job-card{
      background:var(--surface);border-radius:var(--radius);flex-shrink:0;
      box-shadow:0 1px 2px rgba(0,0,0,.04),0 6px 20px rgba(20,20,40,.05);
      border:1px solid transparent;
      position:relative;overflow:hidden;
      transition:box-shadow .2s,border-color .2s,opacity .2s;
    }
    .job-card:hover{box-shadow:0 2px 6px rgba(0,0,0,.06),0 14px 32px rgba(20,20,40,.10)}
    .job-card.open{border-color:var(--line)}
    /* accent stripe — right edge in RTL */
    .job-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:4px;background:var(--s-solid);border-radius:0 var(--radius) var(--radius) 0}
    .job-card.st-rejected{opacity:.7}
    .job-card.st-rejected::before{opacity:.3}
    .job-card.has-followup{outline:2px solid oklch(0.64 0.18 45);outline-offset:-2px}
    /* dismissed card */
    .job-card.dismissed{opacity:.5;border-left:4px solid oklch(0.56 0.16 20);border-color:oklch(0.88 0.06 20)}

    /* card header */
    .card-head{display:flex;align-items:center;gap:12px;padding:14px 17px 14px 17px;cursor:pointer;user-select:none}
    .star-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:0;line-height:1;color:var(--inkFaint);transition:color .15s,transform .15s;flex-shrink:0}
    .star-btn.on{color:var(--star);transform:scale(1.1)}
    .card-text{flex:1;min-width:0;padding-left:6px}
    .card-company{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--ink);direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--inkSoft);direction:ltr;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
    .card-posted{font-size:.7rem;color:var(--inkFaint);margin-top:2px;direction:rtl;text-align:right}
    .card-head-right{display:flex;flex-direction:column;align-items:flex-start;gap:5px;flex-shrink:0}
    .next-pill{background:var(--accentSoft);color:var(--accentInk);border-radius:999px;padding:3px 8px;font-size:.65rem;font-weight:600;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
    /* stage pill */
    .s-pill{border-radius:999px;padding:3px 9px;font-size:.68rem;font-weight:700;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;background:var(--s-bg);color:var(--s-fg)}
    .s-dot{width:6px;height:6px;border-radius:50%;background:var(--s-solid);flex-shrink:0}
    /* fit chip */
    .fit-mark{display:flex;flex-direction:column;align-items:center;justify-content:center;width:46px;height:46px;border-radius:12px;background:var(--f-bg);flex-shrink:0}
    .fit-num{font-family:var(--font-mono);font-weight:700;font-size:1.2rem;line-height:1;color:var(--f-fg)}
    .fit-lbl{font-size:.44rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--f-fg);opacity:.7;margin-top:1px}
    /* chevron */
    .chevron{font-size:.72rem;color:var(--inkFaint);transition:transform .25s cubic-bezier(.2,.7,.3,1);flex-shrink:0}
    .job-card.open .chevron{transform:rotate(180deg)}
    .follow-badge{font-size:.64rem;background:oklch(0.97 0.04 45);color:oklch(0.5 0.18 45);border:1px solid oklch(0.88 0.08 45);border-radius:999px;padding:2px 7px;font-weight:700;white-space:nowrap}
    /* new badge */
    .new-badge{background:oklch(0.955 0.045 150);color:oklch(0.46 0.13 150);border-radius:999px;padding:2px 7px;font-size:.64rem;font-weight:700;border:1px solid oklch(0.86 0.08 150);white-space:nowrap}

    /* card body — grid-rows animation */
    .card-body-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.2,.7,.3,1)}
    .job-card.open .card-body-wrap{grid-template-rows:1fr}
    .card-body-inner{overflow:hidden;min-height:0}
    .card-body{padding:0 17px 15px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--lineSoft);padding-top:12px}

    /* meta chips in body */
    .meta-chips{display:flex;gap:6px;flex-wrap:wrap}
    .meta-chip{background:var(--surfaceAlt);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:.72rem;color:var(--inkSoft);font-weight:500;display:inline-flex;align-items:center;gap:4px}

    /* AI note */
    .ai-note{background:var(--accentSoft);border-radius:12px;padding:10px 12px}
    .ai-note-head{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accentInk);margin-bottom:4px}
    .ai-note-text{font-size:.81rem;color:var(--ink);line-height:1.5;direction:ltr;text-align:left}

    /* contact */
    .contact-box{background:var(--surfaceAlt);border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
    .contact-head{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--inkFaint)}
    .contact-main{display:flex;align-items:center;gap:9px}
    .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:var(--onAccent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;flex-shrink:0;font-family:var(--font-display)}
    .contact-name{font-weight:700;font-size:.83rem}
    .contact-title{font-size:.71rem;color:var(--inkSoft)}
    .contact-links{display:flex;gap:6px;flex-wrap:wrap}
    .clink{font-size:.71rem;font-weight:600;text-decoration:none;padding:4px 9px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--inkSoft);display:inline-flex;align-items:center;gap:3px;transition:all .13s}
    .clink:hover{border-color:var(--accent);color:var(--accentInk)}
    .clink.li{color:#0a66c2}

    /* notes */
    .notes-wrap{display:flex;flex-direction:column;gap:5px}
    .notes-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--inkFaint)}
    .notes-ta{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-size:.8rem;font-family:var(--font-ui);color:var(--ink);resize:vertical;min-height:58px;background:var(--surfaceAlt);outline:none;transition:border-color .15s,background .15s;direction:rtl}
    .notes-ta:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px oklch(0.55 0.20 270 / 0.10)}
    .notes-ta.has-note{border-color:oklch(0.85 0.04 270);background:var(--accentSoft)}
    .save-row{display:flex;align-items:center;gap:8px;margin-top:3px}
    .save-btn{background:var(--accentSoft);border:1.5px solid var(--accent);color:var(--accentInk);border-radius:8px;padding:5px 13px;font-size:.74rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;transition:all .13s;outline:none}
    .save-btn:hover{background:var(--accent);color:var(--onAccent)}
    .save-btn:active{transform:scale(.96)}
    .saved-ack{font-size:.72rem;font-weight:600;transition:opacity .3s}

    /* stage stepper */
    .stepper-wrap{display:flex;flex-direction:column;gap:6px}
    .stepper-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--inkFaint)}
    .stepper{display:flex;gap:5px}
    .step-btn{flex:1;padding:7px 4px;border-radius:9px;font-size:.72rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;border:1.5px solid var(--line);background:var(--surfaceAlt);color:var(--inkSoft);transition:all .12s;outline:none}
    .step-btn:hover{border-color:var(--s-solid);color:var(--s-fg)}
    .step-btn.on{background:var(--s-solid);color:#fff;border-color:var(--s-solid)}

    /* channel */
    .channel-wrap{display:flex;flex-direction:column;gap:5px}
    .channel-lbl{font-size:.68rem;font-weight:600;color:var(--inkSoft)}
    .chan{display:flex;gap:5px;flex-wrap:wrap}
    .chan-btn{padding:5px 10px;border-radius:999px;font-size:.72rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;border:1.5px solid var(--line);background:var(--surfaceAlt);color:var(--inkSoft);outline:none;transition:all .12s}
    .chan-btn.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}

    /* action buttons */
    .actions{display:flex;gap:6px;flex-wrap:wrap}
    .act-btn{flex:1;min-width:68px;padding:10px 6px;border-radius:11px;font-size:.78rem;font-weight:700;font-family:var(--font-ui);text-align:center;cursor:pointer;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);transition:all .14s;display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none;white-space:nowrap;active:transform:scale(.96)}
    .act-btn:active{transform:scale(.96)}
    .act-wa{background:var(--wa);color:#fff;border-color:var(--wa)}
    .act-cv{background:var(--surfaceAlt)}
    .act-open{background:var(--accent);color:var(--onAccent);border-color:var(--accent)}
    .act-copy.copied{color:var(--accent);border-color:var(--accent)}

    /* dismiss section */
    .dismiss-toggle{background:none;border:none;font-size:.72rem;color:var(--inkFaint);cursor:pointer;padding:3px 0;font-family:var(--font-ui);text-align:right;direction:rtl}
    .dismiss-toggle:hover{color:var(--ink)}
    .dismiss-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s cubic-bezier(.2,.7,.3,1)}
    .dismiss-panel.open{grid-template-rows:1fr}
    .dismiss-panel-inner{overflow:hidden;min-height:0}
    .dismiss-btns{display:flex;gap:6px;flex-wrap:wrap;padding-top:6px}
    .dismiss-btn{padding:6px 10px;border-radius:8px;font-size:.72rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;border:1.5px solid oklch(0.88 0.06 20);background:oklch(0.975 0.01 20);color:oklch(0.46 0.13 20);transition:all .12s;outline:none}
    .dismiss-btn:hover{background:oklch(0.955 0.045 20);border-color:oklch(0.56 0.16 20)}
    .undismiss-link{font-size:.69rem;color:var(--inkFaint);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-ui);padding:0}
    .undismiss-link:hover{color:var(--ink)}
    .dismissed-banner{background:oklch(0.975 0.01 20);border:1px solid oklch(0.88 0.06 20);border-radius:8px;padding:5px 10px;font-size:.72rem;color:oklch(0.46 0.13 20);display:flex;align-items:center;justify-content:space-between;gap:8px}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--toast-bg);color:#fff;border-radius:999px;padding:10px 22px;font-size:.83rem;font-weight:600;font-family:var(--font-ui);z-index:999;transition:transform .3s cubic-bezier(.2,.7,.3,1),opacity .3s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.22);opacity:0;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* ── CV MODAL ── */
    #modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
    #modal.show{display:flex}
    .modal-card{background:var(--surface);width:100%;max-width:760px;max-height:88vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden}
    @media(min-width:760px){#modal{align-items:center}.modal-card{border-radius:18px}}
    .modal-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{font-size:.95rem;font-weight:800;font-family:var(--font-display)}
    .modal-sub{font-size:.72rem;color:var(--inkSoft);margin-top:1px}
    .modal-close{background:var(--surfaceAlt);border:none;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;color:var(--inkSoft)}
    .modal-body{padding:14px 16px;overflow-y:auto;white-space:pre-wrap;font-size:.79rem;line-height:1.55;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:7px}
    .modal-foot .act-btn{min-width:0}

    /* ── SETTINGS DRAWER ── */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;display:none;backdrop-filter:blur(1px)}
    .drawer-overlay.show{display:block}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:min(380px,95vw);background:white;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:200;transform:translateX(-100%);transition:transform .3s cubic-bezier(.2,.7,.3,1);display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .drawer-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .drawer-head h3{font-size:1rem;font-weight:800;font-family:var(--font-display);color:var(--ink)}
    .drawer-close{background:var(--surfaceAlt);border:none;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;color:var(--inkSoft);flex-shrink:0}
    .drawer-tabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0}
    .dtab{flex:1;padding:10px 6px;font-size:.76rem;font-weight:600;font-family:var(--font-ui);color:var(--inkSoft);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;text-align:center}
    .dtab.on{color:var(--accent);border-bottom-color:var(--accent)}
    .drawer-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
    .d-section{display:flex;flex-direction:column;gap:6px}
    .d-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--inkFaint)}
    .d-inp{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-size:.82rem;font-family:var(--font-ui);color:var(--ink);background:var(--surfaceAlt);outline:none;direction:rtl;transition:border-color .15s}
    .d-inp:focus{border-color:var(--accent);background:var(--surface)}
    .d-ta{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;font-size:.78rem;font-family:var(--font-ui);color:var(--ink);resize:vertical;min-height:100px;background:var(--surfaceAlt);outline:none;direction:rtl;transition:border-color .15s}
    .d-ta:focus{border-color:var(--accent);background:var(--surface)}
    .d-hint{font-size:.67rem;color:var(--inkFaint);line-height:1.4}
    .d-btn{padding:9px 14px;border-radius:10px;font-size:.78rem;font-weight:700;font-family:var(--font-ui);cursor:pointer;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);transition:all .13s;text-align:center}
    .d-btn:hover{border-color:var(--accent);color:var(--accentInk);background:var(--accentSoft)}
    .d-btn.primary{background:var(--accent);color:var(--onAccent);border-color:var(--accent)}
    .d-btn.primary:hover{background:var(--accentDeep)}
    .d-tab-panel{display:none;flex-direction:column;gap:14px}
    .d-tab-panel.on{display:flex}
    .d-status{font-size:.7rem;color:var(--inkFaint);margin-top:2px}

    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    @media(max-width:480px){
      .funnel{grid-template-columns:repeat(2,1fr);gap:4px}
      .stepper{flex-wrap:wrap}
      .step-btn{min-width:60px}
    }
  </style>
</head>
<body>
<div id="app">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-greeting">בוקר טוב, עומרי 👋</div>
        <div class="hero-meta" id="hero-meta"></div>
        <div class="hero-coach" id="hero-coach" style="margin-top:5px"></div>
      </div>
      <div class="hero-actions">
        <a class="sheet-btn" href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank">📊 Sheet</a>
        <button class="scan-btn" onclick="triggerScan()" id="scan-btn" title="סריקה חדשה">🔄</button>
        <button class="settings-btn" onclick="openSettings()" title="הגדרות">⚙️</button>
      </div>
    </div>
    <div class="funnel" id="funnel"></div>
    <div class="m-chips" id="m-chips"></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-inp" id="search-inp" type="text" placeholder="חיפוש חברה או תפקיד…" oninput="onSearch(this)"/>
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="sort-seg">
        <button class="sort-btn" data-val="score" onclick="setSort(this)">התאמה</button>
        <button class="sort-btn on" data-val="posted" onclick="setSort(this)">עדכני</button>
        <button class="sort-btn" data-val="az" onclick="setSort(this)">A–Z</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">שלב</span>
      <button class="sf-chip on-all" data-stage="all" onclick="setStageFilter(this)">הכל <span class="n" id="fc-all"></span></button>
      <button class="sf-chip" data-stage="saved" onclick="setStageFilter(this)" style="--f-bg:oklch(0.955 0.045 235);--f-fg:oklch(0.46 0.13 235);--f-solid:oklch(0.56 0.16 235)">שמורות <span class="n" id="fc-saved"></span></button>
      <button class="sf-chip" data-stage="applied" onclick="setStageFilter(this)" style="--f-bg:oklch(0.955 0.045 205);--f-fg:oklch(0.46 0.13 205);--f-solid:oklch(0.56 0.16 205)">הוגשו <span class="n" id="fc-applied"></span></button>
      <button class="sf-chip" data-stage="interview" onclick="setStageFilter(this)" style="--f-bg:oklch(0.955 0.045 285);--f-fg:oklch(0.46 0.13 285);--f-solid:oklch(0.56 0.16 285)">ראיונות <span class="n" id="fc-interview"></span></button>
      <button class="sf-chip" data-stage="offer" onclick="setStageFilter(this)" style="--f-bg:oklch(0.955 0.045 150);--f-fg:oklch(0.46 0.13 150);--f-solid:oklch(0.56 0.16 150)">הצעות <span class="n" id="fc-offer"></span></button>
      <button class="sf-chip" data-stage="rejected" onclick="setStageFilter(this)" style="--f-bg:oklch(0.955 0.045 20);--f-fg:oklch(0.46 0.13 20);--f-solid:oklch(0.56 0.16 20)">נדחה <span class="n" id="fc-rejected"></span></button>
      <button class="sf-chip" data-stage="starred" onclick="setStageFilter(this)">⭐ נבחרות</button>
      <button class="sf-chip" data-stage="dismissed" onclick="setStageFilter(this)" style="--f-bg:oklch(0.975 0.01 20);--f-fg:oklch(0.46 0.13 20);--f-solid:oklch(0.56 0.16 20)">🗑️ ארכיון <span class="n" id="fc-dismissed"></span></button>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">ציון</span>
      <button class="fit-chip on" data-fit="all" onclick="setFitFilter(this)">הכל</button>
      <button class="fit-chip" data-fit="high" onclick="setFitFilter(this)">8+</button>
      <button class="fit-chip" data-fit="mid" onclick="setFitFilter(this)">5–7</button>
    </div>
    <div class="filter-row">
      <span class="filter-lbl">תאריך</span>
      <button class="fit-chip on" data-age="all" onclick="setAgeFilter(this)">הכל <span id="age-all" class="n" style="font-family:var(--font-mono);font-size:.68rem"></span></button>
      <button class="fit-chip" data-age="day" onclick="setAgeFilter(this)">24 שעות <span id="age-day" class="n" style="font-family:var(--font-mono);font-size:.68rem"></span></button>
      <button class="fit-chip" data-age="week" onclick="setAgeFilter(this)">שבוע <span id="age-week" class="n" style="font-family:var(--font-mono);font-size:.68rem"></span></button>
      <button class="fit-chip" data-age="month" onclick="setAgeFilter(this)">חודש <span id="age-month" class="n" style="font-family:var(--font-mono);font-size:.68rem"></span></button>
    </div>
    <div class="exp-row">
      <span class="exp-count" id="count-lbl"></span>
      <div class="exp-btns">
        <button class="exp-btn" onclick="expandAll()">פתח הכל ▾</button>
        <button class="exp-btn" onclick="collapseAll()">סגור הכל ▴</button>
      </div>
    </div>
  </div>

  <!-- CARDS -->
  <div id="container" style="display:flex;flex-direction:column;gap:14px"></div>
</div>

<div id="toast"></div>

<!-- CV MODAL -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div><h3 id="m-title"></h3><div class="modal-sub" id="m-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot">
      <button class="act-btn act-cv" onclick="copyCV()">העתק 📋</button>
      <button class="act-btn act-open" onclick="printCV()">PDF 🖨️</button>
      <button class="act-btn act-cv" onclick="downloadCV()">.txt ⬇</button>
    </div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeSettings()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>⚙️ הגדרות</h3>
    <button class="drawer-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="drawer-tabs">
    <button class="dtab on" data-tab="cv" onclick="switchDrawerTab(this)">קורות חיים</button>
    <button class="dtab" data-tab="roles" onclick="switchDrawerTab(this)">תפקידים</button>
    <button class="dtab" data-tab="connect" onclick="switchDrawerTab(this)">חיבורים</button>
  </div>
  <div class="drawer-body">
    <!-- Tab: CV -->
    <div class="d-tab-panel on" id="dtab-cv">
      <div class="d-section">
        <div class="d-lbl">שם</div>
        <input class="d-inp" id="cv-name" placeholder="OMRI GONEN" oninput="saveCvOverride()"/>
      </div>
      <div class="d-section">
        <div class="d-lbl">פרטי קשר</div>
        <input class="d-inp" id="cv-contact" placeholder="+972-55-..." oninput="saveCvOverride()"/>
      </div>
      <div class="d-section">
        <div class="d-lbl">Tagline</div>
        <input class="d-inp" id="cv-tagline" placeholder="Growth & AI Executive..." oninput="saveCvOverride()"/>
      </div>
      <div class="d-section">
        <div class="d-lbl">סיכום</div>
        <textarea class="d-ta" id="cv-summary" rows="4" placeholder="Growth executive with 15+ years..." oninput="saveCvOverride()"></textarea>
      </div>
      <button class="d-btn" onclick="resetCvOverride()">↩ אפס לברירת מחדל</button>
    </div>
    <!-- Tab: Roles -->
    <div class="d-tab-panel" id="dtab-roles">
      <div class="d-section">
        <div class="d-lbl">תפקידים מבוקשים (שורה לכל תפקיד)</div>
        <textarea class="d-ta" id="roles-ta" rows="7" oninput="saveRoles()"></textarea>
      </div>
      <button class="d-btn" onclick="downloadConfig()">⬇ הורד config.json</button>
      <div class="d-hint">העלה קובץ זה לתיקיית job_search/ כדי לשנות את חיפוש המשרות</div>
    </div>
    <!-- Tab: Connect -->
    <div class="d-tab-panel" id="dtab-connect">
      <div class="d-section">
        <div class="d-lbl">GitHub Token</div>
        <input class="d-inp" id="gh-token-inp" type="password" placeholder="ghp_..." autocomplete="off"/>
        <button class="d-btn primary" onclick="saveGhToken()" style="margin-top:6px">שמור Token</button>
        <div class="d-status" id="gh-token-status"></div>
      </div>
      <div class="d-section" style="display:flex;flex-direction:column;gap:8px">
        <button class="d-btn" onclick="triggerScan();closeSettings()">🔄 סרוק עכשיו</button>
        <button class="d-btn" onclick="syncFeedback()">📤 סנכרן פידבק</button>
        <div class="d-status" id="sync-status"></div>
      </div>
    </div>
  </div>
</div>

<script>
const JOBS=[{"company": "Chainguard", "title": "Staff Sales Operations Manager", "location": "United States - Remote", "url": "https://job-boards.greenhouse.io/chainguard/jobs/4674357006", "job_type": "Full-time", "posted": "2026-04-20", "description": "Senior Sales Operations role at a high-growth cybersecurity SaaS company. Owns the operational rhythm of the business—forecast calls, pipeline reviews, territory strategy design and account assignment frameworks across AMER segments. Requires 6–10+ years in Sales Ops, Revenue Ops, or GTM Strategy with at least 2 years managing people, ideally in Enterprise B2B SaaS. Deep expertise in territory planning, forecasting, advanced Salesforce, SQL, and BI tools (Sigma, Tableau, Looker). Combines strategic vision with operational rigor to build scalable processes.", "fit_score": 8, "score_reason": "Excellent alignment with Omri's 15+ years B2B SaaS RevOps expertise, forecasting/pipeline mastery, and Salesforce proficiency. Strong match on strategic operational leadership, though cybersecurity domain is new territory and Staff-level IC expectations may differ from his typical Head of Revenue Operations scope.", "ai_opener": "Omri here—noticed Chainguard is building out enterprise sales operations at scale. Your focus on forecast rigor, territory strategy, and operational rhythm across AMER segments aligns perfectly with how I've architected GTM systems at previous SaaS companies. I've spent 15+ years solving these exact problems (pipeline forecasting, Salesforce optimization, BI-driven territory planning), and I'd love to explore how this role could be a fit.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "AssetWatch", "title": "Sales Operations Manager", "location": "Remote", "url": "https://job-boards.greenhouse.io/assetwatch/jobs/4676495005", "job_type": "Full-time", "posted": "2026-03-25", "description": "Sales Operations Manager at a remote-first company requiring 4–7 years of experience in Sales Operations, Revenue Operations, or a similar role within B2B SaaS. Needs strong Salesforce reporting and CRM operational experience, plus experience supporting sales forecasting, pipeline management, and territory planning. Familiarity with modern GTM tools such as Gong, Outreach, ZoomInfo, and AI tools like Clay, Zapier, and Outreach AI is a strong plus. Detail-oriented with strong commitment to operational excellence and data accuracy.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps expertise (Salesforce, pipeline forecasting, GTM tools stack). Role is slightly junior to his senior executive background, but remote-first structure and modern AI-native GTM focus align well with his strengths.", "ai_opener": "Hi [Hiring Manager], I came across AssetWatch and was impressed by your remote-first GTM approach. With 15+ years building revenue operations at scale—including deep Salesforce expertise, AI-native tool implementation (Gong, Clay, Outreach), and pipeline forecasting—I'm confident I can drive operational excellence and data accuracy that accelerates your sales motion from day one.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "VulnCheck", "title": "Revenue Operations Manager", "location": "US - Remote", "url": "https://job-boards.greenhouse.io/vulncheck/jobs/4180980009", "job_type": "Full-time", "posted": "2026-03-11", "description": "Revenue Operations Manager supporting the operational engine that powers GTM teams at a fast-growing cybersecurity company. Sits at the intersection of Sales, Marketing, Customer Success, and Finance, owning CRM integrity, optimizing revenue workflows, and building reporting infrastructure. Requires 4+ years in Revenue Ops, Sales Ops, or GTM Systems in B2B SaaS, with hands-on Salesforce or HubSpot administration, strong knowledge of SaaS metrics (ARR, ACV, NRR, churn), and GTM tech stack management. 100% remote within the US.", "fit_score": 9, "score_reason": "Exceptional match: 15+ years B2B SaaS experience far exceeds 4+ year requirement, deep Salesforce/HubSpot expertise, strong cybersecurity sector alignment, and remote US role fits global preference. Only minor gap is no explicitly mentioned fintech/AI-native focus, but RevOps fundamentals are directly transferable.", "ai_opener": "I noticed VulnCheck is building serious GTM infrastructure at a critical growth stage—your Revenue Operations Manager role caught my attention because I've spent 15 years architecting exactly this kind of operational engine across B2B SaaS. I've owned CRM integrity, pipeline forecasting, and revenue workflow optimization at scale (with deep Salesforce and HubSpot chops), and the cybersecurity sector's unit economics and forecasting complexity is exactly where RevOps creates outsized impact.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "Gong.io", "title": "RevOps Manager, Territory Strategy & Operations", "location": "Remote (US)", "url": "https://job-boards.greenhouse.io/gongio/jobs/4668642006", "job_type": "Full-time", "posted": "2026-04-09", "description": "Revenue Operations Manager focused on Territory Strategy & Operations, accelerating revenue growth and seller productivity through data-driven investment strategy and scalable territory design. Partners with Sales leadership, Strategy, and Finance to optimize territory compositions and ensure smooth execution of GTM initiatives through impact analysis and change management. Requires excellent cross-functional collaboration and comfort navigating ambiguity in a fast-paced, high-growth environment. Salary range $149,000–$175,000 USD.", "fit_score": 9, "score_reason": "Excellent match for Omri's senior RevOps expertise—Territory Strategy & Operations is core RevOps domain, and Gong.io's data-driven, seller productivity focus aligns perfectly with his GTM/pipeline forecasting strengths. Remote US role fits location preferences, and the cross-functional collaboration requirement matches his executive background.", "ai_opener": "Omri here—your Territory Strategy & Operations role caught my attention because it's exactly the type of RevOps leverage play I've spent 15+ years perfecting. I've built territory models and GTM systems at scale that directly drive both revenue predictability and seller productivity, and I'm genuinely interested in how Gong is approaching the data infrastructure piece to make territory changes stick. Would love to explore whether this is the right moment for you to bring someone in who's already optimized this motion.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "Engine", "title": "Sr. RevOps Program Manager", "location": "Remote - USA", "url": "https://job-boards.greenhouse.io/engine/jobs/7691531003", "job_type": "Full-time", "posted": "2026-04-10", "description": "Senior RevOps Program Manager owning the operational rhythm of the go-to-market engine at a fast-growing travel/fintech platform. Drives the RevOps program portfolio end-to-end—GTM launches, system rollouts, process changes, and enablement initiatives—and builds cross-functional operating cadences. Partners with RevOps, Sales Leadership, Finance, and Product to translate strategic priorities into structured workstreams. Requires 5+ years in program management, RevOps, sales operations, or GTM operations. Hybrid-hub model with remote flexibility.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps expertise, GTM orchestration, and cross-functional program management experience. Travel/fintech sector fits his B2B SaaS and fintech background, though lacks explicit AI-native GTM focus mentioned in his strengths.", "ai_opener": "Omri here—I've spent 15+ years scaling GTM operations at B2B SaaS and fintech companies, and Engine's approach to owning the operational rhythm across sales, product, and finance really resonates with how I think about RevOps. With your hybrid-hub model and focus on structured workstreams around GTM launches and system rollouts, I'd be interested in exploring how my experience scaling revenue engines could support your next growth phase.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "Remote", "title": "RevOps Expert", "location": "Fully Remote (Global)", "url": "https://job-boards.greenhouse.io/remotecom/jobs/6543468003", "job_type": "Full-time", "posted": "2026-01-01", "description": "RevOps Expert joining the Revenue Operations team to optimize sales processes and system architecture. Drives strategic initiatives aligned with go-to-market strategy, champions scalable process design, and implements solutions using Six Sigma and Agile methodologies. Requires extensive operations management background, deep Salesforce expertise, and experience with tools like LeanData, Zapier, or Camunda. Proven SaaS and B2B experience and remote/global startup experience preferred. Fully remote with a base salary range of $51,100–$115,000 USD.", "fit_score": 8, "score_reason": "Strong alignment on RevOps expertise, Salesforce depth, B2B SaaS background, and remote work. The salary range ($51-115K) appears below market for a 15+ year senior executive, but the strategic focus on process optimization and GTM alignment is excellent.", "ai_opener": "I've spent 15+ years building scalable revenue operations at B2B SaaS companies, with deep Salesforce expertise and a track record of designing process frameworks that directly impact GTM velocity. Your focus on strategic initiatives and system architecture resonates with my approach to RevOps—I'd be interested in exploring how I could drive the operational scalability your team needs.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "Pylon", "title": "GTM Engineer", "location": "Remote", "url": "https://jobs.ashbyhq.com/pylon-labs/ca1dbdc6-8250-4f4f-abe6-f9e6d7e91b5c", "job_type": "Full-time", "posted": "2026-01-15", "description": "GTM Engineer role testing, implementing, and optimizing an AI outbound solution from setup through performance tuning. Builds automated outbound sequences with high deliverability, owns email marketing infrastructure including domain health and warming strategies, and creates data pipelines between marketing tools, CRM, and sales tooling. Collaborates with RevOps on lead scoring and routing and ships growth experiments like website widgets and ROI calculators. Requires 3+ years in marketing operations or GTM/growth engineering at B2B SaaS companies, with strong API and webhook skills.", "fit_score": 8, "score_reason": "Strong alignment with Omri's RevOps/GTM expertise and AI-native focus. The role's emphasis on data pipelines, CRM integration, and RevOps collaboration matches his core competencies, though it skews slightly more toward marketing ops execution than pure revenue operations strategy.", "ai_opener": "Omri here—I noticed Pylon is building out AI-powered outbound infrastructure, and your GTM Engineer role caught my attention because it sits at the exact intersection of RevOps rigor and growth engineering. With 15+ years scaling B2B SaaS GTM motions and deep experience in pipeline architecture, lead scoring, and CRM/marketing tool integrations, I've spent a lot of time optimizing exactly what you're describing: automating outbound sequences while maintaining deliverability and data integrity. I'd love to explore how my background could accelerate your go-to-market velocity.", "location_ok": true, "scan_date": "2026-06-03"}, {"company": "FacilityOS", "title": "GTM Engineer", "location": "Remote", "url": "https://jobs.ashbyhq.com/facilityos/6b12d214-0100-45cf-8f86-9d43a78b3c16", "job_type": "Full-time", "posted": "2026-03-28", "description": "GTM Engineer at a B2B SaaS company helping mid-to-large enterprises stay safe, compliant, and operationally sharp through a facility management platform. The role involves building, configuring, and continuously improving AI agents that help Sales, Marketing, and Customer Success work smarter. Works at the intersec /* ── stats ── */
function computeStats(){
  const by={saved:0,applied:0,interview:0,offer:0,rejected:0};
  let starred=0,followup=0,dismissedCount=0,newCount=0;
  JOBS.forEach(j=>{
    const st=getJobState(j);
    if(st.dismissed){dismissedCount++;return;}
    const stage=getStage(j);
    if(by[stage]!==undefined)by[stage]++;
    if(st.starred)starred++;
    if(needsFollowup(st))followup++;
    if(isNew(j))newCount++;
  });
  const inPlay=by.saved+by.applied+by.interview;
  return{by,starred,followup,inPlay,interviews:by.interview,offers:by.offer,total:JOBS.length,dismissed:dismissedCount,newCount};
}

  if(stats.inPlay>0)return`${stats.inPlay} מועמדויות בתהליך`;
  return"בוא נצבור מומנטום 🚀";
}
function needsFollowup(st){
  if(getStage({company:st.company,title:st.title}||{})==="applied"||st.status==="applied"){
    if(!st.statusDate)return false;
    return Math.round((new Date()-new Date(st.statusDate))/86400000)>=7;
  }
  return false;
}

  if(st.status!=="applied")return false;

function tailorData(j){
  const cvData=getCV();
  const text=((j.title||"")+" "+(j.description||"")+" "+(j.score_reason||"")+" "+(j.ai_opener||"")).toLowerCase();
  const score=arr=>arr.reduce((n,kw)=>n+(text.includes(kw)?1:0),0);
  const comps=[...cvData.competencies].map(c=>({t:c.t,s:score(c.k)})).sort((a,b)=>b.s-a.s);
  const useComps=(comps.filter(c=>c.s>0).slice(0,4).length?comps.filter(c=>c.s>0).slice(0,4):comps.slice(0,4)).map(c=>c.t);
  const exp=cvData.experience.map(e=>{
    const bl=[...e.bullets].map(b=>({t:b.t,s:score(b.k)})).sort((a,b)=>b.s-a.s);
    return{role:e.role,org:e.org,dates:e.dates,bullets:bl.slice(0,3).map(b=>b.t)};
  });
  return{useComps,exp};
}
function tailorCV(j){
  const cvData=getCV();
  const{useComps,exp}=tailorData(j);
  let L=[];
  L.push(cvData.name,cvData.tagline,cvData.contact,"","— TAILORED FOR: "+j.title+" @ "+j.company+" —","","PROFILE");
  L.push(cvData.summary+" Directly aligned with "+j.company+"'s need for "+j.title+".","","KEY STRENGTHS FOR THIS ROLE");
  useComps.forEach(c=>L.push("• "+c));
  L.push("","EXPERIENCE");
  exp.forEach(e=>{L.push(e.role+" | "+e.org+"  ("+e.dates+")");e.bullets.forEach(b=>L.push("  • "+b));L.push("");});
  L.push("EDUCATION",cvData.education);
  return L.join("\n");
}

/* ── RENDER ── */
function render(){
  const stats=computeStats();
  // hero
  document.getElementById("hero-meta").textContent=`Jun 03, 2026 · ${stats.total} משרות פעילות`;
  document.getElementById("hero-coach").textContent=coachLine(stats);

  // funnel
  const funnelStages=STAGES.filter(s=>s.key!=="rejected");
  const maxCount=Math.max(1,...funnelStages.map(s=>stats.by[s.key]||0));
  document.getElementById("funnel").innerHTML=funnelStages.map((s,si)=>{
    const cnt=stats.by[s.key]||0;
    const c=stageColor(s.hue);
    const w=cnt?Math.round(cnt/maxCount*100):0;
    return`<div class="f-stage${fStage===s.key?" active":""}" data-stage="${s.key}"
      style="--f-bg:${c.bg};--f-fg:${c.fg};--f-solid:${c.solid}"
      onclick="fStage==='${s.key}'?setFunnelFilter('all'):setFunnelFilter('${s.key}')">
      <div class="f-count${cnt===0?" zero":""}">${cnt}</div>
      <div class="f-label">${s.he}</div>
      <div class="f-track"><div class="f-fill" style="width:${w}%"></div></div>
    </div>`;
  }).join("");

  // momentum chips
  const chips=[];
  chips.push(`<div class="m-chip">🔥 מחפש פעיל</div>`);
  if(stats.interviews>0)chips.push(`<div class="m-chip">📅 <span class="val">${stats.interviews}</span> ראיונות בתהליך</div>`);
  if(stats.offers>0)chips.push(`<div class="m-chip">★ <span class="val">${stats.offers}</span> הצעות</div>`);
  if(stats.followup>0)chips.push(`<div class="m-chip">💬 <span class="val">${stats.followup}</span> follow-up</div>`);
  if(stats.newCount>0)chips.push(`<div class="m-chip">✨ <span class="val">${stats.newCount}</span> חדשות</div>`);
  document.getElementById("m-chips").innerHTML=chips.join("");

  // stage filter counts
  Object.keys(stats.by).forEach(k=>{
    const el=document.getElementById("fc-"+k);if(el)el.textContent=stats.by[k]||0;
  });
  const allEl=document.getElementById("fc-all");if(allEl)allEl.textContent=stats.total;
  const dismissedEl=document.getElementById("fc-dismissed");if(dismissedEl)dismissedEl.textContent=stats.dismissed||0;
  // age counts (active jobs only)
  const activeJobs=JOBS.filter(j=>!getJobState(j).dismissed);
  const ageCounts={all:activeJobs.length,day:0,week:0,month:0};
  activeJobs.forEach(j=>{if(!j.posted)return;const d=Math.round((NOW-new Date(j.posted))/86400000);if(d<=1)ageCounts.day++;if(d<=7)ageCounts.week++;if(d<=30)ageCounts.month++;});
  ["all","day","week","month"].forEach(k=>{const el=document.getElementById("age-"+k);if(el)el.textContent=ageCounts[k]?ageCounts[k]:"";});

  // sort + filter
  let list=JOBS.map((j,idx)=>({j,idx,st:getJobState(j),stage:getStage(j)}));
  if(fSort==="score")list.sort((a,b)=>(b.st.starred-a.st.starred)||b.j.fit_score-a.j.fit_score);
  else if(fSort==="posted")list.sort((a,b)=>(b.st.starred-a.st.starred)||new Date(b.j.posted||0)-new Date(a.j.posted||0));
  else list.sort((a,b)=>(b.st.starred-a.st.starred)||(a.j.company||"").localeCompare(b.j.company||"","he"));
  window._sorted=list.map(x=>x.j);

  let v=0;
  document.getElementById("container").innerHTML=list.map((x,i)=>{
    const j=x.j,st=x.st,stage=x.stage;
    const isDismissed=!!st.dismissed;
    // show logic
    let show=false;
    if(fStage==="dismissed"){show=isDismissed;}
    else{
      if(isDismissed){show=false;}
      else{
        const passStage=fStage==="all"||(fStage==="starred"?st.starred:stage===fStage);
        const passFit=fFit==="all"||fitBand(j.fit_score)===fFit;
        const passQ=!fQ||(j.company||"").toLowerCase().includes(fQ)||(j.title||"").toLowerCase().includes(fQ);
        const passAge=(()=>{if(fAge==="all")return true;if(!j.posted)return false;const d=Math.round((NOW-new Date(j.posted))/86400000);if(fAge==="day")return d<=1;if(fAge==="week")return d<=7;if(fAge==="month")return d<=30;return true;})();
        show=passStage&&passFit&&passQ&&passAge;
      }
    }
    if(show)v++;
    const sc=stageColor(STAGES.find(s=>s.key===stage)?.hue||235);
    const fc=fitColor(j.fit_score);
    const follow=needsFollowupDirect(st);
    const sm=STAGES.find(s=>s.key===stage)||STAGES[0];
    const c=j.contact;
    const delay=Math.min(i,12)*0.03;
    const novel=isNew(j);
    const contactHTML=c?`<div class="contact-box">
      <div class="contact-head">👤 למי לפנות · via Clay</div>
      <div class="contact-main">
        <div class="avatar">${initials(c.name)}</div>
        <div><div class="contact-name">${c.name}</div><div class="contact-title">${c.title}</div></div>
      </div>
      <div class="contact-links">
        ${c.email?`<a class="clink" href="mailto:${c.email}">✉️ ${c.email}</a>`:""}
        ${c.linkedin?`<a class="clink li" href="${c.linkedin}" target="_blank" rel="noopener">in LinkedIn</a>`:""}
      </div></div>`:"";
    const stepBtns=STAGES.map(s=>{
      const sc2=stageColor(s.hue);
      return`<button class="step-btn${stage===s.key?" on":""}"
        style="--s-solid:${sc2.solid};--s-fg:${sc2.fg}"
        onclick='event.stopPropagation();setStatus(window._sorted[${i}],"${s.key}")'>${s.verb}</button>`;
    }).join("");
    const showChan=stage==="applied"||stage==="interview";
    const chanBtns=["linkedin","חבר","אתר","מייל","וואטסאפ"].map((v2,ci)=>{
      const vals=["linkedin","friend","website","email","whatsapp"];
      return`<button class="chan-btn${st.channel===vals[ci]?" on":""}" onclick='event.stopPropagation();setChannel(window._sorted[${i}],"${vals[ci]}")'>${v2}</button>`;
    }).join("");
    const channelHTML=showChan?`<div class="channel-wrap"><div class="channel-lbl">דרך מה הוגש?</div><div class="chan">${chanBtns}</div></div>`:"";
    const noteVal=(st.note||"").replace(/"/g,"&quot;");
    const aiNote=j.ai_opener||j.score_reason||"";

    // dismiss section
    const dismissSection=isDismissed
      ?`<div class="dismissed-banner">
          <span>🗑️ סומן כסגור · ${st.dismiss_reason||''} · ${st.dismiss_date||''}</span>
          <button class="undismiss-link" onclick='event.stopPropagation();undismissJob(window._sorted[${i}])'>בטל</button>
        </div>`
      :`<div>
          <button class="dismiss-toggle" onclick='event.stopPropagation();toggleDismissPanel(this)'>⊖ סמן כסגורה</button>
          <div class="dismiss-panel">
            <div class="dismiss-panel-inner">
              <div class="dismiss-btns">
                <button class="dismiss-btn" onclick='event.stopPropagation();dismissJob(window._sorted[${i}],"irrelevant")'>🚫 לא רלוונטי</button>
                <button class="dismiss-btn" onclick='event.stopPropagation();dismissJob(window._sorted[${i}],"broken_link")'>🔗 לינק שבור</button>
                <button class="dismiss-btn" onclick='event.stopPropagation();dismissJob(window._sorted[${i}],"closed")'>❌ משרה לא קיימת</button>
              </div>
            </div>
          </div>
        </div>`;

    return`<div class="job-card st-${stage}${follow?" has-followup":""}${isDismissed?" dismissed":""}"
      style="display:${show?"":"none"};--s-solid:${sc.solid};--s-bg:${sc.bg};--s-fg:${sc.fg};
             animation:cardIn .45s ${delay}s both"
      id="jc-${i}">
      <div class="card-head" onclick="toggleCard(this.parentElement)">
        <button class="star-btn${st.starred?" on":""}" onclick='event.stopPropagation();toggleStar(window._sorted[${i}])'>★</button>
        <div class="fit-mark" style="background:${fc.bg}">
          <div class="fit-num" style="color:${fc.fg}">${j.fit_score}</div>
          <div class="fit-lbl" style="color:${fc.fg}">FIT</div>
        </div>
        <div class="card-text">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
          ${j.posted?`<div class="card-posted">🕐 ${postedLabel(j.posted)}</div>`:""}
        </div>
        <div class="card-head-right">
          <div class="s-pill" style="--s-bg:${sc.bg};--s-fg:${sc.fg};--s-solid:${sc.solid}">
            <span class="s-dot"></span>${sm.he}${st.statusDate?" · "+fmtDate(st.statusDate):""}
          </div>
          ${follow?`<span class="follow-badge">💬 Follow up?</span>`:""}
          ${novel?`<span class="new-badge">חדש ✨</span>`:""}
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="card-body-wrap">
        <div class="card-body-inner">
          <div class="card-body">
            <div class="meta-chips">
              ${j.posted?`<span class="meta-chip">🕐 ${postedLabel(j.posted)}</span>`:""}
              ${j.location?`<span class="meta-chip">📍 ${j.location}</span>`:""}
              ${j.job_type?`<span class="meta-chip">⚡ ${j.job_type}</span>`:""}
            </div>
            ${aiNote?`<div class="ai-note"><div class="ai-note-head">⚡ התאמת AI</div><div class="ai-note-text">${aiNote}</div></div>`:""}
            ${contactHTML}
            <div class="notes-wrap">
              <div class="notes-lbl">🧠 פידבק לסינון <span style="font-weight:400;opacity:.6;font-size:.6rem">(משפר את הניקוד בסריקה הבאה)</span></div>
              <textarea class="notes-ta score-fb${st.score_feedback?" has-note":""}" id="fb-${i}" rows="2"
                placeholder="למשל: החברה קטנה מדי / התפקיד מדי טכני / מיקום בעייתי / שכר לא מספיק…"
                onclick="event.stopPropagation()">${(st.score_feedback||"").replace(/"/g,"&quot;")}</textarea>
              <div class="save-row">
                <button class="save-btn" id="fb-save-${i}" onclick='event.stopPropagation();saveField("fb",${i})'>שמור פידבק 💾</button>
                <span class="saved-ack" id="fb-ack-${i}"></span>
              </div>
            </div>
            <div class="notes-wrap">
              <div class="notes-lbl">📝 הערות אישיות</div>
              <textarea class="notes-ta${st.note?" has-note":""}" id="note-${i}" rows="2"
                placeholder="מה קרה עד עכשיו? אנשי קשר, משימות, תאריכים…"
                onclick="event.stopPropagation()">${noteVal}</textarea>
              <div class="save-row">
                <button class="save-btn" id="note-save-${i}" onclick='event.stopPropagation();saveField("note",${i})'>שמור הערות 💾</button>
                <span class="saved-ack" id="note-ack-${i}"></span>
              </div>
            </div>
            <div class="stepper-wrap">
              <div class="stepper-lbl">📌 איפה זה עומד?</div>
              <div class="stepper">${stepBtns}</div>
            </div>
            ${channelHTML}
            <div class="actions">
              <button class="act-btn act-wa" onclick='event.stopPropagation();shareWA(${i})'>וואטסאפ</button>
              <button class="act-btn act-cv" onclick='event.stopPropagation();openCV(${i})'>קו״ח 📄</button>
              <button class="act-btn act-copy" onclick='event.stopPropagation();copyOpener(this,${i})'>פנייה 📋</button>
              <a href="${j.url}" target="_blank" rel="noopener" class="act-btn act-open" onclick='event.stopPropagation()'>משרה ↗</a>
            </div>
            ${dismissSection}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");

  const starredC=JOBS.filter(j=>getJobState(j).starred).length;
  let ct=`${v} משרות`;
  if(starredC)ct+=` · ⭐ ${starredC}`;
  if(stats.followup)ct+=` · 💬 ${stats.followup} follow-up`;
  if(stats.newCount)ct+=` · ✨ ${stats.newCount} חדשות`;
  document.getElementById("count-lbl").textContent=ct;
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2400);
}
function copyOpener(btn,i){
  const j=window._sorted[i],text=j.ai_opener||"";
  if(!text){showToast("אין פנייה");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="הועתק! ✓";btn.classList.add("copied");showToast("הפנייה הועתקה!");
    setTimeout(()=>{btn.textContent="פנייה 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("ההעתקה נכשלה"));
}
function shareWA(i){
  const j=window._sorted[i],c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\nFit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted)msg+=`עלתה: ${postedLabel(j.posted)}\n`;
  if(c)msg+=`איש קשר: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

/* ── GitHub feedback sync (Feature 1) ── */
async function syncFeedback(){
  const token=localStorage.getItem('gh_token');
  if(!token){showToast('הוסף GitHub token בהגדרות');return;}
  const dismissed={};
  const job_feedback={};
  Object.entries(STATE).forEach(([k,v])=>{
    if(v.dismissed)dismissed[k]={reason:v.dismiss_reason,date:v.dismiss_date,company:v.company};
    if(v.score_feedback)job_feedback[k]=v.score_feedback;
  });
  const avoid=Object.values(dismissed)
    .filter(d=>d.reason==='irrelevant')
    .map(d=>d.company).filter(Boolean);
  const payload={dismissed,avoid_companies:[...new Set(avoid)],job_feedback};
  try{
    const r=await fetch('https://api.github.com/repos/omriki55/family-chores-admin/contents/job_search/feedback.json',{
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json'}
    });
    const cur=await r.json();
    await fetch('https://api.github.com/repos/omriki55/family-chores-admin/contents/job_search/feedback.json',{
      method:'PUT',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        message:`Update feedback — ${new Date().toISOString().slice(0,10)}`,
        content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))),
        sha:cur.sha
      })
    });
    showToast('✅ פידבק עודכן בריפו');
    document.getElementById('sync-status').textContent=`סונכרן: ${new Date().toLocaleTimeString('he-IL')}`;
  }catch(e){showToast('❌ שגיאה בסנכרון: '+e.message);}
}

/* ── Scan button (Feature 3) ── */
async function triggerScan(){
  const token=localStorage.getItem('gh_token');
  if(!token){
    showToast('הוסף GitHub token בהגדרות כדי לסרוק');
    openSettings('connect');
    return;
  }
  const btn=document.getElementById('scan-btn');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('https://api.github.com/repos/omriki55/family-chores-admin/actions/workflows/job-scan.yml/dispatches',{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main'})
    });
    if(r.status===204)showToast('✅ סריקה הופעלה! תוצאות יגיעו בעוד ~2 דקות');
    else showToast('❌ שגיאה בהפעלת סריקה');
  }catch(e){showToast('❌ '+e.message);}
  setTimeout(()=>{btn.textContent='🔄';btn.disabled=false;},5000);
}

/* ── Settings drawer (Feature 4) ── */
function openSettings(tab){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('show');
  // load values
  const ov=JSON.parse(localStorage.getItem('cv_override')||'{}');
  const cvData=getCV();
  document.getElementById('cv-name').value=ov.name||'';
  document.getElementById('cv-contact').value=ov.contact||'';
  document.getElementById('cv-tagline').value=ov.tagline||'';
  document.getElementById('cv-summary').value=ov.summary||'';
  const roles=JSON.parse(localStorage.getItem('desired_roles')||'null')||CV_BASE_ROLES;
  document.getElementById('roles-ta').value=roles.join('\n');
  const tk=localStorage.getItem('gh_token')||'';
  document.getElementById('gh-token-inp').value=tk;
  document.getElementById('gh-token-status').textContent=tk?'Token שמור ✓':'';
  if(tab)switchDrawerTabByKey(tab);
}
function closeSettings(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
}
function switchDrawerTab(btn){
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  switchDrawerTabByKey(btn.dataset.tab);
}
function switchDrawerTabByKey(key){
  document.querySelectorAll('.d-tab-panel').forEach(p=>p.classList.remove('on'));
  const panel=document.getElementById('dtab-'+key);
  if(panel)panel.classList.add('on');
  document.querySelectorAll('.dtab').forEach(t=>{if(t.dataset.tab===key)t.classList.add('on');else t.classList.remove('on');});
}
function saveCvOverride(){
  const ov={};
  const name=document.getElementById('cv-name').value.trim();
  const contact=document.getElementById('cv-contact').value.trim();
  const tagline=document.getElementById('cv-tagline').value.trim();
  const summary=document.getElementById('cv-summary').value.trim();
  if(name)ov.name=name;
  if(contact)ov.contact=contact;
  if(tagline)ov.tagline=tagline;
  if(summary)ov.summary=summary;
  localStorage.setItem('cv_override',JSON.stringify(ov));
}
function resetCvOverride(){
  localStorage.removeItem('cv_override');
  document.getElementById('cv-name').value='';
  document.getElementById('cv-contact').value='';
  document.getElementById('cv-tagline').value='';
  document.getElementById('cv-summary').value='';
  showToast('קורות חיים אופסו לברירת מחדל');
}
const CV_BASE_ROLES=[
  "Head of Revenue Operations","RevOps Manager","GTM Engineer",
  "Head of Growth","Marketing Operations Lead","Sales Operations Manager"
];
function saveRoles(){
  const lines=document.getElementById('roles-ta').value.split('\n').map(l=>l.trim()).filter(Boolean);
  localStorage.setItem('desired_roles',JSON.stringify(lines));
}
function downloadConfig(){
  const roles=JSON.parse(localStorage.getItem('desired_roles')||'null')||CV_BASE_ROLES;
  const cfg={roles,updated:new Date().toISOString().slice(0,10)};
  const b=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='config.json';a.click();
}
function saveGhToken(){
  const tk=document.getElementById('gh-token-inp').value.trim();
  if(tk){localStorage.setItem('gh_token',tk);document.getElementById('gh-token-status').textContent='Token שמור ✓';showToast('Token נשמר');}
  else{localStorage.removeItem('gh_token');document.getElementById('gh-token-status').textContent='';showToast('Token הוסר');}
