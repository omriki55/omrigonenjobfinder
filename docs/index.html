<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0f2f7;--card:#ffffff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
      --accent:#2563eb;--accent-bg:#eff4ff;--accent-border:#c7d7fe;
      --green:#16a34a;--green-bg:#dcfce7;--green-border:#86efac;
      --amber:#b45309;--amber-bg:#fef3c7;--amber-border:#fcd34d;
      --red:#dc2626;--red-bg:#fee2e2;--red-border:#fca5a5;
      --purple:#7c3aed;--purple-bg:#ede9fe;--purple-border:#c4b5fd;
      --star:#d97706;--star-bg:#fffbeb;--star-border:#fde68a;
      --gray:#374151;--gray-bg:#f3f4f6;--gray-border:#d1d5db;
      --wa:#25d366;
      --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.06);
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:56px;-webkit-font-smoothing:antialiased;direction:rtl}

    /* ── HEADER ── */
    header{background:#fff;border-bottom:1px solid var(--line);padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .header-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .header-title{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--text)}
    .header-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
    .sheet-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px 11px;font-size:.76rem;text-decoration:none;font-weight:600;white-space:nowrap;transition:background .15s}
    .sheet-btn:hover{background:var(--line)}

    /* ── FILTER BAR ── */
    .filter-wrap{max-width:780px;margin:0 auto;padding:10px 16px 0}
    .filter-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
    .filter-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);width:46px;flex-shrink:0;text-align:right}
    /* base pill */
    .fp{background:#fff;border:1.5px solid var(--line);color:var(--muted);border-radius:999px;padding:5px 13px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .13s;outline:none}
    .fp:hover{border-color:#9ca3af}
    /* active variants per status */
    .fp.active{color:#fff}
    .fp[data-val="all"].active{background:var(--text);border-color:var(--text)}
    .fp[data-val="todo"].active{background:var(--gray);border-color:var(--gray)}
    .fp[data-val="applied"].active{background:var(--accent);border-color:var(--accent)}
    .fp[data-val="interview"].active{background:var(--purple);border-color:var(--purple)}
    .fp[data-val="rejected"].active{background:var(--red);border-color:var(--red)}
    .fp[data-val="starred"].active{background:var(--star);border-color:var(--star)}
    .fp[data-val="high"].active{background:var(--green);border-color:var(--green)}
    .fp[data-val="mid"].active{background:var(--amber);border-color:var(--amber)}
    /* inactive tint hints */
    .fp[data-val="todo"]:not(.active):hover{background:var(--gray-bg);border-color:var(--gray-border);color:var(--gray)}
    .fp[data-val="applied"]:not(.active):hover{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
    .fp[data-val="interview"]:not(.active):hover{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}
    .fp[data-val="rejected"]:not(.active):hover{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
    .fp[data-val="starred"]:not(.active):hover{background:var(--star-bg);border-color:var(--star-border);color:var(--star)}

    /* ── COUNT ── */
    .count-bar{max-width:780px;margin:6px auto 0;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
    .count-txt{font-size:.78rem;font-weight:600;color:var(--muted)}

    /* ── CARDS ── */
    .jobs-wrap{max-width:780px;margin:0 auto;padding:10px 16px 0;display:flex;flex-direction:column;gap:12px}

    .job-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;transition:opacity .2s}
    /* left-bar color per status (rtl → border-right) */
    .job-card.st-todo{border-right:4px solid var(--gray-border)}
    .job-card.st-applied{border-right:4px solid var(--accent)}
    .job-card.st-interview{border-right:4px solid var(--purple)}
    .job-card.st-rejected{border-right:4px solid var(--red);opacity:.68}
    .job-card.st-starred-card{outline:2px solid var(--star);outline-offset:-2px}

    /* top row */
    .card-top{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:48px;height:48px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1}
    .score-badge .num{font-size:1.35rem}
    .score-badge .lbl{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;opacity:.7}
    .sg{background:var(--green-bg);color:var(--green)}
    .sa{background:var(--amber-bg);color:var(--amber)}
    .sr{background:var(--red-bg);color:var(--red)}

    .card-title{flex:1;min-width:0;padding-left:32px}
    .card-company{font-weight:800;font-size:1rem;letter-spacing:-.01em}
    .card-role{font-size:.84rem;color:var(--muted);margin-top:1px}

    /* star button */
    .star-btn{position:absolute;top:14px;left:14px;background:none;border:none;font-size:1.15rem;cursor:pointer;line-height:1;padding:2px;opacity:.35;transition:opacity .15s,transform .15s}
    .star-btn.on{opacity:1;transform:scale(1.15)}

    /* status pill */
    .spill{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:999px;border:1.5px solid;white-space:nowrap}
    .spill.s-todo{background:var(--gray-bg);color:var(--gray);border-color:var(--gray-border)}
    .spill.s-applied{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
    .spill.s-interview{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
    .spill.s-rejected{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

    /* status + date row */
    .card-status-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .status-date{font-size:.67rem;color:var(--muted);font-weight:500}

    /* tags */
    .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
    .tag{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px 8px;font-size:.72rem;color:#4b5563;font-weight:500;display:inline-flex;align-items:center;gap:3px}
    .tag.t-date{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}

    /* reason */
    .card-reason{font-size:.82rem;color:#374151;line-height:1.5;margin-top:2px}

    /* contact box */
    .contact-box{background:#f8fafc;border:1px solid var(--line);border-radius:11px;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
    .contact-head{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
    .contact-main{display:flex;align-items:center;gap:10px}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
    .contact-name{font-weight:700;font-size:.84rem}
    .contact-title{font-size:.72rem;color:var(--muted)}
    .contact-links{display:flex;gap:7px;flex-wrap:wrap}
    .clink{font-size:.72rem;font-weight:600;text-decoration:none;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;color:#374151;display:inline-flex;align-items:center;gap:3px}
    .clink.li{color:#0a66c2}
    .clink.em{color:var(--accent)}

    /* status tracker */
    .tracker{background:#fafbfd;border:1px dashed var(--line);border-radius:11px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .tracker-lbl{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
    .seg{display:flex;gap:5px;flex-wrap:wrap}
    .seg button{flex:1;min-width:62px;padding:6px 4px;border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:#6b7280;transition:all .12s;outline:none}
    .seg button:hover{border-color:#9ca3af}
    .seg button.on-todo{background:var(--gray);color:#fff;border-color:var(--gray)}
    .seg button.on-applied{background:var(--accent);color:#fff;border-color:var(--accent)}
    .seg button.on-interview{background:var(--purple);color:#fff;border-color:var(--purple)}
    .seg button.on-rejected{background:var(--red);color:#fff;border-color:var(--red)}
    .channel-wrap{display:flex;flex-direction:column;gap:5px}
    .channel-lbl{font-size:.68rem;font-weight:600;color:var(--muted)}
    .chan{display:flex;gap:5px;flex-wrap:wrap}
    .chan button{padding:5px 10px;border-radius:999px;font-size:.72rem;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:#6b7280;outline:none;transition:all .12s}
    .chan button.on{background:#0f172a;color:#fff;border-color:#0f172a}

    /* action buttons */
    .card-actions{display:flex;gap:7px;flex-wrap:wrap}
    .btn{flex:1;min-width:72px;padding:10px 6px;border-radius:10px;font-size:.79rem;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--line);transition:all .14s;display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none;white-space:nowrap}
    .btn-view{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-copy{background:#fff;color:#374151}
    .btn-copy.copied{color:var(--green);border-color:var(--green)}
    .btn-cv{background:#0f172a;color:#fff;border-color:#0f172a}
    .btn-wa{background:var(--wa);color:#fff;border-color:var(--wa)}

    /* divider between sections */
    .card-section{display:flex;flex-direction:column;gap:10px}

    /* toast */
    #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f172a;color:#fff;border-radius:20px;padding:10px 20px;font-size:.84rem;font-weight:600;z-index:999;transition:transform .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.22)}
    #toast.show{transform:translateX(-50%) translateY(0)}

    /* modal */
    #modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center}
    #modal.show{display:flex}
    .modal-card{background:#fff;width:100%;max-width:760px;max-height:88vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden}
    @media(min-width:760px){#modal{align-items:center}.modal-card{border-radius:18px}}
    .modal-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{font-size:.95rem;font-weight:800}
    .modal-head .sub{font-size:.72rem;color:var(--muted);margin-top:1px}
    .modal-close{background:#f1f5f9;border:none;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;color:#475569;flex-shrink:0}
    .modal-body{padding:14px 16px;overflow-y:auto;white-space:pre-wrap;font-size:.8rem;line-height:1.55;color:#1e293b;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .modal-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:7px}
    .modal-foot .btn{min-width:0}

    @media(max-width:500px){
      .card-actions .btn{font-size:.72rem;padding:9px 4px}
      .seg button{font-size:.7rem;min-width:56px}
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="header-title">🎯 Job Tracker — Omri</div>
      <div class="header-meta">RevOps / GTM · עודכן Jun 03, 2026</div>
    </div>
    <a class="sheet-btn" href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank">📊 Sheet</a>
  </div>
</header>

<div class="filter-wrap">
  <div class="filter-row">
    <span class="filter-label">ציון</span>
    <button class="fp active" data-grp="score" data-val="all" onclick="setScore(this)">הכל</button>
    <button class="fp" data-grp="score" data-val="high" onclick="setScore(this)">🟢 8+</button>
    <button class="fp" data-grp="score" data-val="mid" onclick="setScore(this)">🟡 5–7</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">סטטוס</span>
    <button class="fp active" data-grp="status" data-val="all" onclick="setStatusFilter(this)">הכל</button>
    <button class="fp" data-grp="status" data-val="todo" onclick="setStatusFilter(this)">⬜ לא הוגש</button>
    <button class="fp" data-grp="status" data-val="applied" onclick="setStatusFilter(this)">🔵 הוגש</button>
    <button class="fp" data-grp="status" data-val="interview" onclick="setStatusFilter(this)">🟣 ראיון</button>
    <button class="fp" data-grp="status" data-val="rejected" onclick="setStatusFilter(this)">🔴 נדחה</button>
    <button class="fp" data-grp="status" data-val="starred" onclick="setStatusFilter(this)">⭐ נבחרות</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">מיון</span>
    <button class="fp active" data-grp="sort" data-val="score" onclick="setSort(this)">לפי ציון</button>
    <button class="fp" data-grp="sort" data-val="posted" onclick="setSort(this)">משרה חדשה</button>
    <button class="fp" data-grp="sort" data-val="updated" onclick="setSort(this)">עודכן לאחרונה</button>
  </div>
</div>

<div class="count-bar"><span class="count-txt" id="count"></span></div>
<div class="jobs-wrap" id="container"></div>
<div id="toast"></div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card">
    <div class="modal-head">
      <div><h3 id="m-title">קורות חיים מותאמים</h3><div class="sub" id="m-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot">
      <button class="btn btn-copy" onclick="copyCV()">העתק 📋</button>
      <button class="btn btn-cv" onclick="printCV()">PDF 🖨️</button>
      <button class="btn btn-view" onclick="downloadCV()">.txt ⬇</button>
    </div>
  </div>
</div>

<script>
const JOBS=[{"company": "Rapyd", "title": "Revenue Operations Manager", "location": "Tel Aviv, Israel", "url": "https://www.rapyd.net/company/careers/positions/revenue-operations-manager-tel-aviv-israel/", "job_type": "Full-time", "posted": "2026-05-15", "description": "Fintech company Rapyd seeks a Revenue Operations Manager to power its go-to-market engine, driving operational efficiency, performance visibility, and actionable insights. You'll manage and optimize the revenue tech stack including CRM and marketing automation, partner across Sales, Marketing, Finance, and the broader GTM organization, and support day-to-day RevOps tasks. Requires strong project management skills, ability to juggle priorities in a fast-paced environment, high organization, attention to detail, and fluent written and spoken English.", "fit_score": 9, "score_reason": "Excellent match: RevOps Manager role at fintech company aligns perfectly with Omri's senior RevOps expertise, B2B SaaS background, and fintech experience. Tel Aviv location is within acceptable radius.", "ai_opener": "Omri here—I've spent 15+ years building revenue engines in B2B SaaS and fintech, and I've been following Rapyd's aggressive GTM expansion. Your Revenue Operations Manager role caught my attention because optimizing revenue tech stacks and driving operational efficiency across Sales, Marketing, and Finance is exactly where I've delivered the most impact—particularly in high-growth fintech environments where GTM precision directly impacts unit economics.", "location_ok": true, "contact": {"name": "Lihi Rothschild-Sholder", "title": "VP RevOps (hiring manager)", "email": "lihir@rapyd.net", "linkedin": "https://www.linkedin.com/in/lihi-rothschild-sholder-b5ab422a/"}}, {"company": "PointFive", "title": "Senior RevOps Manager", "location": "USA / Tel Aviv (Hybrid)", "url": "https://pointfive.teamtailor.com/jobs/5883111-senior-revops-manager", "job_type": "Full-time", "posted": "2026-05-20", "description": "As PointFive's first in-house Revenue Operations Manager, you'll build and lead the RevOps function from the ground up, blending strategic operations, systems leadership, and Deal Desk responsibilities. You'll partner with Sales, Marketing, Customer Success, and Finance to streamline processes, improve forecasting, and structure deals. Requires 5+ years in Revenue/Sales Operations within high-growth B2B SaaS, deep Salesforce administration knowledge, marketing automation experience, strong Excel/Google Sheets skills, and proven ability to deliver actionable reporting.", "fit_score": 9, "score_reason": "Exceptional match - building RevOps from scratch aligns perfectly with Omri's senior GTM background, and the role demands exactly his core competencies (Salesforce, forecasting, cross-functional process optimization, Deal Desk). Location is ideal with USA/Tel Aviv hybrid flexibility.", "ai_opener": "I noticed PointFive is building out its Revenue Operations function from the ground up—a challenge I've tackled multiple times across high-growth B2B SaaS companies. With 15+ years scaling GTM engines and deep Salesforce expertise, I've architected the exact playbook you need: forecasting rigor, Deal Desk governance, and cross-functional systems that actually stick. The USA/Tel Aviv hybrid setup matches my working style perfectly.", "location_ok": true, "contact": null}, {"company": "Incredibuild", "title": "RevOps Manager", "location": "Tel Aviv District, Israel", "url": "https://il.linkedin.com/jobs/view/revops-manager-at-incredibuild-4384058490", "job_type": "Full-time", "posted": "2026-05-10", "description": "Incredibuild, a software acceleration company, is hiring a RevOps Manager based in the Tel Aviv District. The role focuses on optimizing revenue operations processes across sales, marketing, and customer success, managing the CRM and revenue tech stack, supporting forecasting and pipeline analysis, and aligning go-to-market teams. Ideal candidates bring experience in rev   useComps.forEach(c=>lines.push("• "+c));
  lines.push("","EXPERIENCE");
  exp.forEach(e=>{lines.push(e.role+" | "+e.org+"  ("+e.dates+")");e.bullets.forEach(b=>lines.push("  • "+b));lines.push("");});
  lines.push("EDUCATION",CV.education);
  return lines.join("\n");
}
let _cvText="",_cvCompany="",_cvJob=null;
function openCV(i){
  const j=window._sorted[i];
  _cvJob=j;_cvText=tailorCV(j);_cvCompany=j.company;
  document.getElementById("m-title").textContent="קו״ח מותאמים — "+j.company;
  document.getElementById("m-sub").textContent=j.title;
  document.getElementById("m-body").textContent=_cvText;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");}
function copyCV(){navigator.clipboard.writeText(_cvText).then(()=>showToast("קורות חיים הועתקו!"));}
function downloadCV(){
  const blob=new Blob([_cvText],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="Omri_Gonen_CV_"+_cvCompany.replace(/[^a-z0-9]+/gi,"_")+".txt";a.click();showToast("ירד קובץ");
}
function printCV(){
  if(!_cvJob)return;
  const j=_cvJob,{useComps,exp}=tailorData(j);
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const expHTML=exp.map(e=>`<div class="role"><div class="rh"><span class="rt">${esc(e.role)}</span><span class="rd">${esc(e.dates)}</span></div><div class="ro">${esc(e.org)}</div><ul>${e.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}</ul></div>`).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Omri Gonen — CV — ${esc(j.company)}</title>
  <style>@page{margin:14mm}*{box-sizing:border-box}body{font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;line-height:1.4;max-width:780px;margin:0 auto;padding:10px}h1{font-size:24px;letter-spacing:.5px;margin:0}.tag{color:#2563eb;font-weight:bold;font-size:12.5px;margin:3px 0}.contact{font-size:11px;color:#555;margin-bottom:4px}.tailored{font-size:11px;color:#7c3aed;font-weight:bold;border:1px solid #e4d8fb;background:#f7f3ff;padding:5px 9px;border-radius:6px;display:inline-block;margin:6px 0}h2{font-size:12.5px;text-transform:uppercase;letter-spacing:1px;color:#2563eb;border-bottom:1.5px solid #2563eb;padding-bottom:2px;margin:16px 0 7px}p.sum{font-size:12.5px;margin:0}ul{margin:4px 0 0;padding-left:18px}li{font-size:12px;margin:2px 0}.role{margin-bottom:11px}.rh{display:flex;justify-content:space-between;align-items:baseline}.rt{font-weight:bold;font-size:13px}.rd{font-size:11px;color:#666}.ro{font-style:italic;font-size:11.5px;color:#444}.edu{font-size:12px}@media print{.noprint{display:none}}.noprint{text-align:center;margin:14px 0}.noprint button{font-family:sans-serif;font-size:14px;padding:9px 22px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}</style></head><body>
  <div class="noprint"><button onclick="window.print()">🖨️ הדפס / שמור כ-PDF</button></div>
  <h1>${esc(CV.name)}</h1><div class="tag">${esc(CV.tagline)}</div><div class="contact">${esc(CV.contact)}</div>
  <div class="tailored">Tailored for: ${esc(j.title)} @ ${esc(j.company)}</div>
  <h2>Profile</h2><p class="sum">${esc(CV.summary)}</p>
  <h2>Key Strengths for This Role</h2><ul class="comps">${useComps.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>
  <h2>Experience</h2>${expHTML}<h2>Education</h2><div class="edu">${esc(CV.education)}</div>
  </body></html>`;
  const w=window.open("","_blank");
  if(!w){showToast("אפשר חלונות קופצים כדי להדפיס");return;}
  w.document.write(html);w.document.close();
}

/* ── render ── */
function render(){
  let list=JOBS.map((j,idx)=>({j,idx,st:getJobState(j)}));
  if(fSort==="score")list.sort((a,b)=>b.j.fit_score-a.j.fit_score);
  else if(fSort==="posted")list.sort((a,b)=>new Date(b.j.posted||0)-new Date(a.j.posted||0));
  else if(fSort==="updated")list.sort((a,b)=>new Date(b.st.statusDate||0)-new Date(a.st.statusDate||0));
  window._sorted=list.map(x=>x.j);
  let v=0;
  document.getElementById("container").innerHTML=list.map((x,i)=>{
    const j=x.j,st=x.st;
    const passScore=fScore==="all"||scoreBucket(j.fit_score)===fScore;
    const passStatus=fStatus==="starred"?st.starred:(fStatus==="all"||st.status===fStatus);
    const show=passScore&&passStatus;
    if(show)v++;
    const sm=STATUS_META[st.status]||STATUS_META.todo;
    const c=j.contact;
    const starCls=st.starred?"on":"";
    const cardCls="job-card st-"+st.status+(st.starred?" st-starred-card":"");
    const contactHTML=c?`<div class="contact-box">
      <div class="contact-head">👤 למי לפנות · via Clay</div>
      <div class="contact-main">
        <div class="avatar">${initials(c.name)}</div>
        <div><div class="contact-name">${c.name}</div><div class="contact-title">${c.title}</div></div>
      </div>
      <div class="contact-links">
        ${c.email?`<a class="clink em" href="mailto:${c.email}">✉️ ${c.email}</a>`:""}
        ${c.linkedin?`<a class="clink li" href="${c.linkedin}" target="_blank" rel="noopener">in LinkedIn</a>`:""}
      </div></div>`:"";
    const segBtns=Object.keys(STATUS_META).map(key=>{
      const on=st.status===key?(" "+STATUS_META[key].on):"";
      return`<button class="${on.trim()}" onclick='setStatus(window._sorted[${i}],"${key}")'>${STATUS_META[key].label}</button>`;
    }).join("");
    const showChan=(st.status==="applied"||st.status==="interview");
    const chanBtns=CHANNELS.map(([v2,lbl])=>`<button class="${st.channel===v2?"on":""}" onclick='setChannel(window._sorted[${i}],"${v2}")'>${lbl}</button>`).join("");
    const channelHTML=showChan?`<div class="channel-wrap"><div class="channel-lbl">דרך מה הוגש?</div><div class="chan">${chanBtns}</div></div>`:"";
    const statusDateHTML=st.statusDate?`<span class="status-date">· ${fmtDate(st.statusDate)}</span>`:"";
    return`<div class="${cardCls}" style="display:${show?"":"none"}">
      <button class="star-btn ${starCls}" onclick='toggleStar(window._sorted[${i}])' title="סמן כנבחר">⭐</button>
      <div class="card-section">
        <div class="card-top">
          <div class="score-badge ${badgeClass(j.fit_score)}"><span class="num">${j.fit_score}</span><span class="lbl">fit</span></div>
          <div class="card-title">
            <div class="card-company">${j.company}</div>
            <div class="card-role">${j.title}</div>
          </div>
        </div>
        <div class="card-status-row">
          <span class="spill ${sm.pill}">${sm.label}</span>
          ${statusDateHTML}
        </div>
        <div class="card-tags">
          ${j.posted?`<span class="tag t-date">🗓️ ${postedLabel(j.posted)}</span>`:""}
          ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
          ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
        </div>
        ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      </div>
      ${contactHTML}
      <div class="tracker">
        <div class="tracker-lbl">📌 סטטוס מועמדות</div>
        <div class="seg">${segBtns}</div>
        ${channelHTML}
      </div>
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn btn-view">משרה ↗</a>
        <button class="btn btn-cv" onclick='openCV(${i})'>קו״ח 📄</button>
        <button class="btn btn-copy" onclick='copyOpener(this,${i})'>פנייה 📋</button>
        <button class="btn btn-wa" onclick='shareWA(${i})'>וואטסאפ</button>
      </div>
    </div>`;
  }).join("");
  const starredCount=JOBS.filter(j=>getJobState(j).starred).length;
  document.getElementById("count").textContent=v+" משרות"+(starredCount?` · ⭐ ${starredCount} נבחרות`:"");
}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,i){
  const j=window._sorted[i],text=j.ai_opener||"";
  if(!text){showToast("אין פנייה");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="הועתק! ✓";btn.classList.add("copied");showToast("הפנייה הועתקה!");
    setTimeout(()=>{btn.textContent="פנייה 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("ההעתקה נכשלה"));
}
function shareWA(i){
  const j=window._sorted[i],c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\nFit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted)msg+=`עלתה: ${postedLabel(j.posted)}\n`;
  if(c)msg+=`איש קשר: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
render();
</script>
</body>
</html>
