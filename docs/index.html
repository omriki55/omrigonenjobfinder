<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1e2130;--accent:#00c853;--text:#e0e0e0;--muted:#8a8fa8;--yellow:#ffd600;--red:#f44336;--border:#2a2d3e;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:40px}
    header{background:#131620;border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .header-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .filter-bar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .count-label{font-size:.75rem;color:var(--muted);padding:8px 16px 0}
    .jobs-container{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px}
    .card-row1{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800}
    .score-green{background:rgba(0,200,83,.18);color:var(--accent);border:1.5px solid rgba(0,200,83,.35)}
    .score-yellow{background:rgba(255,214,0,.15);color:var(--yellow);border:1.5px solid rgba(255,214,0,.3)}
    .score-red{background:rgba(244,67,54,.15);color:var(--red);border:1.5px solid rgba(244,67,54,.3)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#1a1d2e;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted)}
    .card-reason{font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-actions{display:flex;gap:8px;margin-top:2px}
    .btn-view,.btn-copy{flex:1;padding:9px 0;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;transition:opacity .15s}
    .btn-view{background:rgba(0,200,83,.12);color:var(--accent);border:1px solid rgba(0,200,83,.3);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-copy{background:rgba(138,143,168,.12);color:var(--muted);border:1px solid var(--border)}
    .btn-copy.copied{color:var(--accent);border-color:rgba(0,200,83,.4)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2d3e;color:var(--text);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Last updated: Jun 03, 2026</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank" style="background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:.8rem;text-decoration:none">📊 Sheet</a>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
  <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
</div>
<div class="count-label" id="count"></div>
<div class="jobs-container" id="container"></div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Rapyd", "title": "Revenue Operations Manager", "location": "Tel Aviv, Israel (In-Office)", "url": "https://www.rapyd.net/company/careers/positions/revenue-operations-manager-tel-aviv-israel/", "job_type": "Full-time", "description": "Rapyd, a global fintech/payments platform, seeks a Revenue Operations Manager to power its go-to-market strategy by driving operational efficiency, performance visibility, and actionable insights. The role partners with Sales, Marketing, Finance, and the broader GTM organization. Requires at least 5 years in Revenue/Sales/Customer Operations, strong BI skills with large datasets (Looker preferred), CRM proficiency (Salesforce or HubSpot), KPI tracking, revenue funnel analysis, and process improvement experience within GTM functions.", "fit_score": 9, "score_reason": "Exceptional match: Omri's 15+ years in B2B SaaS RevOps, Salesforce/HubSpot expertise, and fintech background align perfectly with Rapyd's needs. The role requires exactly his core competencies (pipeline forecasting, CAC/LTV, GTM operations), and Tel Aviv is in his preferred location zone.", "ai_opener": "Omri here—I've spent 15+ years building revenue operations engines for B2B SaaS and fintech companies, and I've followed Rapyd's scaling trajectory in the global payments space. Your Revenue Operations Manager role caught my attention because driving operational efficiency and visibility across Sales, Marketing, and Finance at a high-velocity fintech is exactly the kind of complex GTM orchestration I thrive on. I'd love to explore how my Salesforce/HubSpot expertise and track record with pipeline forecasting and process improvement could accelerate Rapyd's growth.", "location_ok": true}, {"company": "Vanta", "title": "Revenue Operations Manager", "location": "Remote", "url": "https://www.indeed.com/q-revenue-operations-l-remote-jobs.html", "job_type": "Full-time", "description": "Vanta is hiring a Revenue Operations Manager to support GTM operations. The role requires 4-6 years of experience in revenue operations, sales operations, or business operations, ideally within a B2B SaaS environment. Responsibilities include managing revenue systems, supporting forecasting and pipeline analysis, ensuring data integrity across the lead-to-revenue lifecycle, and delivering insights on pipeline health, conversion, and revenue performance to support a high-growth security compliance SaaS company.", "fit_score": 8, "score_reason": "Excellent match on experience level (15+ years far exceeds 4-6 year requirement), core RevOps competencies (forecasting, pipeline analysis, data integrity, systems management), and B2B SaaS expertise. Remote location is ideal fit. Only minor consideration: security/compliance SaaS is adjacent to (not core) fintech/AI-native GTM strengths.", "ai_opener": "I noticed Vanta is scaling GTM operations with a focus on pipeline health and revenue forecasting—areas where I've spent 15+ years architecting predictable revenue engines for high-growth B2B SaaS companies. With deep experience in Salesforce/HubSpot systems, lead-to-revenue data integrity, and CAC/LTV optimization, I'd be interested in exploring how I can help Vanta accelerate its compliance SaaS growth trajectory.", "location_ok": true}, {"company": "You.com", "title": "Head of Revenue Operations", "location": "Remote (Canada / California, USA)", "url": "https://jobgether.com/remote-jobs/revenue-operations", "job_type": "Full-time", "description": "You.com, an AI startup, is hiring a Head of Revenue Operations to design and scale the RevOps function. The senior-level role (5-10 years) emphasizes HubSpot CRM expertise, go-to-market strategy, and forecasting management. Compensation is around $270K. The leader will own revenue forecasting, pipeline analysis, and build the operational backbone supporting predictable revenue growth across sales, marketing, and customer success in a fast-paced AI environment.", "fit_score": 9, "score_reason": "Exceptional match: Senior RevOps role at AI-native company aligns perfectly with Omri's 15+ years B2B SaaS expertise, HubSpot proficiency, and GTM/forecasting specialization. Remote location and compensation level are ideal fits.", "ai_opener": "Omri here—I noticed You.com is scaling RevOps for an AI platform, and your focus on revenue forecasting and pipeline predictability caught my attention. With 15+ years building RevOps functions in high-growth B2B SaaS (including AI-native GTM), I've scaled similar operational backbones from early revenue stage through predictable growth—and I'd love to explore how I could help You.com architect that foundation.", "location_ok": true}, {"company": "Remote", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "Remote seeks a GTM Engineer within Revenue Operations to design and maintain a robust GTM tech stack that streamlines outbound prospecting and automates manual workflows. Responsibilities include building reporting and ROI analyses, ensuring data accuracy across GTM systems, developing automated data pipelines, and building scalable pipeline-generation systems using AI-driven insights. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Base salary range is $40,900–$92,050 USD depending on location.", "fit_score": 9, "score_reason": "Excellent alignment with Omri's core RevOps expertise, GTM tech stack design, pipeline forecasting, and AI-native GTM experience. Remote global role matches location flexibility perfectly.", "ai_opener": "Hi there – I noticed you're building out a GTM tech stack focused on AI-driven pipeline generation and automated workflows, which is exactly where I've spent the last 15 years in B2B SaaS. I've designed similar systems for multiple scaling companies, from HubSpot/Salesforce architecture to data pipeline automation that drove measurable CAC/LTV improvements. I'd love to explore how I could help Remote streamline your revenue operations infrastructure.", "location_ok": true}, {"company": "Glopal", "title": "Head of Growth Marketing (B2B SaaS)", "location": "Remote (United States)", "url": "https://startup.jobs/head-of-growth-marketing-b2b-saas-remote-glopal-7595192", "job_type": "Full-time", "description": "Glopal, an e-commerce/marketing SaaS company at growth stage, is hiring a Head of Growth Marketing to own demand generation, pipeline creation, and multi-channel campaigns that drive revenue. The senior-level role (5+ years) requires proven B2B SaaS growth or demand-gen leadership, expertise across paid media, SEO, content, and partnerships, plus a data-driven, experimentation-heavy mindset. The position is fully remote within the United States.", "fit_score": 6, "score_reason": "Strong alignment on B2B SaaS, seniority, data-driven mindset, and remote eligibility. However, this is a pure Growth Marketing/demand-gen role rather than RevOps/GTM operations—outside Omri's core wheelhouse of pipeline forecasting, sales ops, and revenue infrastructure. Best fit if Omri is open to pivoting toward demand generation leadership.", "ai_opener": "Omri, I came across Glopal's Growth Marketing opening and thought of you given your 15+ years scaling B2B SaaS revenue engines. While your expertise is deeply rooted in RevOps and GTM infrastructure, your data-driven, pipeline-obsessed mentality and multi-channel campaign experience could be valuable here—especially if you're exploring a shift toward owning demand generation and revenue acceleration from the marketing side. Worth a conversation?", "location_ok": true}, {"company": "efficiently", "title": "Head of Growth Marketing", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth Marketing to build and scale its B2B growth engine. The role owns demand generation, pipeline creation, funnel optimization (lead to activation to champion), and the MarTech stack (Salesforce, Klaviyo, Instantly, GA4, attribution tools). Requires B2B SaaS experience, a proven track record scaling multi-channel campaigns tied to revenue, strong analytical/attribution skills, and comfort in a founder-led environment. Reports directly to the CEO.", "fit_score": 6, "score_reason": "Strong alignment on B2B SaaS, Salesforce, pipeline creation, and founder-led GTM—classic RevOps/Growth playbook. Misalignment: role is heavily weighted to marketing/demand gen and Klaviyo (email marketing platform), not RevOps infrastructure, forecasting, or sales ops where Omri excels.", "ai_opener": "Hi [Founder], I came across efficiently and was impressed by the product-market fit you've built in construction SaaS—a space that desperately needs modern collaboration tools. I've spent 15+ years scaling B2B SaaS GTM engines and scaling Salesforce-driven revenue operations, and while your Head of Growth Marketing role is marketing-forward, I'm curious whether you need someone to architect the *revenue operations backbone* behind your demand gen—pipeline integrity, CAC/LTV unit economics, and sales forecasting to keep the CEO-led growth machine calibrated.", "location_ok": true}, {"company": "GiveCampus", "title": "Marketing Operations Lead", "location": "Remote (USA)", "url": "https://remotive.com/remote/jobs/marketing/marketing-operations-lead-4198648", "job_type": "Full-time", "description": "GiveCampus is hiring its first dedicated Marketing Operations Lead to build and scale the marketing ops function within Revenue Operations. The role owns systems, processes, data integrity, reporting, and performance infrastructure powering the top-of-funnel engine, including the HubSpot platform and Salesforce integration. Responsibilities include a full HubSpot audit/rebuild, campaign execution frameworks, attribution tracking, and implementing AI-powered tools. Requires deep HubSpot expertise, strong understanding of SaaS revenue metrics and funnel analytics, and technical fluency with integrations, data modeling, and APIs.", "fit_score": 9, "score_reason": "Exceptional match: First dedicated MarOps role aligns perfectly with Omri's senior RevOps/GTM background, HubSpot/Salesforce expertise, and experience building scalable revenue operations infrastructure. Remote USA role meets location flexibility, and the AI-powered GTM tools, attribution tracking, and funnel analytics directly leverage his core strengths.", "ai_opener": "Hi [Hiring Manager], I saw GiveCampus is building out its first dedicated Marketing Operations function—this is exactly the type of transformational infrastructure project I've spent 15+ years executing in B2B SaaS. I've led full HubSpot audits, architected Salesforce integrations, and built attribution frameworks that directly tie top-of-funnel performance to revenue outcomes. I'd love to explore how we could scale your marketing operations engine.", "location_ok": true}, {"company": "Zoom", "title": "Head of Marketing Operations", "location": "Remote", "url": "https://www.indeed.com/q-saas-marketing-l-remote-jobs.html", "job_type": "Full-time", "description": "Zoom is hiring a Head of Marketing Operations to lead and scale global marketing operations teams across campaign operations, marketing technology, data, analytics, and lead lifecycle management. This senior leadership role drives the systems and processes that support demand generation and marketing performance at scale for a global B2B SaaS organization. Strong background in marketing operations leadership, MarTech, and data/analytics within a large SaaS environment is expected.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS scale, GTM systems, and remote work, but this is a marketing ops leadership role rather than revenue ops—a meaningful domain shift from Omri's core RevOps expertise. Zoom's global scale and MarTech/data focus are compelling, but the role emphasizes campaign ops and demand gen over pipeline forecasting and revenue accountability.", "ai_opener": "Omri here—spent 15+ years building revenue operations engines at scale across B2B SaaS, from pipeline forecasting to CAC/LTV optimization. Zoom's Head of Marketing Operations role caught my eye because the systems thinking required—MarTech orchestration, data infrastructure, lifecycle management—is the mirror image of the revenue ops frameworks I've built. I'm curious whether you're looking to deepen the connection between marketing ops and revenue outcomes, or if this is purely a campaign/demand gen operations play.", "location_ok": true}, {"company": "Checkmarx", "title": "RevOps Business Partner (Maternity Leave Cover)", "location": "Tel Aviv / Ramat Gan, Israel", "url": "https://jobs.secrettelaviv.com/list/category/sales/", "job_type": "Full-time", "description": "Checkmarx, an application security (AppSec) SaaS company, is hiring a RevOps Business Partner on a maternity-leave cover basis based in Tel Aviv/Ramat Gan. The role supports go-to-market and commercial teams with revenue operations processes, reporting, forecasting, and cross-functional alignment across sales, marketing, and customer success. Suited to candidates with revenue/sales operations experience in a B2B SaaS environment who can manage CRM data and operational workflows in a fast-paced cybersecurity company.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps expertise in B2B SaaS, CRM management, and GTM operations. Checkmarx's AppSec focus and established scale make this ideal, though the maternity-leave cover nature (likely temporary) is the only consideration.", "ai_opener": "Omri, I noticed Checkmarx is scaling their RevOps function with a maternity cover role in Tel Aviv—given your 15+ years driving revenue operations and GTM alignment in high-growth B2B SaaS, you'd immediately add value to their sales, marketing, and CS orchestration. Your track record with Salesforce workflows and pipeline forecasting aligns perfectly with what a mature AppSec company needs to accelerate their commercial machine.", "location_ok": true}, {"company": "Qualcomm", "title": "Manager, Sales Operations", "location": "Ramat Gan, Israel", "url": "https://il.linkedin.com/jobs/sales-engineer-jobs", "job_type": "Full-time", "description": "Qualcomm is hiring a Manager, Sales Operations based in Ramat Gan, Israel. The role owns tactical sales operations, providing data-driven projections anchored in established KPIs, supporting onboarding and training of sales talent, and partnering with Finance, HR, and Sales to develop incentive and compensation programs. Suited to candidates with sales operations management experience, strong analytical skills, and CRM proficiency in a technology/enterprise environment.", "fit_score": 8, "score_reason": "Strong alignment with RevOps/GTM background, sales operations focus, KPI/pipeline expertise, and enterprise SaaS experience. Ramat Gan is within acceptable commute range of target locations. Only minor gap: role is more tactical sales ops vs. strategic growth focus Omri typically targets.", "ai_opener": "Omri, I noticed your 15+ years building B2B SaaS GTM and RevOps systems would be valuable for Qualcomm's Manager of Sales Operations role in Ramat Gan. They're looking for someone to own data-driven sales projections, compensation strategy, and sales enablement in an enterprise tech environment—exactly the operational scaling work you've mastered. Given your Salesforce and KPI expertise, this could be a strong fit for driving revenue operations at scale.", "location_ok": true}, {"company": "Hyperdrive Recruiting (client)", "title": "Senior GTM Engineer", "location": "Remote", "url": "https://www.indeed.com/q-gtm-engineer-saas-jobs.html", "job_type": "Full-time", "description": "A B2B SaaS client of Hyperdrive Recruiting is hiring a Senior GTM Engineer to build the next generation of intelligent go-to-market systems. The role focuses on architecting data-driven, automated GTM infrastructure that transforms ideal customer profiles into predictable revenue using automation, experimentation, and AI/LLM tooling. Requires experience with Python or SQL, API integrations, and automation frameworks, along with strong revenue operations intuition across sales and marketing systems.", "fit_score": 7, "score_reason": "Strong alignment with GTM engineering, AI-native systems, and revenue operations expertise. Primary concern: role emphasizes Python/SQL technical depth over traditional RevOps leadership, which may underutilize Omri's executive management background.", "ai_opener": "Omri Gonen here—15+ years building predictable revenue engines in B2B SaaS. I've architected GTM automation and data infrastructure that directly tied CAC/LTV to pipeline forecasting, and I'm deeply familiar with AI-native approaches to ICP targeting and experimentation frameworks. Your focus on intelligent GTM systems resonates with how I've approached RevOps—curious if you're looking for someone who can bridge the technical automation layer with revenue strategy.", "location_ok": true}];
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-yellow":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map(j=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}">${j.fit_score}</div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn-view">View Job ↗</a>
        <button class="btn-copy" onclick="copyOpener(this,${JSON.stringify(j.ai_opener||'')})">Copy Opener 📋</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  let v=0;
  document.querySelectorAll(".job-card").forEach(c=>{
    const show=f==="all"||c.dataset.filter===f;
    c.style.display=show?"":"none";
    if(show)v++;
  });
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,text){
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
render();
</script>
</body>
</html>
