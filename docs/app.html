<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Tracker — ממשק ניהול משרות</title>

  <!-- ============================================================
       FONTS  (Assistant for Hebrew UI text, Material Symbols icons)
       ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet" />

       Babel Standalone transpiles the JSX in the <script type="text/babel"> below.
       For production you would pre-compile instead of shipping Babel.

  <!-- ============================================================
       STYLES  (all CSS, readable & un-minified, in one place)
       ============================================================ -->
  <style>
    /* ---- Design tokens ---- */
    :root {
      --accent:      #0a6dff;            /* primary blue */
      --accent-ink:  #0852c4;            /* darker blue for gradients / text */
      --accent-soft: rgba(10,109,255,0.16); /* tinted background */
      --bg:          #f5f5f7;            /* app background */
      --surface:     #ffffff;            /* cards */
      --border:      #ececef;            /* hairline borders */
      --ink:         #1d1d1f;            /* primary text */
      --ink-soft:    #86868b;            /* secondary text */
      --radius:      20px;
      --shadow:      0 1px 2px rgba(0,0,0,0.03);
      --shadow-lift: 0 14px 30px rgba(0,0,0,0.08);
    }

    /* ---- Resets ---- */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Assistant', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* Icon helper: <span class="ms">icon_name</span> */
    .ms {
      font-family: 'Material Symbols Rounded';
      font-weight: normal; font-style: normal;
      line-height: 1; letter-spacing: normal; text-transform: none;
      white-space: nowrap; word-wrap: normal; direction: ltr;
      -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased; user-select: none;
    }
    .ms.fill { font-variation-settings: 'FILL' 1; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb {
      background: #d4d4d9; border-radius: 9px;
      border: 2px solid transparent; background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: #b9b9c0; background-clip: padding-box; }

    /* ---- Animations ---- */
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes barGrow  { from { width: 0; } }
    @keyframes orbPulse { 0%,100% { transform: scale(1); opacity: .55; } 50% { transform: scale(1.18); opacity: .15; } }
    @keyframes orbCore  { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* ---- Layout ---- */
    .app        { display: flex; min-height: 100vh; }
    .view-fade  { animation: fadeUp .35s ease; }

    /* ---- Sidebar (right, because RTL) ---- */
    .sidebar {
      width: 268px; flex-shrink: 0;
      position: sticky; top: 0; height: 100vh;
      background: rgba(255,255,255,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-inline-start: 1px solid #e7e7ec;
      display: flex; flex-direction: column;
      padding: 26px 18px 20px;
    }
    .brand { display: flex; align-items: center; gap: 11px; padding: 4px 10px 22px; }
    .brand-logo {
      width: 38px; height: 38px; border-radius: 11px;
      background: linear-gradient(150deg, var(--accent), var(--accent-ink));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px var(--accent-soft);
    }
    .brand-name { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .brand-sub  { font-size: 12px; color: var(--ink-soft); font-weight: 500; margin-top: 1px; }

    .nav { display: flex; flex-direction: column; gap: 3px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 11px 12px; border: none; border-radius: 13px;
      font-size: 14.5px; font-weight: 600; cursor: pointer;
      text-align: start; background: transparent; color: #3a3a3f;
      transition: background .15s, color .15s;
    }
    .nav-item:hover         { background: #ececf0; }
    .nav-item .ms           { font-size: 22px; color: #8e8e93; }
    .nav-item.active        { background: var(--accent-soft); color: var(--accent-ink); font-weight: 700; }
    .nav-item.active .ms    { color: var(--accent); }
    .nav-item .badge {
      font-size: 12px; font-weight: 700; background: var(--accent); color: #fff;
      min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-divider { height: 1px; background: #e7e7ec; margin: 8px 6px; }
    .user-row {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 10px; border-radius: 13px; cursor: pointer; transition: background .15s;
    }
    .user-row:hover { background: #ececf0; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(150deg, #ffb86b, #ff7a59);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0;
    }

    /* ---- Main column ---- */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 5;
      background: rgba(245,245,247,0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding: 22px 40px 18px;
      display: flex; align-items: center; gap: 20px;
      border-bottom: 1px solid var(--border);
    }
    .topbar-eyebrow { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.2px; }
    .topbar-title   { margin: 2px 0 0; font-size: 26px; font-weight: 800; letter-spacing: -0.6px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #e7e7ec; border-radius: 12px;
      padding: 0 14px; height: 42px; width: 260px; box-shadow: var(--shadow);
    }
    .search-box .ms { font-size: 20px; color: #a1a1a8; }
    .search-box input { border: none; outline: none; background: transparent; font-size: 14.5px; width: 100%; color: var(--ink); }

    .btn-primary {
      display: flex; align-items: center; gap: 7px; height: 42px; padding: 0 18px;
      border: none; border-radius: 12px;
      background: linear-gradient(150deg, var(--accent), var(--accent-ink));
      color: #fff; font-size: 14.5px; font-weight: 700; cursor: pointer;
      box-shadow: 0 3px 10px var(--accent-soft);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 6px 16px var(--accent-soft); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary.lg { height: 46px; padding: 0 24px; font-size: 15px; border-radius: 13px; box-shadow: 0 4px 12px var(--accent-soft); }

    .btn-secondary {
      display: flex; align-items: center; gap: 8px; height: 46px; padding: 0 18px;
      border: 1px solid #e7e7ec; border-radius: 13px; background: #fff; color: #3a3a3f;
      font-size: 14.5px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-secondary:hover { background: #f3f3f5; }

    .page { padding: 28px 40px 56px; flex: 1; }

    /* ---- Filter pills / sort ---- */
    .pill-row { display: flex; gap: 9px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 18px; }
    .pill {
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
      padding: 8px 15px; border-radius: 11px; border: 1px solid #e7e7ec;
      font-size: 13.5px; font-weight: 700; cursor: pointer; background: #fff; color: #3a3a3f;
      transition: all .15s;
    }
    .pill.active { background: var(--accent); color: #fff; border-color: transparent; }
    .pill .count {
      font-size: 11.5px; font-weight: 800; min-width: 19px; height: 19px; padding: 0 5px;
      border-radius: 9px; display: inline-flex; align-items: center; justify-content: center;
      background: #f0f0f2; color: var(--ink-soft);
    }
    .pill.active .count { background: rgba(255,255,255,0.22); color: #fff; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .result-label { font-size: 14px; color: var(--ink-soft); font-weight: 600; }
    .sort-group { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e7e7ec; border-radius: 11px; padding: 4px; }
    .sort-btn { padding: 6px 13px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; background: transparent; color: var(--ink-soft); transition: all .15s; }
    .sort-btn.active { background: var(--accent-soft); color: var(--accent-ink); }

    /* ---- Job cards grid ---- */
    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
    .job-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; display: flex; flex-direction: column; gap: 15px;
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .job-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: #e0e0e6; }
    .job-logo {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 19px; color: #fff;
    }
    .job-role    { font-size: 16.5px; font-weight: 700; letter-spacing: -0.2px; line-height: 1.25; }
    .job-company { font-size: 13.5px; color: var(--ink-soft); font-weight: 600; margin-top: 2px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12.5px; font-weight: 600; color: #6e6e73;
      background: #f3f3f5; padding: 4px 9px; border-radius: 8px;
    }
    .chip .ms { font-size: 15px; }
    .hairline { height: 1px; background: #f0f0f2; }

    .status-tag { font-size: 12.5px; font-weight: 700; padding: 5px 12px; border-radius: 9px; }

    .star-btn {
      width: 34px; height: 34px; border-radius: 9px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .15s;
    }
    .star-btn.saved { background: #fff7e8; }
    .star-btn .ms { font-size: 21px; color: #c4c4ca; }
    .star-btn.saved .ms { color: #ff9f0a; }

    /* Fit-score ring (conic gradient) */
    .score-ring { position: relative; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .score-ring .hole { position: absolute; background: #fff; border-radius: 50%; }
    .score-ring .num  { position: relative; font-weight: 800; }

    /* ---- Generic card ---- */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card-title { font-size: 16px; font-weight: 700; }

    /* ---- Stats ---- */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
    .stat-value { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-top: 8px; }

    .funnel-row { display: flex; align-items: center; gap: 16px; }
    .funnel-label { width: 92px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .funnel-track { flex: 1; height: 34px; background: #f3f3f5; border-radius: 10px; overflow: hidden; }
    .funnel-bar { height: 100%; border-radius: 10px; animation: barGrow .8s cubic-bezier(.2,.8,.2,1); display: flex; align-items: center; padding: 0 12px; }
    .funnel-bar span { font-size: 13px; font-weight: 800; color: #fff; }
    .funnel-pct { width: 44px; font-size: 13px; font-weight: 700; color: var(--ink-soft); text-align: start; }

    /* ---- STAR ---- */
    .star-tag { font-size: 11.5px; font-weight: 700; color: var(--accent-ink); background: var(--accent-soft); padding: 3px 10px; border-radius: 7px; }
    .neg-card { background: linear-gradient(160deg, #1d1d1f, #2c2c33); border-radius: 22px; padding: 26px; color: #fff; box-shadow: 0 12px 30px rgba(0,0,0,0.18); position: sticky; top: 96px; }

    /* ---- Voice ---- */
    .orb { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 26px; }
    .orb-wave { position: absolute; border-radius: 50%; background: var(--accent); }
    .orb-core {
      position: relative; width: 92px; height: 92px; border-radius: 50%;
      background: linear-gradient(150deg, var(--accent), var(--accent-ink));
      display: flex; align-items: center; justify-content: center;
      animation: orbCore 2.6s ease-in-out infinite; box-shadow: 0 10px 30px var(--accent-soft);
    }
    .voice-round-btn { width: 52px; height: 52px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ---- Detail timeline ---- */
    .timeline { display: flex; flex-direction: column; gap: 2px; position: relative; }
    .timeline-line { position: absolute; top: 15px; bottom: 15px; inset-inline-start: 14px; width: 2px; background: #f0f0f2; }
    .timeline-dot { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .timeline-dot.done    { background: linear-gradient(150deg, var(--accent), var(--accent-ink)); box-shadow: 0 3px 8px var(--accent-soft); }
    .timeline-dot.pending { background: #fff; border: 2px solid #e7e7ec; }

    /* ---- Settings ---- */
    .settings-group-title { font-size: 13px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.6px; padding: 0 6px 9px; }
    .settings-list { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: var(--shadow); }
    .settings-row { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-top: 1px solid #f2f2f4; }
    .settings-row:first-child { border-top: none; }
    .settings-row:hover { background: #fafafb; }
    .settings-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .settings-icon .ms { font-size: 19px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ============================================================
       APPLICATION  (JSX, transpiled in-browser by Babel)
       ============================================================ -->
  <!-- The application source below is written in JSX. We transpile it ourselves on load
       (classic runtime = React.createElement, so no ES-module imports are emitted) and
       then execute the result. Type "text/jsx-source" keeps Babel's auto-runner from
       touching it, so this stays the single source of truth. -->
  <script type="text/jsx-source" id="app-source">
    const { useState, useRef } = React;

    /* ============================================================
       SAMPLE DATA — swap this array for your real jobs.
       Each job object has these fields:
         id            number   unique id
         company       string   company name (Hebrew/English)
         role          string   job title
         location      string   city / "remote"
         salary        string   salary range, display-ready
         fitScore      number   0–10 AI match score (drives the ring color)
         status        string   one of: 'saved' | 'applied' | 'interview' | 'offer' | 'rejected'
         postedDaysAgo number   how many days ago it was added/seen
         logoFrom      string   logo gradient start color (hex)
         logoTo        string   logo gradient end color (hex)
         description   string   free-text role description
         requirements  string[] list of role requirements (matched top-down against the profile)
         matchedReqs   number   how many of the requirements the candidate meets
       ============================================================ */
    const JOBS = (window.__JOBS || []);

    /* Ready-made STAR answers for the interview bank. */
    const STAR_ANSWERS = [
      {
        question: 'ספר על אתגר מקצועי משמעותי',
        answer: 'בפרויקט redesign מרכזי קיבלתי דרישה לקצר זמן טעינה ב-40%. מיפיתי צווארי בקבוק, הובלתי שינוי ארכיטקטורת רכיבים, והגענו לשיפור של 52% תוך שבועיים.',
        tags: ['מנהיגות', 'תוצאתי']
      },
      {
        question: 'איך התמודדת עם קונפליקט בצוות',
        answer: 'שני מפתחים נחלקו על גישה טכנית. קיימתי שיחה מתווכת, הגדרנו קריטריונים מדידים, ובחרנו פתרון לפי נתונים — מה שחיזק את האמון בצוות.',
        tags: ['תקשורת']
      },
      {
        question: 'תאר הצלחה שאתה גאה בה',
        answer: 'הובלתי השקה של פיצ\'ר שהעלה engagement ב-23%. הגדרתי מדדים, תיאמתי בין דיזיין, מוצר ופיתוח, ושמרתי על לוז צמוד.',
        tags: ['מוצר', 'אימפקט']
      }
    ];

    /* Tips shown on the salary-negotiation card. */
    const NEGOTIATION_TIPS = [
      'אל תנקוב במספר ראשון — בקש את הטווח שלהם',
      'עגן את הבקשה לפי שווי שוק ולא לפי השכר הנוכחי',
      'כלול גם בונוס, מניות וימי חופשה במשא ומתן'
    ];

    /* ============================================================
       HELPERS
       ============================================================ */

    // Visual metadata (label + colors) for each status value.
    const STATUS_META = {
      saved:     { label: 'שמורה', bg: 'rgba(10,132,255,0.12)', fg: '#0a6dff' },
      applied:   { label: 'הוגש',  bg: '#eef0ff',               fg: '#4b56d6' },
      interview: { label: 'ראיון', bg: '#fff2e0',               fg: '#b25e00' },
      offer:     { label: 'הצעה',  bg: '#e3f7ea',               fg: '#1a7f48' },
      rejected:  { label: 'נדחה',  bg: '#f1f1f3',               fg: '#86868b' }
    };

    // Human-friendly "x days ago" in Hebrew.
    function formatDaysAgo(days) {
      if (days === 1) return 'אתמול';
      if (days === 2) return 'לפני יומיים';
      if (days < 7)   return 'לפני ' + days + ' ימים';
      return 'לפני שבוע';
    }

    // Color for the fit-score ring/number based on the score.
    function scoreColors(score) {
      if (score >= 8) return { ring: '#34c759', ink: '#1a7f48' };
      if (score >= 6) return { ring: '#ff9f0a', ink: '#b25e00' };
      return { ring: '#c4c4ca', ink: '#86868b' };
    }

    /* Toast + copy-prompt helpers (wire the action buttons). */
    function toast(msg){ var t=document.getElementById('jf-toast'); if(!t){ t=document.createElement('div'); t.id='jf-toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:11px 18px;border-radius:12px;font:600 14px Assistant,-apple-system,sans-serif;z-index:99999;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .2s'; document.body.appendChild(t);} t.textContent=msg; t.style.opacity='1'; clearTimeout(window.__tt); window.__tt=setTimeout(function(){ t.style.opacity='0'; },2200); }
    function copyText(text, okMsg){ try{ navigator.clipboard.writeText(text).then(function(){ toast(okMsg||'הועתק ✓'); }, function(){ toast('ההעתקה נכשלה'); }); }catch(e){ toast('ההעתקה נכשלה'); } }
    function copyPrompt(text){ copyText(text, 'הפרומפט הועתק — הדבק/י ב‑Claude'); }

    /* Live Claude call using the user's saved key/proxy (same scheme as the tracker). */
    async function callClaude(prompt){
      var proxy=(localStorage.getItem('claude_proxy')||'').trim();
      var key=(localStorage.getItem('anthropic_key')||'').trim();
      var body=JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1600,messages:[{role:'user',content:prompt}]});
      var url, headers;
      if(proxy){ url=proxy; headers={'content-type':'application/json'}; }
      else if(key){ url='https://api.anthropic.com/v1/messages'; headers={'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}; }
      else { var e=new Error('NO_KEY'); e.code='NO_KEY'; throw e; }
      var res=await fetch(url,{method:'POST',headers:headers,body:body});
      if(!res.ok) throw new Error('API '+res.status);
      var data=await res.json();
      return (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
    }

    /* ===== Voice interview engine: Claude chat + ElevenLabs/native TTS + Web Speech STT ===== */
    async function callClaudeMsgs(system, messages){
      var proxy=(localStorage.getItem('claude_proxy')||'').trim();
      var key=(localStorage.getItem('anthropic_key')||'').trim();
      var payload={model:'claude-sonnet-4-6',max_tokens:400,system:system,messages:messages};
      var url, headers;
      if(proxy){ url=proxy; headers={'content-type':'application/json'}; }
      else if(key){ url='https://api.anthropic.com/v1/messages'; headers={'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}; }
      else { var e=new Error('NO_KEY'); e.code='NO_KEY'; throw e; }
      var res=await fetch(url,{method:'POST',headers:headers,body:JSON.stringify(payload)});
      if(!res.ok) throw new Error('API '+res.status);
      var data=await res.json();
      return (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();
    }
    function ttsNative(text, lang){
      return new Promise(function(resolve){
        try{ window.speechSynthesis.cancel(); }catch(e){}
        var langCode = lang==='he' ? 'he-IL' : 'en-US';
        var voices = window.speechSynthesis.getVoices()||[];
        var pref = /female|samantha|karen|carmit|tessa|moira|google|zira|tal/i;
        var pool = voices.filter(function(x){return x.lang===langCode;});
        if(!pool.length) pool = voices.filter(function(x){return x.lang.indexOf(lang==='he'?'he':'en')===0;});
        pool.sort(function(a,b){ return (pref.test(b.name)?1:0)-(pref.test(a.name)?1:0); });
        var v = pool[0];
        var chunks = text.match(/[^.!?\n]+[.!?\n]?/g) || [text];
        var i=0;
        window.__ttsOn = true;
        function next(){ if(i>=chunks.length || !window.__ttsOn){ resolve(); return; } var c=(chunks[i]||'').trim(); i++; if(!c){ next(); return; } var u=new SpeechSynthesisUtterance(c); if(v)u.voice=v; u.lang=langCode; u.rate=1; u.pitch=1.06; u.onend=function(){ next(); }; u.onerror=function(){ next(); }; window.speechSynthesis.speak(u); }
        next();
      });
    }
    async function ttsEleven(text, lang){
      var key=(localStorage.getItem('elevenlabs_key')||'').trim(); if(!key) throw new Error('no11');
      var voice='EXAVITQu4vr4xnSDxMaL';
      var res=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voice,{method:'POST',headers:{'xi-api-key':key,'content-type':'application/json'},body:JSON.stringify({text:text,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.45,similarity_boost:0.75,style:0.35,use_speaker_boost:true}})});
      if(!res.ok) throw new Error('tts'+res.status);
      var blob=await res.blob(); var url=URL.createObjectURL(blob);
      return new Promise(function(resolve){ var a=new Audio(url); window.__ttsAudio=a; a.onended=function(){ try{URL.revokeObjectURL(url);}catch(e){} resolve(); }; a.onerror=function(){ resolve(); }; a.play().catch(function(){ resolve(); }); });
    }
    async function speakText(text, lang){ window.__ttsOn=true; try{ await ttsEleven(text, lang); }catch(e){ await ttsNative(text, lang); } }

    /* AI result modal — runs Claude (or shows preText) and DISPLAYS the answer. */
    function openAiModal(title, prompt, preText){
      var ov=document.getElementById('ai-modal');
      if(!ov){ ov=document.createElement('div'); ov.id='ai-modal'; document.body.appendChild(ov); }
      ov.style.cssText='position:fixed;inset:0;z-index:99998;background:rgba(20,20,25,.45);display:flex;align-items:flex-start;justify-content:center;padding:42px 16px;overflow-y:auto;direction:rtl;font-family:Assistant,-apple-system,sans-serif';
      ov.onclick=function(e){ if(e.target===ov) ov.remove(); };
      ov.innerHTML='<div style="max-width:660px;width:100%;background:#fff;border-radius:22px;padding:24px 26px;box-shadow:0 24px 70px rgba(0,0,0,.3)">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="font-size:18px;font-weight:800;color:#1d1d1f">'+title+'</div>'
        +'<button id="aim-x" style="border:none;background:#f1f1f3;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;color:#1d1d1f">✕</button></div>'
        +'<div id="aim-body" style="font-size:14.5px;line-height:1.75;color:#3a3a3f;white-space:pre-wrap;min-height:54px">'
        +'<div style="display:flex;align-items:center;gap:9px;color:#86868b;font-weight:600">⏳ מכין/ה עבורך…</div></div>'
        +'<div id="aim-foot" style="display:none;margin-top:16px"><button id="aim-copy" style="border:none;background:#0a6dff;color:#fff;font:inherit;font-weight:700;padding:9px 16px;border-radius:10px;cursor:pointer">העתק</button></div>'
        +'</div>';
      document.getElementById('aim-x').onclick=function(){ ov.remove(); };
      function aimEsc(x){ return x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function aimMd(t){
        var lines=aimEsc(t).split('\n'), html='', inList=false;
        function closeL(){ if(inList){ html+='</ul>'; inList=false; } }
        for(var i=0;i<lines.length;i++){ var l=lines[i];
          l=l.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/__(.+?)__/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code style=\'background:#f1f1f3;padding:1px 5px;border-radius:5px;font-size:13px\'>$1</code>');
          if(/^\s*###\s+/.test(l)){ closeL(); html+='<div style=\'font-weight:800;font-size:15px;margin:11px 0 3px;color:#1d1d1f\'>'+l.replace(/^\s*###\s+/,'')+'</div>'; }
          else if(/^\s*##\s+/.test(l)){ closeL(); html+='<div style=\'font-weight:800;font-size:16.5px;margin:14px 0 5px;color:#1d1d1f\'>'+l.replace(/^\s*##\s+/,'')+'</div>'; }
          else if(/^\s*#\s+/.test(l)){ closeL(); html+='<div style=\'font-weight:800;font-size:18px;margin:6px 0 8px;color:#0a6dff\'>'+l.replace(/^\s*#\s+/,'')+'</div>'; }
          else if(/^\s*[-*]\s+/.test(l)){ if(!inList){ html+='<ul style=\'margin:4px 0;padding-inline-start:20px\'>'; inList=true; } html+='<li style=\'margin:3px 0\'>'+l.replace(/^\s*[-*]\s+/,'')+'</li>'; }
          else if(/^\s*\d+\.\s+/.test(l)){ closeL(); html+='<div style=\'margin:4px 0\'><b>'+l.match(/^\s*(\d+)\./)[1]+'.</b> '+l.replace(/^\s*\d+\.\s+/,'')+'</div>'; }
          else if(/^\s*---+\s*$/.test(l)){ closeL(); html+='<hr style=\'border:none;border-top:1px solid #ececef;margin:11px 0\'>'; }
          else if(l.trim()===''){ closeL(); html+='<div style=\'height:7px\'></div>'; }
          else { closeL(); html+='<div style=\'margin:2px 0\'>'+l+'</div>'; }
        }
        if(inList) html+='</ul>';
        return html;
      }
      function show(text){ var b=document.getElementById('aim-body'); if(!b)return; b.style.whiteSpace='normal'; b.innerHTML=aimMd(text); var f=document.getElementById('aim-foot'); f.style.display='block'; document.getElementById('aim-copy').onclick=function(){ copyText(text,'הועתק ✓'); }; }
      if(preText){ show(preText); return; }
      callClaude(prompt).then(show).catch(function(err){
        var b=document.getElementById('aim-body'); if(!b)return;
        if(err.code==='NO_KEY'){
          b.innerHTML='<div style="color:#b25e00;background:#fff2e0;padding:11px 14px;border-radius:12px;margin-bottom:12px;font-weight:600">כדי לקבל תשובה חיה צריך מפתח Anthropic (בהגדרות). בינתיים הנה הפרומפט המוכן — העתק/י אותו ל‑Claude:</div><div style="white-space:pre-wrap;background:#f7f7f8;padding:12px 14px;border-radius:12px;font-size:13.5px">'+prompt.replace(/</g,'&lt;')+'</div>';
          var f=document.getElementById('aim-foot'); f.style.display='block'; var c=document.getElementById('aim-copy'); c.textContent='העתק פרומפט'; c.onclick=function(){ copyText(prompt,'הפרומפט הועתק ✓'); };
        } else { b.innerHTML='<div style="color:#d70015;font-weight:600">שגיאה בקריאה ל‑AI: '+(err.message||err)+'</div>'; }
      });
    }

    /* Small reusable icon component. */
    function Icon({ name, className = '', style }) {
      return <span className={'ms ' + className} style={style}>{name}</span>;
    }

    /* Circular fit-score ring built from a conic-gradient. */
    function ScoreRing({ score, size = 38 }) {
      const { ring, ink } = scoreColors(score);
      const pct = score * 10;
      const hole = Math.round(size * 0.1);
      return (
        <div className="score-ring" style={{
          width: size, height: size,
          background: `conic-gradient(${ring} ${pct}%, #ececf0 ${pct}%)`
        }}>
          <div className="hole" style={{ inset: hole }}></div>
          <span className="num" style={{ color: ink, fontSize: size * 0.34 }}>{score}</span>
        </div>
      );
    }

    /* ============================================================
       JOBS VIEW  (filters + sort + grid)
       ============================================================ */
    function JobsView({ search, savedMap, toggleSave, openJob, hiddenMap, toggleHide, hideJobs }) {
      const [status, setStatus] = useState('all');
      const [sort, setSort] = useState('match');

      // Status counts for the filter pills (hidden jobs excluded from the normal tabs).
      const isHidden = j => !!(hiddenMap && hiddenMap[j.id]);
      const counts = {};
      JOBS.forEach(j => { if (isHidden(j)) return; counts[j.status] = (counts[j.status] || 0) + 1; });
      const hiddenCount = JOBS.filter(isHidden).length;
      const visibleTotal = JOBS.length - hiddenCount;

      const filters = [
        { key: 'all',       label: 'הכל' },
        { key: 'saved',     label: 'שמורות' },
        { key: 'applied',   label: 'הוגשו' },
        { key: 'interview', label: 'ראיונות' },
        { key: 'offer',     label: 'הצעות' },
        { key: 'rejected',  label: 'נדחו' },
        { key: 'hidden',    label: 'מוסתרות' }
      ];
      const sorts = [
        { key: 'match',  label: 'התאמה' },
        { key: 'recent', label: 'עדכני' },
        { key: 'az',     label: 'A–Z' }
      ];

      // Apply filter → search → sort. Hidden jobs only appear in the מוסתרות tab.
      let list;
      if (status === 'hidden') { list = JOBS.filter(isHidden); }
      else { list = JOBS.filter(j => !isHidden(j)); if (status !== 'all') list = list.filter(j => j.status === status); }
      const q = search.trim();
      if (q) list = list.filter(j => (j.company + ' ' + j.role).includes(q));
      if (sort === 'match')       list.sort((a, b) => b.fitScore - a.fitScore);
      else if (sort === 'recent') list.sort((a, b) => a.postedDaysAgo - b.postedDaysAgo);
      else                        list.sort((a, b) => a.role.localeCompare(b.role));

      const isSavedFor = j => (savedMap[j.id] !== undefined ? savedMap[j.id] : j.status === 'saved');

      return (
        <div className="view-fade">
          <div className="pill-row">
            {filters.map(f => {
              const count = f.key === 'all' ? visibleTotal : f.key === 'hidden' ? hiddenCount : (counts[f.key] || 0);
              return (
                <button key={f.key} className={'pill' + (status === f.key ? ' active' : '')} onClick={() => setStatus(f.key)}>
                  {f.label}<span className="count">{count}</span>
                </button>
              );
            })}
          </div>

          <div className="toolbar">
            <div className="result-label">
              {list.length} משרות{status !== 'all' ? ' · ' + filters.find(f => f.key === status).label : ''}
            </div>
            {status === 'rejected' && list.length > 0 ? (
              <button
                onClick={() => { hideJobs(list.map(j => j.id)); toast('כל הנדחו הוסתרו'); }}
                style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px', borderRadius: 999, border: '1px solid #e7e7ec', background: '#fff', color: '#6e6e73', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 700, fontSize: 13 }}>
                <Icon name="visibility_off" style={{ fontSize: 17 }} />הסתר את כל הנדחו
              </button>
            ) : null}
            <div className="sort-group">
              {sorts.map(s => (
                <button key={s.key} className={'sort-btn' + (sort === s.key ? ' active' : '')} onClick={() => setSort(s.key)}>{s.label}</button>
              ))}
            </div>
          </div>

          <div className="jobs-grid">
            {list.map(job => (
              <JobCard
                key={job.id}
                job={job}
                isSaved={isSavedFor(job)}
                onToggleSave={() => toggleSave(job)}
                onOpen={() => openJob(job.id)}
                onHide={() => toggleHide(job)}
                hidden={isHidden(job)}
              />
            ))}
          </div>
        </div>
      );
    }

    /* ============================================================
       VOICE INTERVIEW VIEW  (animated orb + transcript + controls)
       ============================================================ */
    function VoiceView() {
      const [lang, setLang] = useState('he');
      const he = lang === 'he';
      const [phase, setPhase] = useState('idle');        // idle | thinking | listening | speaking
      const [msgs, setMsgs] = useState([]);
      const [interim, setInterim] = useState('');
      const [err, setErr] = useState('');
      const runningRef = useRef(false);
      const recRef = useRef(null);
      const msgsRef = useRef([]);
      const langRef = useRef('he');
      React.useEffect(function(){ langRef.current = lang; try { window.__voiceLang = lang; } catch(e){} }, [lang]);
      React.useEffect(function(){ return function(){ stopAll(); }; }, []);

      function pushMsg(role, text){ msgsRef.current = msgsRef.current.concat([{ role: role, text: text }]); setMsgs(msgsRef.current.slice()); }

      function sysPrompt(){
        var roleTxt = '';
        try { var r = JSON.parse(localStorage.getItem('desired_roles')||'null'); if (Array.isArray(r) && r.length) roleTxt = r[0]; else if (typeof r === 'string') roleTxt = r; } catch(e){}
        if (langRef.current === 'he') {
          return 'אתה מראיין/ת מקצועי/ת, חם/ה ואמפתי/ת שמראיין/ת את עומרי' + (roleTxt ? ' לתפקיד ' + roleTxt : '') + '. נהל ראיון אמיתי בקול: שאל שאלה אחת בכל פעם, חכה לתשובה, תן משוב קצר וחיובי ואז עבור לשאלה הבאה. דבר עברית טבעית לדיבור, משפטים קצרים, בלי רשימות ובלי סימני מרקדאון. אם זו ההתחלה — פתח בברכה קצרה מאוד ובשאלה הראשונה.';
        }
        return 'You are a professional, warm and empathetic job interviewer interviewing Omri' + (roleTxt ? ' for a ' + roleTxt + ' role' : '') + '. Run a real spoken interview: ask one question at a time, wait for the answer, give brief positive feedback, then move to the next question. Speak natural spoken English, short sentences, no lists or markdown. If this is the start, open with a very short greeting and your first question.';
      }

      async function aiReply(){
        setPhase('thinking'); setInterim('');
        var apiMsgs = msgsRef.current.map(function(m){ return { role: m.role === 'me' ? 'user' : 'assistant', content: m.text }; });
        if (apiMsgs.length === 0) apiMsgs = [{ role: 'user', content: langRef.current === 'he' ? 'בוא נתחיל את הראיון.' : "Let's begin the interview." }];
        var text;
        try { text = await callClaudeMsgs(sysPrompt(), apiMsgs); }
        catch(e){ setErr(langRef.current === 'he' ? 'שגיאה בחיבור ל‑AI. ודא שמפתח Claude מוגדר בהגדרות.' : 'AI connection error. Check the Claude key in Settings.'); setPhase('idle'); runningRef.current = false; return; }
        if (!runningRef.current) return;
        pushMsg('ai', text);
        setPhase('speaking');
        await speakText(text, langRef.current);
        if (runningRef.current) listen();
      }

      function listen(){
        if (!runningRef.current) return;
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setErr(he ? 'הדפדפן לא תומך בזיהוי דיבור (נסה Chrome).' : 'This browser does not support speech recognition (try Chrome).'); return; }
        var r = new SR();
        r.lang = langRef.current === 'he' ? 'he-IL' : 'en-US';
        r.interimResults = true; r.continuous = false; r.maxAlternatives = 1;
        recRef.current = r;
        var finalText = '';
        setPhase('listening'); setInterim('');
        r.onresult = function(e){ var iv = ''; for (var i = e.resultIndex; i < e.results.length; i++){ var t = e.results[i][0].transcript; if (e.results[i].isFinal) finalText += t; else iv += t; } setInterim(iv); };
        r.onerror = function(){};
        r.onend = function(){ setInterim(''); if (!runningRef.current) return; var t = finalText.trim(); if (t){ pushMsg('me', t); aiReply(); } else { listen(); } };
        try { r.start(); } catch(e){ setTimeout(listen, 400); }
      }

      function stopAll(){
        runningRef.current = false;
        window.__ttsOn = false;
        try { if (recRef.current){ recRef.current.onend = null; recRef.current.onresult = null; recRef.current.stop(); } } catch(e){}
        try { if (window.__ttsAudio){ window.__ttsAudio.pause(); } } catch(e){}
        try { window.speechSynthesis.cancel(); } catch(e){}
      }

      function startInterview(){ setErr(''); msgsRef.current = []; setMsgs([]); runningRef.current = true; aiReply(); }
      function endInterview(){ stopAll(); setPhase('idle'); }
      function skipTurn(){ window.__ttsOn = false; try { if (window.__ttsAudio) window.__ttsAudio.pause(); } catch(e){} try { if (recRef.current){ recRef.current.onend = null; recRef.current.stop(); } } catch(e){} if (runningRef.current) aiReply(); }

      var active = phase !== 'idle';
      var statusText = phase === 'listening' ? (he ? 'מקשיב/ה לך…' : 'Listening…') : phase === 'thinking' ? (he ? 'חושב/ת…' : 'Thinking…') : phase === 'speaking' ? (he ? 'מדבר/ת…' : 'Speaking…') : (he ? 'תרגול שאלות בזמן אמת · קול אנושי' : 'Real-time practice · human voice');
      var fast = (phase === 'speaking' || phase === 'listening');

      return (
        <div className="view-fade" style={{ maxWidth: 640, margin: '12px auto 0', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
          <div style={{ display:'flex', gap:6, background:'#f1f1f3', padding:4, borderRadius:12, marginBottom:18, opacity: active ? 0.45 : 1, pointerEvents: active ? 'none' : 'auto' }}>
            <button onClick={() => setLang('he')} style={{ padding:'7px 20px', borderRadius:9, border:'none', cursor:'pointer', fontWeight:700, fontFamily:'inherit', fontSize:14, background: he ? '#fff' : 'transparent', color: he ? 'var(--accent)' : '#6e6e73', boxShadow: he ? '0 1px 3px rgba(0,0,0,.1)' : 'none' }}>עברית</button>
            <button onClick={() => setLang('en')} style={{ padding:'7px 20px', borderRadius:9, border:'none', cursor:'pointer', fontWeight:700, fontFamily:'inherit', fontSize:14, background: !he ? '#fff' : 'transparent', color: !he ? 'var(--accent)' : '#6e6e73', boxShadow: !he ? '0 1px 3px rgba(0,0,0,.1)' : 'none' }}>English</button>
          </div>
          <div className="orb">
            <div className="orb-wave" style={{ inset: 0, animation: 'orbPulse ' + (fast ? '1.5s' : '2.6s') + ' ease-in-out infinite' }}></div>
            <div className="orb-wave" style={{ inset: 18, animation: 'orbPulse ' + (fast ? '1.5s' : '2.6s') + ' ease-in-out infinite .5s' }}></div>
            <div className="orb-core"><Icon name={phase === 'listening' ? 'mic' : 'graphic_eq'} style={{ fontSize: 40, color: '#fff' }} /></div>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: '-0.4px' }}>{he ? 'ראיון קולי עם AI' : 'AI Voice Interview'}</div>
          <div style={{ fontSize: 14.5, color: phase === 'listening' ? 'var(--accent)' : 'var(--ink-soft)', fontWeight: 600, marginTop: 4 }}>{statusText}</div>

          {(msgs.length > 0 || interim) ? (
            <div className="card" style={{ width: '100%', marginTop: 24, textAlign: 'start', display: 'flex', flexDirection: 'column', gap: 12, maxHeight: 340, overflowY: 'auto' }}>
              {msgs.map(function(m, idx){
                return m.role === 'ai' ? (
                  <div key={idx} style={{ display: 'flex', gap: 11 }}>
                    <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'linear-gradient(150deg, var(--accent), var(--accent-ink))', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="smart_toy" style={{ fontSize: 18, color: '#fff' }} /></div>
                    <div style={{ background: '#f3f3f5', borderRadius: '4px 16px 16px 16px', padding: '11px 15px', fontSize: 14.5, lineHeight: 1.55 }}>{m.text}</div>
                  </div>
                ) : (
                  <div key={idx} style={{ display: 'flex', gap: 11, flexDirection: 'row-reverse' }}>
                    <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#ff7a59', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13 }}>ע</div>
                    <div style={{ background: 'var(--accent)', color: '#fff', borderRadius: '16px 4px 16px 16px', padding: '11px 15px', fontSize: 14.5, lineHeight: 1.55 }}>{m.text}</div>
                  </div>
                );
              })}
              {interim ? (
                <div style={{ display: 'flex', gap: 11, flexDirection: 'row-reverse', opacity: 0.55 }}>
                  <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#ff7a59', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 13 }}>ע</div>
                  <div style={{ background: '#eef4ff', color: 'var(--accent-ink)', borderRadius: '16px 4px 16px 16px', padding: '11px 15px', fontSize: 14.5, lineHeight: 1.55 }}>{interim}</div>
                </div>
              ) : null}
            </div>
          ) : null}

          {err ? <div style={{ marginTop: 14, color: '#e0392f', fontSize: 13.5, fontWeight: 600, maxWidth: 460 }}>{err}</div> : null}

          <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginTop: 26 }}>
            {!active ? (
              <button onClick={startInterview} style={{ display:'flex', alignItems:'center', gap:10, padding:'14px 28px', borderRadius: 999, border: 'none', background: 'linear-gradient(150deg, var(--accent), var(--accent-ink))', color:'#fff', cursor: 'pointer', fontFamily:'inherit', fontWeight: 700, fontSize: 15.5, boxShadow: '0 8px 22px var(--accent-soft)' }}>
                <Icon name="mic" style={{ fontSize: 22, color: '#fff' }} />{he ? 'התחל ראיון' : 'Start interview'}
              </button>
            ) : (
              <React.Fragment>
                <button onClick={skipTurn} title={he ? 'דלג לשאלה הבאה' : 'Skip'} className="voice-round-btn" style={{ border: '1px solid #e7e7ec', background: '#fff', cursor: 'pointer', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                  <Icon name="skip_next" style={{ fontSize: 24, color: '#6e6e73' }} />
                </button>
                <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'linear-gradient(150deg, var(--accent), var(--accent-ink))', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 22px var(--accent-soft)' }}>
                  <Icon name={phase === 'listening' ? 'mic' : phase === 'speaking' ? 'graphic_eq' : 'hourglass_top'} style={{ fontSize: 32, color: '#fff' }} />
                </div>
                <button onClick={endInterview} title={he ? 'סיים ראיון' : 'End'} className="voice-round-btn" style={{ border: 'none', background: '#ffebe9', cursor: 'pointer' }}>
                  <Icon name="call_end" style={{ fontSize: 24, color: '#e0392f' }} />
                </button>
              </React.Fragment>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       SETTINGS VIEW  (grouped iOS-style rows)
       ============================================================ */
    function SettingsView() {
      const groups = [
        {
          title: 'פרופיל',
          rows: [
            { icon: 'description', iconBg: 'var(--accent-soft)', iconColor: 'var(--accent)', label: 'קורות חיים',       desc: 'omri_gonen_cv.pdf · עודכן אתמול',  value: '' },
            { icon: 'badge',       iconBg: '#eef0ff',            iconColor: '#4b56d6',       label: 'תפקידים מבוקשים', desc: 'Product Designer · UX Lead',        value: '3', valueStyle: { fontSize: 13, fontWeight: 700, color: 'var(--ink-soft)' } }
          ]
        },
        {
          title: 'חיבורים',
          rows: [
            { icon: 'cloud',             iconBg: '#e3f7ea', iconColor: '#1a7f48', label: 'Proxy URL',             desc: 'צ\'אט חי מאובטח דרך Cloudflare', value: 'מחובר', valueStyle: { fontSize: 12.5, fontWeight: 700, color: '#1a7f48', background: '#e3f7ea', padding: '4px 10px', borderRadius: 8 } },
            { icon: 'mail',              iconBg: '#fff2e0', iconColor: '#b25e00', label: 'התראות במייל',          desc: 'משרות עם ציון 8+',               value: 'פעיל', valueStyle: { fontSize: 12.5, fontWeight: 700, color: '#b25e00', background: '#fff2e0', padding: '4px 10px', borderRadius: 8 } },
            { icon: 'record_voice_over', iconBg: '#f3e8ff', iconColor: '#a23ad6', label: 'ElevenLabs — קול לראיון', desc: 'קול אנושי לראיון הקולי',         value: '' }
          ]
        },
        {
          title: 'תצוגה',
          rows: [
            { icon: 'dark_mode', iconBg: '#f1f1f3', iconColor: '#6e6e73', label: 'מצב כהה', desc: 'התאמה אוטומטית למערכת', value: 'בהיר', valueStyle: { fontSize: 13, fontWeight: 700, color: 'var(--ink-soft)' } }
          ]
        }
      ];

      return (
        <div className="view-fade" style={{ maxWidth: 720, display: 'flex', flexDirection: 'column', gap: 26 }}>
          {groups.map(g => (
            <div key={g.title}>
              <div className="settings-group-title">{g.title}</div>
              <div className="settings-list">
                {g.rows.map(r => (
                  <div className="settings-row" key={r.label}>
                    <div className="settings-icon" style={{ background: r.iconBg }}>
                      <Icon name={r.icon} style={{ color: r.iconColor }} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14.5, fontWeight: 600 }}>{r.label}</div>
                      <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', fontWeight: 500, marginTop: 1 }}>{r.desc}</div>
                    </div>
                    {r.value ? <span style={r.valueStyle}>{r.value}</span> : null}
                    <Icon name="chevron_left" style={{ fontSize: 20, color: '#c4c4ca' }} />
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ============================================================
       APP  (root: holds shared state, picks the active view)
       ============================================================ */
    function App() {
      const [view, setView] = useState('jobs');        // active nav screen
      const [search, setSearch] = useState('');         // top-bar search text
      const [selectedJobId, setSelectedJobId] = useState(null); // open job detail, or null
      const [savedMap, setSavedMap] = useState(function(){ try{ return JSON.parse(localStorage.getItem('jf_star')||'{}'); }catch(e){ return {}; } });
      const [statusMap, setStatusMap] = useState({});   // { [jobId]: status } overrides from the detail picker
      const [noteMap, setNoteMap] = useState(function(){ try{ return JSON.parse(localStorage.getItem('jf_notes')||'{}'); }catch(e){ return {}; } });
      const [hiddenMap, setHiddenMap] = useState(function(){ try{ return JSON.parse(localStorage.getItem('jf_hidden')||'{}'); }catch(e){ return {}; } });
      const toggleHide = job => setHiddenMap(m => { const nm = { ...m }; if (nm[job.id]) delete nm[job.id]; else nm[job.id] = true; try{ localStorage.setItem('jf_hidden', JSON.stringify(nm)); }catch(e){} return nm; });
      const hideJobs = ids => setHiddenMap(m => { const nm = { ...m }; ids.forEach(id => { nm[id] = true; }); try{ localStorage.setItem('jf_hidden', JSON.stringify(nm)); }catch(e){} return nm; });

      // Effective saved / status for a job (user override falls back to the data).
      const isSavedFor = job => (savedMap[job.id] !== undefined ? savedMap[job.id] : job.status === 'saved');
      const statusFor  = job => (statusMap[job.id] || job.status);

      const toggleSave = job => setSavedMap(m => { const nv = !isSavedFor(job); const nm = { ...m, [job.id]: nv }; try{ localStorage.setItem('jf_star', JSON.stringify(nm)); }catch(e){} return nm; });

      const selectedJob = JOBS.find(j => j.id === selectedJobId) || null;

      // Counts for nav badge.
      const interviewCount = JOBS.filter(j => statusFor(j) === 'interview' || statusFor(j) === 'offer').length;

      // Top-bar eyebrow + title per view.
      const titles = { jobs: 'המשרות שלי', analytics: 'סטטיסטיקה', star: 'בנק STAR ומשא ומתן', voice: 'ראיון קולי', settings: 'הגדרות' };
      const hour = new Date().getHours();
      const greeting = (hour < 12 ? 'בוקר טוב' : hour < 18 ? 'צהריים טובים' : 'ערב טוב') + ' עומרי 👋';

      let eyebrow = greeting;
      let title = titles[view];
      if (selectedJob) {
        eyebrow = selectedJob.company + ' · ' + selectedJob.location;
        title = selectedJob.role;
      }

      // Which screen to render in the page body.
      let body;
      if (selectedJob) {
        body = (
          <JobDetailView
            job={selectedJob}
            isSaved={isSavedFor(selectedJob)}
            toggleSave={() => toggleSave(selectedJob)}
            status={statusFor(selectedJob)}
            setStatus={s => { setStatusMap(m => ({ ...m, [selectedJob.id]: s })); if (window.__saveStatus) window.__saveStatus(selectedJob.id, s); }}
            note={noteMap[selectedJob.id] || ''}
            setNote={v => setNoteMap(m => { const nm = { ...m, [selectedJob.id]: v }; try{ localStorage.setItem('jf_notes', JSON.stringify(nm)); }catch(e){} return nm; })}
            onPractice={() => { setSelectedJobId(null); setView('voice'); }}
            onHide={() => toggleHide(selectedJob)}
            onBack={() => setSelectedJobId(null)}
          />
        );
      } else if (view === 'jobs') {
        body = <JobsView search={search} savedMap={savedMap} toggleSave={toggleSave} openJob={setSelectedJobId} hiddenMap={hiddenMap} toggleHide={toggleHide} hideJobs={hideJobs} />;
      } else if (view === 'analytics') {
        body = <AnalyticsView />;
      } else if (view === 'star') {
        body = <StarView />;
      } else if (view === 'voice') {
        body = <VoiceView />;
      } else if (view === 'settings') {
        body = <SettingsView />;
      }

      return (
        <div className="app">
          <Sidebar
            view={view}
            setView={v => { setSelectedJobId(null); setView(v); }}
            jobCount={JOBS.length}
            interviewCount={interviewCount}
          />
          <main className="main">
            <TopBar eyebrow={eyebrow} title={title} search={search} setSearch={setSearch} />
            <div className="page">{body}</div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Bootstrap: transpile the JSX source above with the classic runtime, then run it. -->
  <script>
  (function () {
    var sb=null, AUTH_DOMAIN='users.jobfinder.local';
    function initSb(){ if(!sb && window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase){ sb=window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY); window.__sb=sb; window.__saveStatus=function(id,st){ try{ sb.from('jobs').update({status:st}).eq('id',id).then(function(){},function(){}); }catch(e){} }; } return sb; }
    function runApp(){ var s=document.getElementById('app-source').textContent; var c=Babel.transform(s,{presets:[['react',{runtime:'classic'}]]}).code; var el=document.createElement('script'); el.textContent=c; document.body.appendChild(el); }
    function mapStatus(s){ if(s==='applied'||s==='interview'||s==='offer'||s==='rejected')return s; if(s==='נסגרה')return 'rejected'; return 'saved'; }
    function daysAgo(d){ if(!d)return 0; return Math.max(0,Math.round((Date.now()-new Date(d))/86400000)); }
    function grad(n){ var h=0;n=n||'?';for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))>>>0;var u=h%360;return ['hsl('+u+' 58% 56%)','hsl('+((u+26)%360)+' 58% 46%)']; }
    function loadAndRun(){
      sb.from('jobs').select('id,company,title,location,url,description,fit_score,score_reason,ai_opener,status,posted,meta').order('fit_score',{ascending:false}).limit(400).then(function(res){
        var rows=(res&&res.data)||[]; var seen={}, out=[];
        rows.forEach(function(j){ var k=((j.company||'')+'|'+(j.title||'')).toLowerCase(); if(seen[k])return; seen[k]=1;
          var meta={}; try{ meta=typeof j.meta==='string'?JSON.parse(j.meta):(j.meta||{}); }catch(e){}
          var g=grad(j.company); var reqs=(meta.gaps&&meta.gaps.length)?meta.gaps.slice(0,5):[];
          out.push({ id:j.id, company:j.company||'', role:j.title||'', location:j.location||'', salary:meta.comp_estimate||'', fitScore:Number(j.fit_score)||0, status:mapStatus(j.status), postedDaysAgo:daysAgo(j.posted), logoFrom:g[0], logoTo:g[1], description:j.description||j.score_reason||'', requirements:reqs, matchedReqs:0, aiOpener:j.ai_opener||'', url:j.url||'' });
        });
        window.__JOBS=out; runApp();
      }, function(){ window.__JOBS=[]; runApp(); });
    }
    function gate(){
      var d=document.createElement('div'); d.id='ag';
      d.style.cssText='position:fixed;inset:0;z-index:99999;background:#f5f5f7;display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl;font-family:Assistant,-apple-system,sans-serif';
      var ic='width:100%;box-sizing:border-box;padding:11px 14px;border:1.5px solid #d2d2d7;border-radius:12px;font:inherit;font-size:.95rem;margin-top:8px';
      d.innerHTML='<div style="max-width:380px;width:100%;background:#fff;border-radius:22px;padding:30px 26px;box-shadow:0 10px 40px rgba(0,0,0,.10)">'+
        '<div style="font-size:1.4rem;font-weight:800">הטרקר שלי</div>'+
        '<div style="font-size:.9rem;color:#6e6e73;margin:4px 0 16px">התחברו או הירשמו כדי להמשיך</div>'+
        '<div style="display:flex;gap:8px;margin-bottom:6px"><button id="agl"></button><button id="ags"></button></div>'+
        '<input id="agu" autocapitalize="off" spellcheck="false" placeholder="omri" style="'+ic+'"/>'+
        '<input id="agp" type="password" placeholder="סיסמה" style="'+ic+'"/>'+
        '<div id="agn" style="display:none"><input id="agname" placeholder="השם שלך (אפשר בעברית)" style="'+ic+'"/></div>'+
        '<div id="age" style="display:none;color:#d70015;font-size:.85rem;font-weight:600;margin-top:8px"></div>'+
        '<button id="agb" style="width:100%;margin-top:16px;padding:12px;border:none;border-radius:100px;background:#0a6dff;color:#fff;font:inherit;font-size:1rem;font-weight:700;cursor:pointer"></button>'+
        '</div>';
      document.body.appendChild(d);
      var mode='login', $=function(i){return document.getElementById(i);};
      $('agu').addEventListener('input',function(){this.value=this.value.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9_-]+/g,'').slice(0,24);});
      function setMode(m){mode=m;$('age').style.display='none';
        $('agl').style.cssText='flex:1;padding:9px;border-radius:10px;font:inherit;font-weight:700;cursor:pointer;border:1.5px solid '+(m==='login'?'#0a6dff;background:#0a6dff;color:#fff':'#d2d2d7;background:#fff;color:#1d1d1f');
        $('ags').style.cssText='flex:1;padding:9px;border-radius:10px;font:inherit;font-weight:700;cursor:pointer;border:1.5px solid '+(m==='signup'?'#0a6dff;background:#0a6dff;color:#fff':'#d2d2d7;background:#fff;color:#1d1d1f');
        $('agl').textContent='התחברות';$('ags').textContent='הרשמה';
        $('agn').style.display=m==='signup'?'block':'none';$('agb').textContent=m==='signup'?'יצירת חשבון':'התחברות';}
      $('agl').onclick=function(){setMode('login');};$('ags').onclick=function(){setMode('signup');};
      function err(m){$('age').textContent=m;$('age').style.display='block';}
      $('agb').onclick=function(){ var u=$('agu').value.trim().toLowerCase(), p=$('agp').value;
        if(!/^[a-z0-9_-]{3,24}$/.test(u))return err('שם משתמש באנגלית (למשל omri)');
        if(p.length<6)return err('סיסמה 6 תווים לפחות'); var em=u+'@'+AUTH_DOMAIN; $('agb').disabled=true;
        if(mode==='signup'){ sb.auth.signUp({email:em,password:p,options:{data:{username:u,full_name:$('agname').value.trim()}}}).then(function(r){ if(r.error){err(/registered|exists|already/i.test(r.error.message)?'שם המשתמש תפוס':r.error.message);$('agb').disabled=false;return;} location.reload(); }); }
        else { sb.auth.signInWithPassword({email:em,password:p}).then(function(r){ if(r.error){ setMode('signup'); err('אין חשבון בשם הזה — השלימו הרשמה'); $('agb').disabled=false; return;} location.reload(); }); }
      };
      $('agp').addEventListener('keydown',function(e){if(e.key==='Enter')$('agb').click();});
      setMode('login');
    }
    function boot(){ initSb(); if(!sb){ runApp(); return; }
      sb.auth.getUser().then(function(r){ var us=r&&r.data&&r.data.user; if(!us){ gate(); return; }
        window.__USER_NAME=(us.user_metadata&&(us.user_metadata.full_name||us.user_metadata.username))||'';
        sb.from('profiles').select('full_name,username').eq('user_id',us.id).maybeSingle().then(function(pr){ if(pr&&pr.data){window.__USER_NAME=pr.data.full_name||pr.data.username||window.__USER_NAME;} loadAndRun(); }, function(){ loadAndRun(); });
      }, function(){ gate(); });
    }
    if(window.supabase&&window.Babel) boot(); else { var t=setInterval(function(){ if(window.supabase&&window.Babel){clearInterval(t);boot();} },80); setTimeout(function(){clearInterval(t);if(!window.supabase)runApp();},6000); }
  })();
  </script>
</body>
