document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk: 0; position: sticky; top: 0; height: 100vh; background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-inline-start: 1px solid #e7e7ec; display: flex; flex-direction: column; padding: 26px 18px 20px;\">\n    <div style=\"display: flex; align-items: center; gap: 11px; padding: 4px 10px 22px;\">\n      <div style=\"width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(150deg, var(--accent), var(--accent-ink)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px var(--accent-soft);\">\n        <span class=\"ms\" style=\"font-size: 22px; color: #fff;\">work<\u002Fspan>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 16px; font-weight: 700; letter-spacing: -0.2px;\">Job Tracker<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #86868b; font-weight: 500; margin-top: 1px;\">{{ jobCountLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav style=\"display: flex; flex-direction: column; gap: 3px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n          <span class=\"ms\" style=\"{{ item.iconStyle }}\">{{ item.icon }}<\u002Fspan>\n          <span style=\"flex: 1; text-align: start;\">{{ item.label }}<\u002Fspan>\n          <sc-if value=\"{{ item.badge }}\" hint-placeholder-val=\"\">\n            <span style=\"font-size: 12px; font-weight: 700; background: var(--accent); color: #fff; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center;\">{{ item.badge }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"margin-top: auto; display: flex; flex-direction: column; gap: 8px;\">\n      <div style=\"height: 1px; background: #e7e7ec; margin: 8px 6px;\" nst accentInk = this.props.accentInk ?? '#0852c4';\n    const accentSoft = this.props.accentSoft ?? 'rgba(10,109,255,0.16)';\n    const showScores = this.props.showScores ?? true;\n\n    const setView = (v) => () => this.setState({ view: v });\n    const all = this.allJobs();\n\n    // ---- nav ----\n    const counts = {};\n    all.forEach(j => { counts[j.status] = (counts[j.status] || 0) + 1; });\n    const interviewBadge = (counts.interview || 0) + (counts.offer || 0);\n    const navBase = [\n      { key: 'jobs', icon: 'work', label: 'משרות', badge: '' },\n      { key: 'analytics', icon: 'monitoring', label: 'סטטיסטיקה', badge: '' },\n      { key: 'star', icon: 'psychology', label: 'בנק STAR', badge: '' },\n      { key: 'voice', icon: 'graphic_eq', label: 'ראיון קולי', badge: '' },\n      { key: 'settings', icon: 'settings', label: 'הגדרות', badge: '' }\n    ];\n    const navItems = navBase.map(n => {\n      const active = s.view === n.key;\n      return {\n        ...n,\n        onClick: setView(n.key),\n        style: 'display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;border-radius:13px;font-family:inherit;font-size:14.5px;font-weight:' + (active ? '700' : '600') + ';cursor:pointer;text-align:start;transition:background .15s,color .15s;background:' + (active ? 'var(--accent-soft)' : 'transparent') + ';color:' + (active ? 'var(--accent-ink)' : '#3a3a3f') + ';',\n        iconStyle: 'font-family:\\'Material Symbols Rounded\\';font-size:22px;color:' + (active ? 'var(--accent)' : '#8e8e93') + ';',\n        badge: n.key === 'voice' && interviewBadge ? String(interviewBadge) : ''\n      };\n    });\n\n    // ---- status filters ----\n    const filterDefs = [\n      { key: 'all', label: 'הכל' },\n      { key: 'saved', label: 'שמורות' },\n      { key: 'applied', label: 'הוגשו' },\n      { key: 'interview', label: 'ראיונות' },\n      { key: 'offer', label: 'הצעות' },\n      { key: 'rejected', label: 'נדחו' }\n    ];\n    const statusFilters = filterDefs.map(f => {\n      const active = s.status === f.key;\n      const count = f.key === 'all' ? all.length : (counts[f.key] || 0);\n      return {\n        label: f.label,\n        count: count,\n        onClick: () => this.setState({ status: f.key }),\n        style: 'display:inline-flex;align-items:center;gap:7px;white-space:nowrap;padding:8px 15px;border-radius:11px;border:1px solid ' + (active ? 'transparent' : '#e7e7ec') + ';font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .15s;background:' + (active ? 'var(--accent)' : '#fff') + ';color:' + (active ? '#fff' : '#3a3a3f') + ';',\n        countStyle: 'font-size:11.5px;font-weight:800;min-width:19px;height:19px;padding:0 5px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;background:' + (active ? 'rgba(255,255,255,0.22)' : '#f0f0f2') + ';color:' + (active ? '#fff' : '#86868b') + ';'\n      };\n    });\n\n    // ---- sort ----\n    const sortDefs = [ { key: 'match', label: 'התאמה' }, { key: 'recent', label: 'עדכני' }, { key: 'az', label: 'A–Z' } ];\n    const sortOptions = sortDefs.map(o => {\n      const active = s.sort === o.key;\n      return {\n        label: o.label,\n        onClick: () => this.setState({ sort: o.key }),\n        style: 'padding:6px 13px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:' + (active ? 'var(--accent-soft)' : 'transparent') + ';color:' + (active ? 'var(--accent-ink)' : '#86868b') + ';'\n      };\n    });\n\n    // ---- jobs list ----\n    let list = all.slice();\n    if (s.status !== 'all') list = list.filter(j => j.status === s.status);\n    const q = s.search.trim();\n    if (q) list = list.filter(j => (j.company + ' ' + j.role).includes(q));\n    if (s.sort === 'match') list.sort((a, b) => b.score - a.score);\n    else if (s.sort === 'recent') list.sort((a, b) => a.days - b.days);\n    else list.sort((a, b) => a.role.localeCompare(b.role));\n\n    const jobs = list.map(j => {\n      const meta = this.statusMeta(this.effStatus(j));\n      const pct = j.score * 10;\n      const ringColor = j.score >= 8 ? '#34c759' : (j.score >= 6 ? '#ff9f0a' : '#c4c4ca');\n      const inkColor = j.score >= 8 ? '#1a7f48' : (j.score >= 6 ? '#b25e00' : '#86868b');\n      const saved = this.isSaved(j);\n      return {\n        ...j,\n        initial: j.company.charAt(0),\n        location: j.location,\n        salary: j.salary,\n        dateLabel: this.fmtDays(j.days),\n        logoStyle: 'background:linear-gradient(150deg,' + j.c1 + ',' + j.c2 + ');',\n        statusLabel: meta.label,\n        statusStyle: 'font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:9px;background:' + meta.bg + ';color:' + meta.fg + ';',\n        ringStyle: 'background:conic-gradient(' + ringColor + ' ' + pct + '%, #ececf0 ' + pct + '%);',\n        scoreColor: 'color:' + inkColor + ';',\n        starIcon: saved ? 'star' : 'star_border',\n        starIconStyle: 'font-family:\\'Material Symbols Rounded\\';font-size:21px;color:' + (saved ? '#ff9f0a' : '#c4c4ca') + ';font-variation-settings:\\'FILL\\' ' + (saved ? '1' : '0') + ';',\n        starStyle: 'width:34px;height:34px;border-radius:9px;border:none;background:' + (saved ? '#fff7e8' : 'transparent') + ';cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;',\n        onOpen: () => this.setState({ selectedJob: j.id, view: 'jobs' }),\n        onSave: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState(st => ({ savedJobs: { ...st.savedJobs, [j.id]: !this.isSaved(j) } })); }\n      };\n    });\n\n    const resultLabel = jobs.length + ' משרות' + (s.status !== 'all' ? ' · ' + (filterDefs.find(f => f.key === s.status) || {}).label : '');\n\n    // ---- analytics ----\n    const total = all.length;\n    const statCards = [\n      { label: 'משרות פעילות', value: String(total), icon: 'work', iconColor: 'color:var(--accent);', delta: '+3 השבוע', deltaColor: 'color:#1a7f48;' },\n      { label: 'אחוז התקדמות', value: '38%', icon: 'trending_up', iconColor: 'color:#34c759;', delta: 'הוגשו מתוך נשמרו', deltaColor: 'color:#86868b;' },\n      { label: 'ראיונות', value: String(counts.interview || 0), icon: 'forum', iconColor: 'color:#ff9f0a;', delta: 'השבוע הקרוב', deltaColor: 'color:#86868b;' },\n      { label: 'ציון התאמה ממוצע', value: '7.4', icon: 'target', iconColor: 'color:#5e5ce6;', delta: 'מתוך 10', deltaColor: 'color:#86868b;' }\n    ];\n    const funnelDefs = [\n      { label: 'נשמרו', count: total, c: '#0a84ff' },\n      { label: 'הוגשו', count: (counts.applied || 0) + (counts.interview || 0) + (counts.offer || 0), c: '#5e5ce6' },\n      { label: 'ראיונות', count: (counts.interview || 0) + (counts.offer || 0), c: '#ff9f0a' },\n      { label: 'הצעות', count: counts.offer || 0, c: '#34c759' }\n    ];\n    const funnel = funnelDefs.map(f => ({\n      label: f.label,\n      count: f.count,\n      pct: Math.round((f.count / total) * 100) + '%',\n      barStyle: 'width:' + Math.max((f.count / total) * 100, 8) + '%;background:linear-gradient(90deg,' + f.c + ',' + f.c + 'cc);'\n    }));\n\n    // ---- STAR ----\n    const starCards = [\n      { q: 'ספר על אתגר מקצועי משמעותי', a: 'בפרויקט redesign מרכזי קיבלתי דרישה לקצר זמן טעינה ב-40%. מיפיתי צווארי בקבוק, הובלתי שינוי ארכיטקטורת רכיבים, והגענו לשיפור של 52% תוך שבועיים.', tags: ['מנהיגות', 'תוצאתי'] },\n      { q: 'איך התמודדת עם קונפליקט בצוות', a: 'שני מפתחים נחלקו על גישה טכנית. קיימתי שיחה מתווכת, הגדרנו קריטריונים מדידים, ובחרנו פתרון לפי נתונים — מה שחיזק את האמון בצוות.', tags: ['תקשורת'] },\n      { q: 'תאר הצלחה שאתה גאה בה', a: 'הובלתי השקה של פיצ\\'ר שהעלה engagement ב-23%. הגדרתי מדדים, תיאמתי בין דיזיין, מוצר ופיתוח, ושמרתי על לו\"ז צמוד.', tags: ['מוצר', 'אימפקט'] }\n    ];\n    const negTips = [\n      'אל תנקוב במספר ראשון — בקש את הטווח שלהם',\n      'עגן את הבקשה לפי שווי שוק ולא לפי השכר הנוכחי',\n      'כלול גם בונוס, מניות וימי חופשה במשא ומתן'\n    ];\n\n    // ---- settings ----\n    const settingsGroups = [\n      { title: 'פרופיל', rows: [\n        { icon: 'description', iconBg: 'background:var(--accent-soft);', iconColor: 'color:var(--accent);', label: 'קורות חיים', desc: 'omri_gonen_cv.pdf · עודכן אתמול', value: '', valueStyle: '' },\n        { icon: 'badge', iconBg: 'background:#eef0ff;', iconColor: 'color:#4b56d6;', label: 'תפקידים מבוקשים', desc: 'Product Designer · UX Lead', value: '3', valueStyle: 'font-size:13px;font-weight:700;color:#86868b;' }\n      ]},\n      { title: 'חיבורים', rows: [\n        { icon: 'cloud', iconBg: 'background:#e3f7ea;', iconColor: 'color:#1a7f48;', label: 'Proxy URL', desc: 'צ\\'אט חי מאובטח דרך Cloudflare', value: 'מחובר', valueStyle: 'font-size:12.5px;font-weight:700;color:#1a7f48;background:#e3f7ea;padding:4px 10px;border-radius:8px;' },\n        { icon: 'mail', iconBg: 'background:#fff2e0;', iconColor: 'color:#b25e00;', label: 'התראות במייל', desc: 'משרות עם ציון 8+', value: 'פעיל', valueStyle: 'font-size:12.5px;font-weight:700;color:#b25e00;background:#fff2e0;padding:4px 10px;border-radius:8px;' },\n        { icon: 'record_voice_over', iconBg: 'background:#f3e8ff;', iconColor: 'color:#a23ad6;', label: 'ElevenLabs — קול לראיון', desc: 'קול אנושי לראיון הקולי', value: '', valueStyle: '' }\n      ]},\n      { title: 'תצוגה', rows: [\n        { icon: 'dark_mode', iconBg: 'background:#f1f1f3;', iconColor: 'color:#6e6e73;', label: 'מצב כהה', desc: 'התאמה אוטומטית למערכת', value: 'בהיר', valueStyle: 'font-size:13px;font-weight:700;color:#86868b;' }\n      ]}\n    ];\n\n    // ---- job detail ----\n    let detailJob = null;\n    if (s.selectedJob) {\n      const j = all.find(x => x.id === s.selectedJob);\n      if (j) {\n        const eff = this.effStatus(j);\n        const meta = this.statusMeta(eff);\n        const pct = j.score * 10;\n        const ringColor = j.score >= 8 ? '#34c759' : (j.score >= 6 ? '#ff9f0a' : '#c4c4ca');\n        const inkColor = j.score >= 8 ? '#1a7f48' : (j.score >= 6 ? '#b25e00' : '#86868b');\n        const saved = this.isSaved(j);\n        const order = ['saved', 'applied', 'interview', 'offer'];\n        const stageLabels = { saved: 'נשמרה', applied: 'הוגשה', interview: 'ראיון', offer: 'הצעה' };\n        const curIdx = eff === 'rejected' ? 1 : order.indexOf(eff);\n        const timeline = order.map((k, i) => {\n          const done = i <= curIdx;\n          const current = i === curIdx;\n          return {\n            label: stageLabels[k],\n            date: done ? this.fmtDays(j.days + (curIdx - i) * 2) : 'ממתין',\n            dotStyle: 'width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;z-index:1;' + (done ? 'background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 3px 8px var(--accent-soft);' : 'background:#fff;border:2px solid #e7e7ec;'),\n            dotIcon: done ? 'check' : 'radio_button_unchecked',\n            dotIconStyle: 'font-family:\\'Material Symbols Rounded\\';font-size:' + (done ? '17' : '14') + 'px;color:' + (done ? '#fff' : '#c4c4ca') + ';',\n            labelStyle: 'font-size:14.5px;font-weight:' + (current ? '700' : '600') + ';color:' + (done ? '#1d1d1f' : '#a1a1a8') + ';',\n            dateStyle: 'font-size:12.5px;font-weight:600;color:' + (current ? 'var(--accent-ink)' : '#a1a1a8') + ';'\n          };\n        });\n        const reqList = ['5+ שנות ניסיון בעיצוב מוצר', 'שליטה ב‑Figma ובמערכות עיצוב', 'ניסיון בעבודה נתונית ו‑A/B testing', 'ניסיון בהובלת צוות', 'אנגלית ברמה גבוהה'];\n        const okCount = j.score >= 8 ? 4 : (j.score >= 6 ? 3 : 2);\n        const requirements = reqList.map((label, i) => {\n          const ok = i < okCount;\n          return {\n            label,\n            icon: ok ? 'check_circle' : 'remove_circle_outline',\n            iconStyle: 'font-family:\\'Material Symbols Rounded\\';font-size:20px;color:' + (ok ? '#34c759' : '#c4c4ca') + ';font-variation-settings:\\'FILL\\' ' + (ok ? '1' : '0') + ';',\n            textStyle: 'font-size:14.5px;font-weight:600;color:' + (ok ? '#1d1d1f' : '#a1a1a8') + ';'\n          };\n        });\n        const pickDefs = [ { k: 'saved', l: 'שמור' }, { k: 'applied', l: 'הוגש' }, { k: 'interview', l: 'ראיון' }, { k: 'offer', l: 'הצעה' }, { k: 'rejected', l: 'נסגר' } ];\n        const statusPicker = pickDefs.map(p => {\n          const active = eff === p.k;\n          return {\n            label: p.l,\n            onClick: () => this.setState(st => ({ jobStatus: { ...st.jobStatus, [j.id]: p.k } })),\n            style: 'flex:1;padding:11px 8px;border-radius:12px;border:1px solid ' + (active ? 'transparent' : '#e7e7ec') + ';font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;background:' + (active ? 'linear-gradient(150deg,var(--accent),var(--accent-ink))' : '#fff') + ';color:' + (active ? '#fff' : '#3a3a3f') + ';box-shadow:' + (active ? '0 3px 10px var(--accent-soft)' : 'none') + ';'\n          };\n        });\n        const toolDefs = [\n          { icon: 'quiz', label: 'הכנה לראיון' },\n          { icon: 'record_voice_over', label: 'תרגול ראיון' },\n          { icon: 'folder_open', label: 'דוסייר' },\n          { icon: 'volunteer_activism', label: 'תמיכה רגשית' },\n          { icon: 'thumb_down', label: 'לא רלוונטי' }\n        ];\n        const tools = toolDefs.map(t => ({ icon: t.icon, label: t.label, onClick: () => {} }));\n\n        detailJob = {\n          statusPicker, tools,\n          notesValue: this.state.notes[j.id] || '',\n          onNotesInput: (e) => { const v = e.target.value; this.setState(st => ({ notes: { ...st.notes, [j.id]: v } })); },\n          onSaveNotes: () => {},\n          id: j.id, role: j.role, company: j.company, location: j.location, salary: j.salary,\n          score: j.score, initial: j.company.charAt(0),\n          logoStyle: 'background:linear-gradient(150deg,' + j.c1 + ',' + j.c2 + ');',\n          statusLabel: meta.label, statusStyle: 'font-size:13px;font-weight:700;padding:6px 14px;border-radius:10px;background:' + meta.bg + ';color:' + meta.fg + ';',\n          ringStyle: 'background:conic-gradient(' + ringColor + ' ' + pct + '%, #ececf0 ' + pct + '%);',\n          scoreColor: 'color:' + inkColor + ';',\n          dateLabel: this.fmtDays(j.days),\n          matchSummary: okCount + ' מתוך 5 דרישות תואמות',\n          description: 'תפקיד בכיר בצוות המוצר של ' + j.company + ', באחריות על מסעות משתמש מקצה לקצה — ממחקר ועד מסירה לפיתוח. עבודה צמודה עם מנהלי מוצר ומהנדסים בסביבה מהירה ונתונית.',\n          insight: 'הניסיון שלך ב‑design systems והובלת redesign תואם ' + okCount + ' מתוך 5 הדרישות. שווה להדגיש בראיון את פרויקט שיפור ה‑engagement.',\n          requirements, timeline,\n          saved, savedLabel: saved ? 'שמורה' : 'שמור',\n          starIcon: saved ? 'star' : 'star_border',\n          starStyle: 'display:flex;align-items:center;gap:7px;height:46px;padding:0 18px;border-radius:13px;border:1px solid ' + (saved ? '#ffe0a3' : '#e7e7ec') + ';background:' + (saved ? '#fff7e8' : '#fff') + ';color:' + (saved ? '#b25e00' : '#3a3a3f') + ';font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;transition:all .15s;',\n          starIconStyle: 'font-family:\\'Material Symbols Rounded\\';font-size:20px;color:' + (saved ? '#ff9f0a' : '#86868b') + ';font-variation-settings:\\'FILL\\' ' + (saved ? '1' : '0') + ';',\n          onSaveToggle: () => this.setState(st => ({ savedJobs: { ...st.savedJobs, [j.id]: !this.isSaved(j) } }))\n        };\n      }\n    }\n\n    const titles = { jobs: 'המשרות שלי', analytics: 'סטטיסטיקה', star: 'בנק STAR ומשא ומתן', voice: 'ראיון קולי', settings: 'הגדרות' };\n    const hour = new Date().getHours();\n    const greeting = (hour < 12 ? 'בוקר טוב' : hour < 18 ? 'צהריים טובים' : 'ערב טוב') + ' עומרי 👋';\n\n    return {\n      accent, accentInk, accentSoft, showScores,\n      navItems, statusFilters, sortOptions, jobs, resultLabel,\n      statCards, funnel, starCards, negTips, settingsGroups,\n      search: s.search,\n      onSearch: (e) => this.setState({ search: e.target.value }),\n      openAdd: () => {},\n      jobCountLabel: all.length + ' משרות פעילות',\n      viewTitle: detailJob ? detailJob.role : titles[s.view],\n      greeting: detailJob ? detailJob.company + ' · ' + detailJob.location : greeting,\n      detailJob,\n      closeDetail: () => this.setState({ selectedJob: null }),\n      isDetail: !!detailJob,\n      isJobs: s.view === 'jobs' && !detailJob,\n      isAnalytics: s.view === 'analytics',\n      isStar: s.view === 'star',\n      isVoice: s.view === 'voice',\n      isSettings: s.view === 'settings'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
