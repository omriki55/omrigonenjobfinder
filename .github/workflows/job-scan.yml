name: SaaS Job Scan
permissions:
  contents: read
on:
  workflow_dispatch:
  schedule:
    # Deep scan 3× daily, Sunday–Thursday (Israeli work week).
    # 05:00/10:00/15:00 UTC ≈ 08:00/13:00/18:00 Israel time.
    - cron: '0 5,10,15 * * 0-4'
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Run job scan
        run: python job_search/saas_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      - name: Send high-score email alerts
        if: always()
        run: python job_search/notify_high_scores.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_THRESHOLD: '8'
