name: Job Scan
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1-5'   # 9am Israel time weekdays
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic python-dotenv
      - run: python job_search/run_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html job_search/scored_jobs.json
          git diff --cached --quiet || git commit -m "Auto scan — $(date +%Y-%m-%d)"
          git push
