name: SaaS Job Scan
permissions:
  contents: read
on:
  workflow_dispatch:
  schedule:
    # Deep scan once daily, Sunday–Thursday (Israeli work week)
    - cron: '0 6 * * 0-4'    # 09:00 Israel
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Run job scan
        run: python job_search/saas_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Send high-score email alerts
        if: always()
        run: python job_search/notify_high_scores.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_THRESHOLD: '8'
