name: CI smoke check

# Fast guard: on every push, make sure the Python pipeline compiles and the
# inline JavaScript in the deployed HTML pages has no syntax errors — so a
# broken file can't go live unnoticed (the site deploys straight from main).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Compile Python pipeline
        run: python -m py_compile job_search/saas_pipeline.py job_search/ats_scraper.py job_search/notify_high_scores.py

      - uses: actions/setup-node@v4
      - name: Syntax-check inline JS in HTML pages
        run: |
          node -e '
            const fs = require("fs"), vm = require("vm");
            // Only validate scripts that are actually plain JavaScript. The pages
            // ship JSX via Babel (type="text/babel" / "text/jsx-source"), which a
            // plain JS parser cannot read, so those types are skipped.
            const JS_TYPES = ["", "text/javascript", "application/javascript"];
            for (const f of ["docs/app.html", "docs/landing.html"]) {
              let s = fs.readFileSync(f, "utf8");
              // Strip HTML comments first so an example <script> tag written inside
              // a comment is not mistaken for a real script block.
              s = s.replace(/<!--[\s\S]*?-->/g, "");
              const re = /<script\b((?:(?!\bsrc=)[^>])*)>([\s\S]*?)<\/script>/g;
              let m, checked = 0;
              while ((m = re.exec(s)) !== null) {
                const tm = m[1].match(/\btype\s*=\s*["\x27]([^"\x27]*)["\x27]/i);
                const type = tm ? tm[1].toLowerCase() : "";
                if (!JS_TYPES.includes(type)) continue;
                try { new vm.Script(m[2]); checked++; }
                catch (e) { console.error(f + " inline JS error: " + e.message); process.exit(1); }
              }
              if (!checked) { console.error(f + ": no inline JS scripts found"); process.exit(1); }
              console.log(f + " OK (" + checked + " inline JS script(s) checked)");
            }
          '
